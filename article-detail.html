<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Article detail - Flower guides, care tips, and floristry knowledge.">
    <meta property="og:title" content="Article | Flower Ecosystem">
    <meta property="og:description" content="Flower guides, care tips, and floristry knowledge on Flower Ecosystem.">
    <meta property="og:type" content="website">
    <title>Article | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .article-hero { height:400px; border-radius:var(--radius-md); overflow:hidden; margin-bottom:2rem; position:relative; }
        .article-hero img { width:100%; height:100%; object-fit:cover; }
        .article-hero-overlay { position:absolute; bottom:0; left:0; right:0; padding:2rem; background:linear-gradient(to top, rgba(0,0,0,0.7), transparent); }
        .article-hero-overlay .cat-badge { display:inline-block; background:var(--primary-color); color:white; font-size:0.7rem; font-weight:600; padding:0.2rem 0.6rem; border-radius:4px; margin-bottom:0.5rem; }
        .article-hero-overlay h1 { color:white; font-size:1.8rem; margin-bottom:0.5rem; }
        .article-hero-meta { display:flex; gap:1.5rem; color:rgba(255,255,255,0.85); font-size:0.85rem; flex-wrap:wrap; }
        .article-hero-meta span { display:flex; align-items:center; gap:0.3rem; }
        .detail-layout { display:grid; grid-template-columns:1fr 260px; gap:2rem; }
        .detail-main { min-width:0; }
        .detail-sidebar { display:flex; flex-direction:column; gap:1.25rem; }
        .back-link { display:inline-flex; align-items:center; gap:0.4rem; font-size:0.88rem; color:var(--text-light); margin-bottom:1rem; text-decoration:none; }
        .back-link:hover { color:var(--primary-color); }
        .toc-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.25rem; position:sticky; top:100px; }
        .toc-card h3 { font-size:0.9rem; margin-bottom:0.75rem; display:flex; align-items:center; gap:0.3rem; }
        .toc-list { list-style:none; padding:0; margin:0; counter-reset:toc; }
        .toc-list li { counter-increment:toc; padding:0.35rem 0; border-bottom:1px solid var(--border-light); }
        .toc-list li:last-child { border-bottom:none; }
        .toc-list a { font-size:0.82rem; color:var(--text-light); text-decoration:none; display:flex; gap:0.4rem; }
        .toc-list a:hover { color:var(--primary-color); }
        .toc-list a::before { content:counter(toc) "."; font-weight:500; color:var(--text-muted); min-width:20px; }
        .author-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.25rem; }
        .author-card h3 { font-size:0.9rem; margin-bottom:0.75rem; }
        .author-block { display:flex; gap:0.75rem; align-items:center; }
        .author-avatar { width:48px; height:48px; border-radius:50%; background:var(--bg-light); display:flex; align-items:center; justify-content:center; font-size:1.3rem; overflow:hidden; flex-shrink:0; }
        .author-avatar img { width:100%; height:100%; object-fit:cover; }
        .author-name { font-weight:600; font-size:0.95rem; }
        .author-title { font-size:0.8rem; color:var(--primary-color); }
        .content-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:2rem; margin-bottom:1.5rem; }
        .content-text { font-size:0.95rem; line-height:1.8; color:var(--text-main); }
        .content-text h2 { font-size:1.3rem; margin:2rem 0 0.75rem; color:var(--text-main); }
        .content-text h3 { font-size:1.1rem; margin:1.5rem 0 0.5rem; color:var(--primary-color); }
        .content-text p { margin-bottom:1rem; }
        .content-text ul, .content-text ol { padding-left:1.5rem; margin-bottom:1rem; }
        .content-text li { margin-bottom:0.4rem; }
        .content-text blockquote { border-left:3px solid var(--primary-color); padding:0.75rem 1rem; background:rgba(172,50,80,0.03); border-radius:0 var(--radius-sm) var(--radius-sm) 0; margin:1rem 0; font-style:italic; }
        .content-text table { width:100%; border-collapse:collapse; margin:1rem 0; font-size:0.88rem; }
        .content-text th, .content-text td { padding:0.6rem 0.75rem; border:1px solid var(--border-color); text-align:left; }
        .content-text th { background:var(--bg-light); font-weight:600; }
        .content-text strong { color:var(--text-main); }
        .share-bar { display:flex; gap:0.75rem; padding:1.5rem 0; border-top:1px solid var(--border-color); margin-top:1.5rem; }
        .download-card { display:flex; align-items:center; gap:0.75rem; padding:0.75rem; background:var(--bg-main); border-radius:var(--radius-sm); cursor:pointer; transition:all 0.2s; }
        .download-card:hover { background:var(--primary-light); }
        .download-icon { width:36px; height:36px; border-radius:var(--radius-sm); background:rgba(239,68,68,0.1); color:var(--error-color); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .related-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; }
        .related-card { display:flex; gap:0.75rem; padding:0.75rem; background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-sm); cursor:pointer; transition:all 0.2s; text-decoration:none; color:inherit; }
        .related-card:hover { border-color:var(--primary-color); box-shadow:var(--shadow-sm); }
        .related-img { width:80px; height:60px; border-radius:var(--radius-sm); overflow:hidden; flex-shrink:0; }
        .related-img img { width:100%; height:100%; object-fit:cover; }
        .related-info h4 { font-size:0.85rem; margin-bottom:0.2rem; line-height:1.3; }
        .related-info .meta { font-size:0.75rem; color:var(--text-muted); }
        .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); }
        .empty-state i { font-size:3rem; display:block; margin-bottom:1rem; opacity:0.5; }
        @media(max-width:1024px) { .detail-layout { grid-template-columns:1fr; } .detail-sidebar { display:none; } }
        @media(max-width:640px) { .article-hero { height:250px; } .related-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="section-padding" style="padding-top:2rem;">
        <div class="container">
            <a href="articles.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Articles</a>
            <div id="articleContent"></div>
        </div>
    </section>

    <div id="footer-container"></div>
    <div id="auth-modal-container"></div>

    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/auth.js?v=3.6"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/shared/api.js?v=5.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/articles.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initArticleDetail();
        });
    </script>
</body>
</html>
