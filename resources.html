<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download free floristry guides, templates, and resources on Flower Ecosystem.">
    <title>Resources | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .res-hero{background:linear-gradient(135deg,#0f3460 0%,#16213e 50%,#1a1a2e 100%);padding:5rem 0 3rem;color:white;text-align:center;}
        .res-hero h1{font-size:clamp(2rem,4vw,2.8rem);margin-bottom:0.5rem;}
        .res-hero p{opacity:0.85;max-width:600px;margin:0 auto 1.5rem;}
        .res-search{display:flex;background:var(--bg-white);border-radius:12px;overflow:hidden;max-width:500px;margin:0 auto;}
        .res-search input{flex:1;border:none;padding:1rem 1.25rem;font-size:1rem;outline:none;}
        .res-search button{background:var(--primary-color);color:white;border:none;padding:1rem 1.5rem;cursor:pointer;}
        .res-stats{display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap;margin-top:1.5rem;}
        .res-stat{text-align:center;}
        .res-stat strong{font-size:1.5rem;display:block;}
        .res-stat span{font-size:0.85rem;opacity:0.8;}
        .res-categories{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;}
        .res-cat{padding:0.5rem 1rem;border-radius:50px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;font-size:0.85rem;cursor:pointer;transition:all 0.2s;}
        .res-cat:hover,.res-cat.active{background:var(--primary-color);border-color:var(--primary-color);}
        .res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;}
        .res-card{background:var(--bg-white);border:1px solid var(--border-color);border-radius:14px;overflow:hidden;transition:all 0.3s;}
        .res-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.1);}
        .res-card-header{padding:1.5rem;text-align:center;}
        .res-card-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.75rem;margin:0 auto 1rem;}
        .res-card-icon.pdf{background:#fee2e2;color:#991b1b;}
        .res-card-icon.ppt{background:#fef3c7;color:#92400e;}
        .res-card-icon.xlsx{background:#dcfce7;color:#166534;}
        .res-card-icon.doc{background:#dbeafe;color:#1d4ed8;}
        .res-card-icon.img{background:#f3e8ff;color:#7c3aed;}
        .res-card-title{font-weight:600;font-size:1.05rem;margin-bottom:0.25rem;}
        .res-card-category{font-size:0.75rem;color:var(--primary-color);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;}
        .res-card-body{padding:0 1.5rem 1.5rem;}
        .res-card-desc{font-size:0.88rem;color:var(--text-light);line-height:1.6;margin-bottom:1rem;}
        .res-card-meta{display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;color:var(--text-muted);margin-bottom:1rem;}
        .res-card-footer{display:flex;gap:0.5rem;padding-top:1rem;border-top:1px solid var(--border-light);}
        .res-card-footer .btn{flex:1;text-align:center;}
        .res-empty{text-align:center;padding:4rem 2rem;color:var(--text-light);}
        .res-empty i{font-size:4rem;color:var(--border-color);display:block;margin-bottom:1rem;}
        @media(max-width:768px){.res-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="res-hero">
        <div class="container">
            <h1>Free Resources & Templates</h1>
            <p>Download guides, worksheets, templates, and tools to help you master floristry and grow your flower business.</p>
            <div class="res-search">
                <input type="text" id="resSearch" placeholder="Search resources...">
                <button onclick="filterResources()"><i class="bi bi-search"></i></button>
            </div>
            <div class="res-stats">
                <div class="res-stat"><strong id="resTotal">0</strong><span>Total Resources</span></div>
                <div class="res-stat"><strong id="resDownloads">0</strong><span>Total Downloads</span></div>
            </div>
            <div class="res-categories">
                <button class="res-cat active" onclick="filterCategory(this, 'all')">All</button>
                <button class="res-cat" onclick="filterCategory(this, 'guides')">Guides</button>
                <button class="res-cat" onclick="filterCategory(this, 'templates')">Templates</button>
                <button class="res-cat" onclick="filterCategory(this, 'checklists')">Checklists</button>
                <button class="res-cat" onclick="filterCategory(this, 'worksheets')">Worksheets</button>
                <button class="res-cat" onclick="filterCategory(this, 'references')">References</button>
            </div>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="res-grid" id="resGrid">
                <div class="res-empty"><i class="bi bi-folder"></i><h3>Loading resources...</h3></div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=4.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.5"></script>
    <script src="js/shared/components.js?v=3.1"></script>
    <script>
        let allResources = [];
        let activeCategory = 'all';

        const RESOURCE_ICONS = {
            pdf: { class: 'pdf', icon: 'bi-filetype-pdf' },
            ppt: { class: 'ppt', icon: 'bi-filetype-pptx' },
            xlsx: { class: 'xlsx', icon: 'bi-filetype-xlsx' },
            doc: { class: 'doc', icon: 'bi-filetype-docx' },
            img: { class: 'img', icon: 'bi-image' }
        };

        async function initResources() {
            try {
                const data = await fetch('/api/resources').then(r => r.json());
                allResources = data.resources || data || [];
            } catch { allResources = []; }

            document.getElementById('resTotal').textContent = allResources.length;
            const totalDownloads = allResources.reduce((sum, r) => sum + (r.download_count || 0), 0);
            document.getElementById('resDownloads').textContent = totalDownloads;
            renderResources(allResources);
        }

        function renderResources(resources) {
            const grid = document.getElementById('resGrid');
            if (!resources.length) {
                grid.innerHTML = '<div class="res-empty"><i class="bi bi-folder"></i><h3>No resources available yet</h3><p>Check back soon for downloadable guides, templates, and tools.</p></div>';
                return;
            }
            grid.innerHTML = resources.map(r => {
                const type = (r.file_type || 'pdf').toLowerCase();
                const iconInfo = RESOURCE_ICONS[type] || RESOURCE_ICONS.pdf;
                return `
                    <div class="res-card">
                        <div class="res-card-header">
                            <div class="res-card-icon ${iconInfo.class}"><i class="bi ${iconInfo.icon}"></i></div>
                            <div class="res-card-category">${escapeHtml(r.category || 'General')}</div>
                            <div class="res-card-title">${escapeHtml(r.title)}</div>
                        </div>
                        <div class="res-card-body">
                            <p class="res-card-desc">${escapeHtml(r.description || '')}</p>
                            <div class="res-card-meta">
                                <span><i class="bi bi-file-earmark"></i> ${(r.file_type || 'PDF').toUpperCase()}</span>
                                <span><i class="bi bi-hdd"></i> ${r.file_size || 'N/A'}</span>
                                <span><i class="bi bi-download"></i> ${r.download_count || 0} downloads</span>
                            </div>
                            <div class="res-card-footer">
                                ${r.file_url ? `<a href="${r.file_url}" class="btn btn-primary btn-sm" download><i class="bi bi-download"></i> Download</a>` : `<button class="btn btn-outline btn-sm" disabled>Coming Soon</button>`}
                                <button class="btn btn-outline btn-sm"><i class="bi bi-eye"></i> Preview</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function filterCategory(el, cat) {
            document.querySelectorAll('.res-cat').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            activeCategory = cat;
            filterResources();
        }

        function filterResources() {
            const query = document.getElementById('resSearch').value.toLowerCase();
            let filtered = allResources;
            if (activeCategory !== 'all') {
                filtered = filtered.filter(r => (r.category || '').toLowerCase().includes(activeCategory));
            }
            if (query) {
                filtered = filtered.filter(r =>
                    (r.title || '').toLowerCase().includes(query) ||
                    (r.description || '').toLowerCase().includes(query) ||
                    (r.category || '').toLowerCase().includes(query)
                );
            }
            renderResources(filtered);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        initResources();
    </script>
</body>
</html>
