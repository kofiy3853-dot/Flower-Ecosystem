<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Flower Knowledge Profile | Flower Ecosystem">
    <title>Flower Knowledge | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=2.0">
    <link rel="stylesheet" href="styles/landing-redesign.css?v=2.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .fk-detail-hero { padding:2rem 0 3rem; }
        .fk-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:3rem; align-items:start; }
        .fk-detail-img-wrap { border-radius:14px; overflow:hidden; border:1px solid var(--border-color); }
        .fk-detail-img-wrap img { width:100%; height:450px; object-fit:cover; display:block; }
        .fk-detail-meta { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:1rem; }
        .fk-sci-name { font-size:1.05rem; color:var(--text-light); font-style:italic; margin-bottom:0.5rem; }
        .fk-detail-desc { font-size:1rem; line-height:1.7; color:var(--text-light); margin-bottom:1.5rem; }
        .fk-specs { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:1.5rem; }
        .fk-spec { background:var(--bg-light); border-radius:10px; padding:0.75rem 1rem; }
        .fk-spec-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); font-weight:600; }
        .fk-spec-value { font-size:0.95rem; font-weight:500; margin-top:0.15rem; color:var(--text-main); }
        .fk-detail-tabs { display:flex; gap:0; border-bottom:2px solid var(--border-color); overflow-x:auto; margin-top:2rem; }
        .fk-detail-tab-btn { padding:0.85rem 1.5rem; background:none; border:none; font-size:0.9rem; font-weight:500; color:var(--text-light); cursor:pointer; position:relative; white-space:nowrap; transition:color 0.2s; display:flex; align-items:center; gap:0.4rem; }
        .fk-detail-tab-btn:hover { color:var(--text-main); }
        .fk-detail-tab-btn.active { color:var(--primary-color); }
        .fk-detail-tab-btn.active::after { content:''; position:absolute; bottom:-2px; left:0; width:100%; height:2px; background:var(--primary-color); }
        .fk-detail-tab-content { display:none; padding:2rem 0; }
        .fk-detail-tab-content.active { display:block; }
        .fk-benefit-group { margin-bottom:1.5rem; }
        .fk-benefit-group h3 { font-size:1.1rem; display:flex; align-items:center; gap:0.5rem; margin-bottom:0.75rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border-color); }
        .fk-benefit-list { list-style:none; padding:0; }
        .fk-benefit-list li { display:flex; align-items:flex-start; gap:0.65rem; padding:0.5rem 0; border-bottom:1px solid var(--border-light); font-size:0.9rem; color:var(--text-light); line-height:1.5; }
        .fk-benefit-list li i { color:var(--accent-green); margin-top:0.2rem; flex-shrink:0; font-size:0.9rem; }
        .fk-care-list { display:grid; gap:1rem; }
        .fk-care-item { background:var(--bg-light); border-radius:10px; padding:1.1rem 1.25rem; display:flex; gap:0.85rem; align-items:flex-start; }
        .fk-care-item i { font-size:1.2rem; color:var(--primary-color); margin-top:0.1rem; flex-shrink:0; }
        .fk-care-item h4 { font-size:0.95rem; margin-bottom:0.2rem; }
        .fk-care-item p { font-size:0.85rem; color:var(--text-light); margin:0; line-height:1.5; }
        .fk-marketplace-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:1rem; }
        .fk-missing { text-align:center; padding:3rem; color:var(--text-light); }
        .fk-no-data { text-align:center; padding:2rem; color:var(--text-light); font-style:italic; }
        .fk-breadcrumb { background:var(--bg-light); padding:0.75rem 0; border-bottom:1px solid var(--border-color); font-size:0.85rem; color:var(--text-light); }
        .fk-breadcrumb a { color:var(--text-light); text-decoration:none; }
        .fk-breadcrumb a:hover { color:var(--primary-color); }
        .fk-breadcrumb .sep { margin:0 0.5rem; }
        .fk-loading { text-align:center; padding:5rem 2rem; }
        .fk-loading .spinner { width:40px; height:40px; border:3px solid var(--border-color); border-top-color:var(--primary-color); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .fk-fav-btn { font-size:0.85rem; padding:0.4rem 1rem; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-white); cursor:pointer; display:inline-flex; align-items:center; gap:0.4rem; transition:all 0.2s; }
        .fk-fav-btn:hover { border-color:#e74c3c; color:#e74c3c; }
        .fk-fav-btn.active { background:#e74c3c15; border-color:#e74c3c; color:#e74c3c; }
        .fk-fav-btn i { pointer-events:none; }
        @media print {
            #header-container, #footer-container, .fk-breadcrumb, .fk-detail-tabs, .nav-dropdown, .fk-fav-btn, .fk-flower-grid, .no-print, .fk-detail-tab-content { display:none !important; }
            .fk-detail-tab-content.active { display:block !important; }
            .fk-detail-grid { grid-template-columns:1fr; }
            .fk-detail-img-wrap img { height:300px; }
            body { font-size:12pt; color:#000; background:#fff; }
            .fk-specs { grid-template-columns:1fr 1fr; }
            .fk-care-item { break-inside:avoid; }
        }
        .fk-share-bar { display:flex; gap:0.5rem; margin-top:1rem; }
        .fk-share-bar button { padding:0.4rem 0.9rem; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-white); cursor:pointer; font-size:0.8rem; display:flex; align-items:center; gap:0.35rem; transition:all 0.2s; }
        .fk-share-bar button:hover { background:var(--bg-light); }
        .fk-flower-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:1.25rem; }
        .fk-flower-grid .fk-flower-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:12px; overflow:hidden; text-decoration:none; color:inherit; transition:all 0.25s; }
        .fk-flower-grid .fk-flower-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-md); border-color:var(--primary-color); }
        .fk-flower-grid .fk-flower-card img { width:100%; height:140px; object-fit:cover; }
        .fk-flower-grid .fk-flower-card .fk-body { padding:0.75rem 1rem 1rem; }
        .fk-flower-grid .fk-flower-card .fk-body h4 { font-size:0.9rem; margin-bottom:0.15rem; display:flex; align-items:center; gap:0.35rem; }
        .fk-flower-grid .fk-flower-card .fk-body .fk-sci-sm { font-size:0.75rem; color:var(--text-light); font-style:italic; }
        @media(max-width:768px){
            .fk-detail-grid { grid-template-columns:1fr; gap:1.5rem; }
            .fk-specs { grid-template-columns:1fr; }
            .fk-detail-img-wrap img { height:280px; }
            .fk-detail-tabs { gap:0; overflow-x:auto; -webkit-overflow-scrolling:touch; }
            .fk-detail-tab-btn { padding:0.7rem 1rem; font-size:0.8rem; }
            .fk-detail-hero { padding:1rem 0 2rem; }
            #fkDetailTitle { font-size:1.4rem !important; }
            .fk-marketplace-grid { grid-template-columns:1fr 1fr; }
            .fk-flower-grid { grid-template-columns:1fr 1fr; }
            .fk-flower-grid .fk-flower-card img { height:110px; }
        }
        @media(max-width:480px){
            .fk-marketplace-grid { grid-template-columns:1fr; }
            .fk-flower-grid { grid-template-columns:1fr; }
            .fk-detail-tab-btn { font-size:0.75rem; padding:0.6rem 0.75rem; }
            .fk-detail-img-wrap img { height:220px; }
            #fkStarRating span { font-size:1.2rem !important; }
            #fkCommentForm textarea { min-height:60px; font-size:0.85rem; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="fk-breadcrumb">
        <div class="container">
            <a href="index.html">Home</a>
            <span class="sep">�</span>
            <a href="flower-knowledge-hub.html">Flower Knowledge</a>
            <span class="sep">�</span>
            <span id="fkBcName" style="color:var(--text-main);">Flower</span>
        </div>
    </div>

    <main class="fk-detail-hero">
        <div class="container">
            <div id="fkLoading" class="fk-loading">
                <div class="spinner"></div>
                <p>Loading flower knowledge...</p>
            </div>
            <div id="fkContent" style="display:none;">
                <div class="fk-detail-grid">
                    <div class="fk-detail-img-wrap">
                        <img id="fkDetailImg" src="" alt="" onerror="this.src='https://images.unsplash.com/photo-1490750967868-88df5691a78b?q=80&w=800&auto=format&fit=crop'">
                    </div>
                    <div>
                        <div class="fk-detail-meta" id="fkDetailCategories"></div>
                        <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.25rem;">
                            <h1 id="fkDetailTitle" style="font-size:2rem;margin:0;"></h1>
                            <button id="fkFavBtn" class="fk-fav-btn" onclick="toggleFavorite()" title="Save to favorites" style="display:none;"><i class="bi bi-heart"></i> <span>Save</span></button>
                        </div>
                        <div class="fk-sci-name" id="fkSciName"></div>
                        <p class="fk-detail-desc" id="fkDetailDesc"></p>
                        <div class="fk-specs" id="fkSpecs"></div>
                        <div class="fk-share-bar no-print">
                            <button onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
                            <button onclick="shareFlower()"><i class="bi bi-share"></i> Share</button>
                        </div>
                    </div>
                </div>

                <div class="fk-detail-tabs" role="tablist" id="fkTabs">
                    <button class="fk-detail-tab-btn active" role="tab" aria-selected="true" data-tab="medicinal">?? Medicinal</button>
                    <button class="fk-detail-tab-btn" role="tab" aria-selected="false" data-tab="health">?? Health</button>
                    <button class="fk-detail-tab-btn" role="tab" aria-selected="false" data-tab="perfume">?? Perfume</button>
                    <button class="fk-detail-tab-btn" role="tab" aria-selected="false" data-tab="ornamental">?? Ornamental</button>
                    <button class="fk-detail-tab-btn" role="tab" aria-selected="false" data-tab="care">?? Care Guide</button>
                    <button class="fk-detail-tab-btn" role="tab" aria-selected="false" data-tab="marketplace">?? Marketplace</button>
                </div>

                <div id="tab-medicinal" class="fk-detail-tab-content active" role="tabpanel"></div>
                <div id="tab-health" class="fk-detail-tab-content" role="tabpanel"></div>
                <div id="tab-perfume" class="fk-detail-tab-content" role="tabpanel"></div>
                <div id="tab-ornamental" class="fk-detail-tab-content" role="tabpanel"></div>
                <div id="tab-care" class="fk-detail-tab-content" role="tabpanel"></div>
                <div id="tab-marketplace" class="fk-detail-tab-content" role="tabpanel"></div>
            </div>

            <div id="fkSimilarSection" class="reveal-up" style="margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border-color);display:none;">
                <h3 style="font-size:1.1rem;margin-bottom:1rem;">?? Similar Flowers</h3>
                <div class="fk-flower-grid" id="fkSimilarGrid"></div>
            </div>

            <div id="fkCommunitySection" class="reveal-up" style="margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border-color);">
                <h3 style="font-size:1.1rem;margin-bottom:0.5rem;">?? Community Discussions & Ratings</h3>
                <div id="fkRatingSummary" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;padding:1rem;background:var(--bg-light);border-radius:10px;"></div>
                <form id="fkCommentForm" style="margin-bottom:1.5rem;" onsubmit="return submitComment(event)">
                    <textarea id="fkCommentInput" placeholder="Share your experience with this flower..." style="width:100%;padding:0.75rem 1rem;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-white);color:var(--text-main);font-family:inherit;font-size:0.95rem;resize:vertical;min-height:80px;box-sizing:border-box;" required></textarea>
                    <div style="display:flex;align-items:center;gap:1rem;margin-top:0.75rem;flex-wrap:wrap;">
                        <div style="display:flex;align-items:center;gap:0.3rem;">
                            <span style="font-size:0.85rem;color:var(--text-light);">Rating:</span>
                            <div id="fkStarRating" style="display:inline-flex;gap:0.2rem;cursor:pointer;">
                                <span data-star="1" style="font-size:1.5rem;color:var(--border-color);transition:color 0.15s;">?</span>
                                <span data-star="2" style="font-size:1.5rem;color:var(--border-color);transition:color 0.15s;">?</span>
                                <span data-star="3" style="font-size:1.5rem;color:var(--border-color);transition:color 0.15s;">?</span>
                                <span data-star="4" style="font-size:1.5rem;color:var(--border-color);transition:color 0.15s;">?</span>
                                <span data-star="5" style="font-size:1.5rem;color:var(--border-color);transition:color 0.15s;">?</span>
                            </div>
                            <span id="fkRatingLabel" style="font-size:0.85rem;color:var(--text-light);margin-left:0.3rem;">None</span>
                        </div>
                        <button type="submit" style="padding:0.6rem 1.5rem;background:var(--primary-color);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:500;">Post Comment</button>
                    </div>
                </form>
                <div id="fkCommentsList"></div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=2.0"></script>
    <script src="js/shared/theme.js?v=2.0"></script>
    <script src="js/shared/auth.js?v=2.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=2.0"></script>
    <script src="js/shared/components.js?v=2.0"></script>
    <script>
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        const CATEGORY_ICONS = {
            'Medicinal': '??', 'Ornamental': '??', 'Perfume': '??', 'Edible': '???',
            'Religious': '???', 'Landscaping': '??', 'Indoor Plants': '??',
            'Palm Trees': '??', 'Succulents': '??', 'Tropical Plants': '??'
        };
        let currentFlower = null;

        async function loadFlower() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (!slug) {
                document.getElementById('fkLoading').innerHTML = '<p style="color:var(--error-color);">No flower specified.</p>';
                return;
            }

            try {
                const [flower, categories, allFlowers] = await Promise.all([
                    api.fetchKnowledgeFlower(slug),
                    api.fetchKnowledgeCategories(),
                    api.fetchKnowledgeFlowers()
                ]);

                if (!flower || flower._notFound) {
                    document.getElementById('fkLoading').innerHTML = '<div class="fk-missing"><i class="bi bi-emoji-frown" style="font-size:3rem;display:block;margin-bottom:1rem;"></i><h2>Flower not found</h2><p style="color:var(--text-light);">The flower you\'re looking for doesn\'t exist in our encyclopedia.</p></div>';
                    return;
                }

                currentFlower = flower;
                document.getElementById('fkLoading').style.display = 'none';
                document.getElementById('fkContent').style.display = 'block';

                document.title = `${flower.emoji || '??'} ${flower.common_name} | Flower Knowledge | Flower Ecosystem`;
                document.getElementById('fkBcName').textContent = flower.common_name;
                document.getElementById('fkDetailImg').src = flower.image_url;
                document.getElementById('fkDetailImg').alt = flower.common_name;
                document.getElementById('fkDetailTitle').textContent = `${flower.emoji || '??'} ${flower.common_name}`;
                document.getElementById('fkSciName').textContent = flower.scientific_name || '';
                document.getElementById('fkDetailDesc').textContent = flower.description;

                const catMeta = document.getElementById('fkDetailCategories');
                const flowerCats = flower.categories || categories.filter(c => (flower.category_ids || []).includes(c.id));
                catMeta.innerHTML = flowerCats.map(c => `<span class="fk-badge" style="background:var(--bg-light);color:var(--text-main);border:1px solid var(--border-color);">${escapeHtml(c.icon || CATEGORY_ICONS[c.name] || '??')} ${escapeHtml(c.name)}</span>`).join('');

                const specs = document.getElementById('fkSpecs');
                const specData = [
                    { label: 'Sunlight', value: flower.sunlight },
                    { label: 'Water', value: flower.water },
                    { label: 'Soil', value: flower.soil },
                    { label: 'Difficulty', value: flower.difficulty },
                    { label: 'Growth Rate', value: flower.growth_rate },
                    { label: 'Height', value: flower.height },
                    { label: 'Family', value: flower.family },
                    { label: 'Origin', value: flower.origin }
                ].filter(s => s.value);
                specs.innerHTML = specData.map(s => `
                    <div class="fk-spec">
                        <div class="fk-spec-label">${escapeHtml(s.label)}</div>
                        <div class="fk-spec-value">${escapeHtml(s.value)}</div>
                    </div>
                `).join('');

                const benefits = flower.benefits || [];
                const benefitTypes = ['Medicinal', 'Health', 'Perfume', 'Ornamental', 'Religious', 'Culinary', 'Landscaping'];
                benefitTypes.forEach(type => {
                    const tab = document.getElementById('tab-' + type.toLowerCase());
                    if (!tab) return;
                    if (type === 'Medicinal' || type === 'Health' || type === 'Perfume' || type === 'Ornamental') {
                        const items = benefits.filter(b => b.benefit_type === type);
                        if (items.length === 0) {
                            tab.innerHTML = '<div class="fk-no-data">No information available for this category.</div>';
                            return;
                        }
                        tab.innerHTML = `<div class="fk-benefit-group"><h3>${escapeHtml(CATEGORY_ICONS[type] || '??')} ${escapeHtml(type)} Uses</h3><ul class="fk-benefit-list">${items.map(b => `<li><i class="bi bi-check-circle-fill"></i> ${escapeHtml(b.description)}</li>`).join('')}</ul></div>`;
                    }
                });

                const careTab = document.getElementById('tab-care');
                const careTips = flower.care_tips || [];
                if (careTips.length === 0) {
                    careTab.innerHTML = '<div class="fk-no-data">Care guide coming soon.</div>';
                } else {
                    careTab.innerHTML = `<div class="fk-care-list">${careTips.map(t => `
                        <div class="fk-care-item">
                            <i class="bi bi-info-circle-fill"></i>
                            <div><h4>${escapeHtml(t.title)}</h4><p>${escapeHtml(t.description)}</p></div>
                        </div>
                    `).join('')}</div>`;
                }

                loadRelatedMarketplace(flower.slug);
                loadSimilarFlowers(flower, allFlowers || []);
                initFavoriteBtn();
                loadComments(flower.slug);
                trackRecentlyViewed(flower.slug);
            } catch(e) {
                console.error('Failed to load flower:', e);
                document.getElementById('fkLoading').innerHTML = '<div class="fk-missing"><i class="bi bi-exclamation-triangle" style="font-size:3rem;display:block;margin-bottom:1rem;color:var(--error-color);"></i><h2>Failed to load</h2><p style="color:var(--text-light);">Something went wrong. Please try again.</p></div>';
            }
        }

        async function loadRelatedMarketplace(slug) {
            const marketTab = document.getElementById('tab-marketplace');
            marketTab.innerHTML = '<div class="fk-no-data">Loading related products...</div>';
            try {
                const r = await api.apiFetch('/api/knowledge/flowers/' + slug + '/related', '');
                const related = Array.isArray(r) ? r : [];
                if (related.length === 0) {
                    marketTab.innerHTML = '<div class="fk-no-data">No marketplace products found for this flower. <a href="marketplace.html" style="color:var(--primary-color);">Browse all products ?</a></div>';
                } else {
                    marketTab.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.75rem;margin-bottom:1rem;"><h3 style="font-size:1.1rem;margin:0;">Available Products</h3><a href="marketplace.html?search=${encodeURIComponent(currentFlower.common_name)}" style="font-size:0.85rem;color:var(--primary-color);">View all ?</a></div><div class="fk-marketplace-grid">${related.map(p => `
                        <a href="product-detail.html?id=${escapeHtml(p.id)}" class="fk-flower-card" style="text-decoration:none;color:inherit;background:var(--bg-white);border:1px solid var(--border-color);border-radius:10px;overflow:hidden;transition:all 0.2s;">
                            <img loading="lazy" src="${escapeHtml(p.image)}" alt="${escapeHtml(p.name)}" style="width:100%;height:140px;object-fit:cover;" onerror="this.src='https://images.unsplash.com/photo-1490750967868-88df5691a78b?q=80&w=400&auto=format&fit=crop'">
                            <div style="padding:0.75rem 1rem 1rem;">
                                <h4 style="font-size:0.9rem;margin-bottom:0.25rem;">${escapeHtml(p.name)}</h4>
                                <span style="font-size:1rem;font-weight:600;color:var(--primary-color);">$${escapeHtml((p.price || 0).toFixed(2))}</span>
                            </div>
                        </a>
                    `).join('')}</div>`;
                }
            } catch(e) {
                marketTab.innerHTML = '<div class="fk-no-data">Could not load related products.</div>';
            }
        }

        async function initFavoriteBtn() {
            const btn = document.getElementById('fkFavBtn');
            if (!btn) return;
            if (!isLoggedIn()) {
                btn.style.display = 'inline-flex';
                btn.innerHTML = '<i class="bi bi-heart"></i> <span>Login to Save</span>';
                btn.onclick = () => { window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href); };
                return;
            }
            btn.style.display = 'inline-flex';
            try {
                const r = await api.apiFetch('/api/knowledge/favorites', '');
                const isFav = r && r.favorites && r.favorites.includes(currentFlower.slug);
                if (isFav) {
                    btn.classList.add('active');
                    btn.innerHTML = '<i class="bi bi-heart-fill"></i> <span>Saved</span>';
                }
            } catch(e) {}
        }

        async function toggleFavorite() {
            const btn = document.getElementById('fkFavBtn');
            if (!btn || !currentFlower) return;
            if (btn.classList.contains('active')) {
                try {
                    await api.apiFetch('/api/knowledge/favorites/' + currentFlower.slug, '', 'DELETE');
                    btn.classList.remove('active');
                    btn.innerHTML = '<i class="bi bi-heart"></i> <span>Save</span>';
                } catch(e) { alert('Failed to remove favorite.'); }
            } else {
                try {
                    await api.apiFetch('/api/knowledge/favorites', 'POST', { slug: currentFlower.slug });
                    btn.classList.add('active');
                    btn.innerHTML = '<i class="bi bi-heart-fill"></i> <span>Saved!</span>';
                } catch(e) { alert('Failed to save favorite.'); }
            }
        }

        function loadSimilarFlowers(flower, allFlowers) {
            const section = document.getElementById('fkSimilarSection');
            const grid = document.getElementById('fkSimilarGrid');
            if (!flower.category_ids || !flower.category_ids.length) { return; }
            const similar = allFlowers.filter(f =>
                f.slug !== flower.slug &&
                (f.category_ids || []).some(id => (flower.category_ids || []).includes(id))
            ).slice(0, 4);
            if (!similar.length) { return; }
            section.style.display = 'block';
            grid.innerHTML = similar.map(f => `
                <a href="flower-knowledge.html?slug=${escapeHtml(f.slug)}" class="fk-flower-card" style="text-decoration:none;color:inherit;">
                    <img loading="lazy" src="${escapeHtml(f.image_url)}" alt="${escapeHtml(f.common_name)}" onerror="this.src='https://images.unsplash.com/photo-1490750967868-88df5691a78b?q=80&w=400&auto=format&fit=crop'">
                    <div class="fk-body">
                        <h4>${escapeHtml(f.emoji || '??')} ${escapeHtml(f.common_name)}</h4>
                        <div class="fk-sci-sm">${escapeHtml(f.scientific_name || '')}</div>
                    </div>
                </a>
            `).join('');
        }

        let fkUserRating = null;

        document.addEventListener('click', (e) => {
            const star = e.target.closest('#fkStarRating span');
            if (!star) return;
            fkUserRating = parseInt(star.getAttribute('data-star'));
            document.querySelectorAll('#fkStarRating span').forEach((s, i) => {
                s.style.color = i < fkUserRating ? '#f59e0b' : 'var(--border-color)';
            });
            document.getElementById('fkRatingLabel').textContent = fkUserRating + ' ?';
        });

        async function loadComments(slug) {
            const list = document.getElementById('fkCommentsList');
            const summary = document.getElementById('fkRatingSummary');
            try {
                const [comments, rating] = await Promise.all([
                    api.apiFetch('/api/knowledge/flowers/' + slug + '/comments', ''),
                    api.apiFetch('/api/knowledge/flowers/' + slug + '/average-rating', '')
                ]);
                const avg = rating ? rating.average : 0;
                const count = rating ? rating.count : 0;
                if (avg > 0) {
                    summary.innerHTML =
                        '<div style="display:flex;align-items:center;gap:0.5rem;"><span style="font-size:1.5rem;color:#f59e0b;">?</span><span style="font-size:1.25rem;font-weight:600;">' + escapeHtml(avg) + '</span><span style="font-size:0.85rem;color:var(--text-light);">(' + escapeHtml(count) + ' rating' + (count !== 1 ? 's' : '') + ')</span></div>' +
                        '<div style="font-size:0.85rem;color:var(--text-light);">' + (count > 0 ? escapeHtml(Math.round(avg * 20)) + '% recommend' : 'No ratings yet') + '</div>';
                } else {
                    summary.innerHTML = '<span style="font-size:0.9rem;color:var(--text-light);">No ratings yet. Be the first to rate!</span>';
                }
                if (comments && comments.length) {
                    list.innerHTML = comments.map(c => `
                        <div style="padding:1rem;margin-bottom:0.75rem;background:var(--bg-white);border:1px solid var(--border-color);border-radius:10px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;flex-wrap:wrap;gap:0.5rem;">
                                <div style="display:flex;align-items:center;gap:0.75rem;">
                                    <strong style="font-size:0.9rem;">${escapeHtml(c.display_name || 'Anonymous')}</strong>
                                    ${c.rating ? '<span style="color:#f59e0b;">' + '?'.repeat(escapeHtml(c.rating)) + '?'.repeat(escapeHtml(5 - c.rating)) + '</span>' : ''}
                                </div>
                                <span style="font-size:0.75rem;color:var(--text-light);">${escapeHtml(new Date(c.created_at).toLocaleDateString())}</span>
                            </div>
                            <p style="margin:0;font-size:0.95rem;line-height:1.5;color:var(--text-main);">${escapeHtml(c.comment)}</p>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p style="color:var(--text-light);font-size:0.9rem;text-align:center;padding:2rem;">No comments yet. Share your thoughts!</p>';
                }
            } catch(e) {
                list.innerHTML = '<p style="color:var(--error-color);font-size:0.9rem;">Could not load comments.</p>';
            }
        }

        async function submitComment(e) {
            e.preventDefault();
            const input = document.getElementById('fkCommentInput');
            const comment = input.value.trim();
            if (!comment) return false;
            if (!currentFlower) return false;
            const user = getCurrentUser();
            if (!user) { window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href); return false; }
            try {
                await api.apiFetch('/api/knowledge/flowers/' + currentFlower.slug + '/comments', 'POST', {
                    comment: comment,
                    rating: fkUserRating || null
                });
                input.value = '';
                fkUserRating = null;
                document.querySelectorAll('#fkStarRating span').forEach(s => s.style.color = 'var(--border-color)');
                document.getElementById('fkRatingLabel').textContent = 'None';
                await loadComments(currentFlower.slug);
            } catch(e) { alert('Failed to post comment.'); }
            return false;
        }

        function shareFlower() {
            const title = document.getElementById('fkDetailTitle')?.textContent || 'Flower';
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title, url }).catch(() => {});
            } else {
                navigator.clipboard.writeText(url).then(() => alert('Link copied!')).catch(() => {});
            }
        }

        function trackRecentlyViewed(slug) {
            try {
                let recent = JSON.parse(localStorage.getItem('fk_recent') || '[]');
                recent = recent.filter(s => s !== slug);
                recent.unshift(slug);
                localStorage.setItem('fk_recent', JSON.stringify(recent.slice(0, 8)));
            } catch(e) {}
        }

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.fk-detail-tab-btn');
            if (!btn) return;
            const tabName = btn.getAttribute('data-tab');
            document.querySelectorAll('.fk-detail-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.fk-detail-tab-content').forEach(tc => tc.classList.remove('active'));
            btn.classList.add('active');
            const target = document.getElementById('tab-' + tabName);
            if (target) target.classList.add('active');
        });

        document.addEventListener('DOMContentLoaded', loadFlower);
        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) { e.preventDefault(); this.parentElement.classList.toggle('mobile-open'); }
            });
        });
    </script>
</body>
</html>
