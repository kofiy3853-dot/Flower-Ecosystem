<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product Details | Flower Ecosystem">
    <title>Product Detail | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=2.0">
    <link rel="stylesheet" href="styles/landing-redesign.css?v=2.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .pd-hero { padding:2rem 0 4rem; }
        .pd-grid { display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start; }
        .pd-gallery { position:sticky; top:100px; }
        .pd-main-img { width:100%; height:500px; object-fit:cover; border-radius:12px; margin-bottom:1rem; border:1px solid var(--border-color); }
        .pd-thumbs { display:flex; gap:0.75rem; }
        .pd-thumb { width:76px; height:76px; object-fit:cover; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:all 0.2s ease; }
        .pd-thumb.active { border-color:var(--primary-color); }
        .pd-meta { font-size:0.9rem; color:var(--text-light); margin-bottom:1rem; display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
        .pd-title { font-size:2.2rem; margin-bottom:0.5rem; line-height:1.2; }
        .pd-price { font-size:1.8rem; color:var(--primary-color); font-weight:600; margin-bottom:0.5rem; }
        .pd-stock { font-size:0.85rem; color:var(--accent-green); margin-bottom:1.5rem; }
        .pd-desc { font-size:1rem; color:var(--text-light); line-height:1.7; margin-bottom:2rem; }
        .pd-features { list-style:none; padding:1.5rem 0; margin-bottom:2rem; border-top:1px solid var(--border-color); border-bottom:1px solid var(--border-color); }
        .pd-features li { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.6rem; font-size:0.9rem; color:var(--text-main); }
        .pd-features i { color:var(--accent-green); font-size:1.1rem; }
        .pd-qty { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; }
        .pd-qty-btn { width:38px; height:38px; border:1px solid var(--border-color); background:var(--bg-light); border-radius:6px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; }
        .pd-qty-input { width:56px; height:38px; text-align:center; border:1px solid var(--border-color); border-radius:6px; font-family:var(--font-sans); font-size:0.95rem; }
        .pd-add-btn { width:100%; padding:0.9rem; font-size:1rem; display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-bottom:1rem; }
        .pd-seller { background:var(--bg-light); border-radius:10px; padding:1.25rem 1.5rem; display:flex; align-items:center; gap:1rem; border:1px solid var(--border-color); }
        .pd-seller-avatar { width:48px; height:48px; border-radius:50%; background:var(--primary-color); color:white; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
        .pd-reviews { margin-top:4rem; }
        .pd-reviews h2 { font-size:1.4rem; margin-bottom:1.5rem; }
        .pd-review-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:10px; padding:1.25rem 1.5rem; margin-bottom:0.75rem; }
        .pd-review-card .rv-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; flex-wrap:wrap; gap:0.5rem; }
        .pd-review-card .rv-author { font-weight:600; font-size:0.95rem; }
        .pd-review-card .rv-date { font-size:0.8rem; color:var(--text-light); }
        .pd-review-card .rv-stars { color:#f59e0b; font-size:0.9rem; }
        .pd-review-card .rv-text { font-size:0.9rem; color:var(--text-light); line-height:1.6; }
        .pd-related { margin-top:4rem; padding-top:3rem; border-top:1px solid var(--border-color); }
        .pd-related h2 { font-size:1.4rem; margin-bottom:1.5rem; }
        .pd-related-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1.25rem; }
        .pd-related-item { background:var(--bg-white); border:1px solid var(--border-color); border-radius:10px; overflow:hidden; transition:all 0.3s ease; text-decoration:none; color:inherit; }
        .pd-related-item:hover { transform:translateY(-4px); box-shadow:0 8px 20px rgba(0,0,0,0.1); border-color:var(--primary-color); }
        .pd-related-item img { width:100%; height:180px; object-fit:cover; }
        .pd-related-item .r-body { padding:0.75rem 1rem 1rem; }
        .pd-related-item .r-body h4 { font-size:0.95rem; margin-bottom:0.2rem; }
        .pd-related-item .r-body .r-price { font-size:1.05rem; font-weight:600; color:var(--primary-color); }
        @media(max-width:900px){ .pd-grid { grid-template-columns:1fr; gap:2rem; } .pd-main-img { height:400px; } .pd-gallery { position:static; } .pd-related-grid { grid-template-columns:repeat(2,1fr); } }
        @media(max-width:480px){ .pd-related-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <!-- Breadcrumb -->
    <div style="background:var(--bg-light); padding:0.75rem 0; border-bottom:1px solid var(--border-color); margin-top:65px;">
        <div class="container" style="font-size:0.85rem; color:var(--text-light);">
            <a href="index.html" style="color:var(--text-light);">Home</a>
            <span style="margin:0 0.5rem;">›</span>
            <a href="marketplace.html" style="color:var(--text-light);">Marketplace</a>
            <span style="margin:0 0.5rem;">›</span>
            <span id="breadcrumbTitle" style="color:var(--text-main);">Product</span>
        </div>
    </div>

    <!-- Product Details -->
    <main class="pd-hero">
        <div class="container pd-grid">
            <!-- Gallery -->
            <div class="pd-gallery reveal-up">
                <img id="pdMainImg" src="" alt="Product Image" class="pd-main-img">
                <div class="pd-thumbs" id="pdThumbs"></div>
                <div id="pdVideo" style="display:none;margin-top:1rem;">
                    <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;">
                        <iframe id="pdVideoIframe" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            </div>

            <!-- Info -->
            <div class="reveal-up" style="animation-delay:0.1s;">
                <div class="pd-meta">
                    <span id="pdCategory" style="text-transform:uppercase; font-weight:600; color:var(--accent-green); letter-spacing:0.05em;"></span>
                    <span id="pdBadge" style="background:var(--primary-color); color:white; padding:0.15rem 0.5rem; border-radius:4px; font-size:0.7rem; font-weight:600; display:none;"></span>
                    <span id="pdRating"></span>
                </div>
                <h1 id="pdTitle" class="pd-title">Loading...</h1>
                <div id="pdPrice" class="pd-price"></div>
                <div id="pdStock" class="pd-stock"><i class="bi bi-check-circle-fill"></i> In Stock</div>
                <p id="pdDesc" class="pd-desc"></p>

                <ul class="pd-features">
                    <li><i class="bi bi-check2-circle"></i> 100% Freshness Guarantee</li>
                    <li><i class="bi bi-truck"></i> Same-day local delivery available</li>
                    <li><i class="bi bi-flower1"></i> Sustainably sourced</li>
                    <li><i class="bi bi-arrow-return-left"></i> 7-day return policy</li>
                </ul>

                <div class="pd-qty">
                    <span style="font-weight:500;">Quantity:</span>
                    <button class="pd-qty-btn" onclick="updateQty(-1)" aria-label="Decrease quantity">−</button>
                    <input type="number" id="pdQty" class="pd-qty-input" value="1" min="1" aria-label="Quantity" readonly>
                    <button class="pd-qty-btn" onclick="updateQty(1)" aria-label="Increase quantity">+</button>
                </div>

                <button class="btn btn-primary pd-add-btn" id="pdAddBtn">
                    <i class="bi bi-cart-plus"></i> Add to Cart
                </button>
                <div id="pdCartMsg" style="text-align:center; color:var(--accent-green); font-weight:500; display:none; margin-bottom:1rem;">✅ Added to cart!</div>

                <!-- Seller -->
                <div class="pd-seller">
                    <div class="pd-seller-avatar">👤</div>
                    <div>
                        <p style="font-size:0.85rem; color:var(--text-light); margin-bottom:0.15rem;">Sold by</p>
                        <h4 id="pdSeller" style="margin-bottom:0.15rem; font-size:1rem;"></h4>
                        <a id="pdSellerLink" href="#" style="font-size:0.85rem; color:var(--primary-color);">View Seller Profile →</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Reviews -->
    <section class="section-padding bg-light" style="padding-top:3rem; padding-bottom:3rem;">
        <div class="container">
            <div class="pd-reviews">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.75rem;">
                    <h2 style="margin:0;">Customer Reviews</h2>
                    <span id="pdReviewSummary" style="font-size:0.9rem; color:var(--text-light);"></span>
                </div>
                <div id="pdReviewList" style="margin-top:1.5rem;"></div>
            </div>
        </div>
    </section>

    <!-- Related Products -->
    <section class="section-padding">
        <div class="container">
            <div class="pd-related" style="border-top:none; padding-top:0; margin-top:0;">
                <h2>You May Also Like</h2>
                <div class="pd-related-grid" id="pdRelated"></div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=2.0"></script>
    <script src="js/shared/theme.js?v=2.0"></script>
    <script src="js/shared/auth.js?v=2.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=2.0"></script>
    <script src="js/shared/components.js?v=2.0"></script>
    <script src="js/shared/animations.js?v=2.0"></script>
    <script>
        let currentProduct = null;

        function setMainImg(src, el) {
            document.getElementById('pdMainImg').src = src;
            document.querySelectorAll('.pd-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function updateQty(delta) {
            const inp = document.getElementById('pdQty');
            let v = parseInt(inp.value) + delta;
            if (v < 1) v = 1;
            inp.value = v;
        }

        function renderStars(rating) {
            const r = Number(rating) || 0;
            const f = Math.floor(r);
            const h = r - f >= 0.5;
            let s = '';
            for (let i = 0; i < f; i++) s += '<i class="bi bi-star-fill" style="color:#f59e0b;"></i>';
            if (h) s += '<i class="bi bi-star-half" style="color:#f59e0b;"></i>';
            for (let i = 0; i < 5 - f - (h ? 1 : 0); i++) s += '<i class="bi bi-star" style="color:var(--border-color);"></i>';
            return s;
        }

        function getVideoEmbedUrl(url) {
            if (!url) return null;
            const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
            if (yt) return 'https://www.youtube.com/embed/' + yt[1];
            const vm = url.match(/vimeo\.com\/(\d+)/);
            if (vm) return 'https://player.vimeo.com/video/' + vm[1];
            if (url.includes('/embed/')) return url;
            return null;
        }

        function renderReviews(list) {
            const container = document.getElementById('pdReviewList');
            if (!list || list.length === 0) {
                container.innerHTML = '<p style="color:var(--text-light); padding:1rem 0;">No reviews yet. Be the first to review this product!</p>';
                return;
            }
            container.innerHTML = list.map(r => `
                <div class="pd-review-card">
                    <div class="rv-header">
                        <div>
                            <span class="rv-author">${escapeHtml(r.author || r.reviewer_name || 'Anonymous')}</span>
                            <span class="rv-date"> · ${r.date || (r.created_at ? new Date(r.created_at).toLocaleDateString() : '')}</span>
                        </div>
                        <div class="rv-stars">${renderStars(r.rating)}</div>
                    </div>
                    <div class="rv-text">${escapeHtml(r.text || r.review || '')}</div>
                </div>
            `).join('');
        }

        (async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) { window.location.href = 'marketplace.html'; return; }

            let p;
            try {
                p = await api.fetchProduct(id);
                if (!p || p.error) throw new Error(p?.error || 'Not found');
            } catch (e) {
                document.getElementById('pdTitle').textContent = 'Product Not Found';
                document.getElementById('pdDesc').textContent = 'The product you\'re looking for doesn\'t exist or has been removed.';
                return;
            }

            currentProduct = p;
            const price = Number(p.price) || 0;
            const rating = Number(p.rating) || 0;
            const reviewCount = Number(p.reviews) || 0;
            const categoryName = p.category_name || p.category || '';
            const sellerName = p.seller || 'Seller';
            const sellerId = p.seller_id || '';
            const videoUrl = p.video_url || p.videoUrl || null;
            const images = (p.images && p.images.length) ? p.images : (p.image ? [p.image] : []);

            document.title = `${p.name} – Flower Ecosystem`;
            document.getElementById('breadcrumbTitle').textContent = p.name;

            // Gallery
            if (images.length) {
                document.getElementById('pdMainImg').src = images[0];
                document.getElementById('pdThumbs').innerHTML = images.map((url, i) =>
                    `<img src="${escapeHtml(url)}" alt="Product thumbnail" class="pd-thumb ${i === 0 ? 'active' : ''}" onclick="setMainImg('${escapeHtml(url)}', this)" role="button" tabindex="0">`
                ).join('');
            }

            // Video
            const videoDiv = document.getElementById('pdVideo');
            const videoIframe = document.getElementById('pdVideoIframe');
            if (videoUrl) {
                const embed = getVideoEmbedUrl(videoUrl);
                if (embed) {
                    videoIframe.src = embed;
                    videoDiv.style.display = 'block';
                }
            }

            // Info
            document.getElementById('pdTitle').textContent = p.name;
            document.getElementById('pdPrice').textContent = '$' + price.toFixed(2);
            document.getElementById('pdDesc').textContent = p.description || '';
            document.getElementById('pdCategory').textContent = categoryName;
            document.getElementById('pdSeller').textContent = sellerName;

            // Seller link
            const sellerLink = document.getElementById('pdSellerLink');
            sellerLink.href = sellerId ? `florist-profile.html?id=${sellerId}` : 'florists.html';

            // Badge
            const badgeEl = document.getElementById('pdBadge');
            if (p.badge) {
                badgeEl.textContent = p.badge;
                badgeEl.style.display = 'inline';
            }

            // Rating
            const ratingEl = document.getElementById('pdRating');
            if (rating > 0) {
                ratingEl.innerHTML = `${renderStars(rating)} <span style="font-size:0.85rem; color:var(--text-light);">${rating.toFixed(1)} (${reviewCount} reviews)</span>`;
            }

            // Reviews section
            const reviews = p.reviewList || p.reviews || [];
            if (reviews.length) {
                document.getElementById('pdReviewSummary').innerHTML =
                    `<strong>${rating.toFixed(1)}</strong> out of 5 · <span style="color:var(--text-light)">${reviewCount} reviews</span>`;
            }
            renderReviews(reviews);

            // Stock
            const stockEl = document.getElementById('pdStock');
            if (p.stock_quantity <= 0) {
                stockEl.innerHTML = '<i class="bi bi-x-circle-fill" style="color:var(--error-color);"></i> Out of Stock';
                document.getElementById('pdAddBtn').disabled = true;
                document.getElementById('pdAddBtn').style.opacity = '0.5';
            } else if (p.fresh) {
                stockEl.innerHTML = '<i class="bi bi-check-circle-fill" style="color:var(--accent-green);"></i> Fresh — In Stock (' + p.stock_quantity + ' available)';
            } else {
                stockEl.innerHTML = '<i class="bi bi-check-circle-fill" style="color:var(--accent-green);"></i> In Stock (' + p.stock_quantity + ' available)';
            }

            // Add to cart
            document.getElementById('pdAddBtn').addEventListener('click', async () => {
                const qty = parseInt(document.getElementById('pdQty').value);
                const btn = document.getElementById('pdAddBtn');
                btn.disabled = true;

                try {
                    if (typeof isLoggedIn === 'function' && isLoggedIn()) {
                        await serverAddToCart(p.id, qty);
                        await syncCartFromServer();
                    } else {
                        const cartData = JSON.parse(localStorage.getItem('flower-cart') || '[]');
                        const existing = cartData.find(i => i.id === p.id);
                        if (existing) {
                            existing.qty += qty;
                        } else {
                            cartData.push({
                                id: p.id, name: p.name, price: price,
                                image: images[0] || '', qty
                            });
                        }
                        localStorage.setItem('flower-cart', JSON.stringify(cartData));
                        if (typeof updateAllBadges === 'function') updateAllBadges();
                    }
                    const msg = document.getElementById('pdCartMsg');
                    msg.style.display = 'block';
                    clearTimeout(msg._t);
                    msg._t = setTimeout(() => msg.style.display = 'none', 3000);
                } catch (err) {
                    alert(err.message || 'Failed to add to cart');
                } finally {
                    btn.disabled = false;
                }
            });

            // Related products — fetch from listing and filter by category
            try {
                const allData = await api.fetchProducts();
                const allProducts = Array.isArray(allData) ? allData : (allData.products || []);
                const related = allProducts
                    .filter(r => (r.category_name || r.category) === categoryName && r.id !== p.id)
                    .slice(0, 4);
                const relatedGrid = document.getElementById('pdRelated');
                if (related.length) {
                    relatedGrid.innerHTML = related.map(r => {
                        const rPrice = Number(r.price) || 0;
                        const rImg = r.image || (r.images && r.images[0]) || '';
                        return `
                            <a href="product-detail.html?id=${r.id}" class="pd-related-item">
                                <img loading="lazy" src="${escapeHtml(rImg)}" alt="${escapeHtml(r.name)}">
                                <div class="r-body">
                                    <h4>${escapeHtml(r.name)}</h4>
                                    <div class="r-price">$${rPrice.toFixed(2)}</div>
                                </div>
                            </a>`;
                    }).join('');
                } else {
                    relatedGrid.innerHTML = '<p style="color:var(--text-light); grid-column:1/-1;">No related products found.</p>';
                }
            } catch (_) {
                document.getElementById('pdRelated').innerHTML = '<p style="color:var(--text-light); grid-column:1/-1;">Could not load related products.</p>';
            }
        })();
    </script>
<script>
document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
    toggle.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
            e.preventDefault();
            this.parentElement.classList.toggle('mobile-open');
        }
    });
});
</script>
</body>
</html>
