<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new garden journal entry.">
    <title>New Journal Entry | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .create-form { max-width:720px; margin:0 auto; }
        .form-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.5rem; margin-bottom:1rem; }
        .form-card h2 { font-size:1.1rem; margin-bottom:1rem; display:flex; align-items:center; gap:0.4rem; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; font-size:0.88rem; font-weight:500; margin-bottom:0.35rem; }
        .form-group input, .form-group select, .form-group textarea {
            width:100%; padding:0.6rem 0.8rem; border:1px solid var(--border-color); border-radius:var(--radius-sm);
            font-family:inherit; font-size:0.9rem; background:var(--bg-main); color:var(--text-main); transition:border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--primary-color); }
        .form-group textarea { min-height:150px; resize:vertical; line-height:1.7; }
        .form-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.75rem; }
        .mood-options { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .mood-btn { padding:0.4rem 0.75rem; border:1px solid var(--border-color); border-radius:20px; font-size:0.85rem; cursor:pointer; background:var(--bg-white); transition:all 0.2s; }
        .mood-btn:hover { border-color:var(--primary-color); }
        .mood-btn.active { background:var(--primary-color); color:white; border-color:var(--primary-color); }
        .plants-list { display:flex; flex-direction:column; gap:0.5rem; }
        .plant-row { display:flex; gap:0.5rem; align-items:center; }
        .plant-row input { flex:1; padding:0.5rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.85rem; }
        .plant-row select { width:120px; padding:0.5rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.85rem; }
        .plant-remove { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.85rem; }
        .plant-remove:hover { color:var(--error-color); }
        .add-plant-btn { background:none; border:1px dashed var(--border-color); border-radius:var(--radius-sm); padding:0.5rem; cursor:pointer; font-size:0.85rem; color:var(--text-light); width:100%; }
        .add-plant-btn:hover { border-color:var(--primary-color); color:var(--primary-color); }
        .upload-area { border:2px dashed var(--border-color); border-radius:var(--radius-md); padding:2rem; text-align:center; cursor:pointer; transition:all 0.2s; }
        .upload-area:hover { border-color:var(--primary-color); background:rgba(172,50,80,0.02); }
        .upload-area i { font-size:2rem; color:var(--text-muted); display:block; margin-bottom:0.5rem; }
        .upload-area p { font-size:0.85rem; color:var(--text-light); }
        .preview-grid { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.75rem; }
        .preview-item { position:relative; width:100px; height:100px; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border-color); }
        .preview-item img { width:100%; height:100%; object-fit:cover; }
        .preview-remove { position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,0.6); color:white; border:none; cursor:pointer; font-size:0.7rem; display:flex; align-items:center; justify-content:center; }
        .form-actions { display:flex; gap:0.75rem; justify-content:flex-end; margin-top:1rem; }
        .error-msg { color:var(--error-color); font-size:0.85rem; margin-top:0.5rem; display:none; }
        .back-link { display:inline-flex; align-items:center; gap:0.4rem; font-size:0.88rem; color:var(--text-light); margin-bottom:1rem; text-decoration:none; }
        .back-link:hover { color:var(--primary-color); }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="section-padding" style="padding-top:2rem;">
        <div class="container">
            <a href="garden-journal.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Journal</a>
            <div class="create-form">
                <div class="form-card">
                    <h2><i class="bi bi-journal-plus" style="color:var(--primary-color)"></i> New Journal Entry</h2>
                    <form id="entryForm">
                        <div class="form-group">
                            <label for="entryTitle">Title *</label>
                            <input type="text" id="entryTitle" placeholder="e.g., Planted new roses today" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="entryDate">Date</label>
                                <input type="date" id="entryDate">
                            </div>
                            <div class="form-group">
                                <label for="entryWeather">Weather</label>
                                <select id="entryWeather">
                                    <option value="">Select weather</option>
                                    <option value="Sunny">?? Sunny</option>
                                    <option value="Partly Cloudy">? Partly Cloudy</option>
                                    <option value="Cloudy">?? Cloudy</option>
                                    <option value="Rainy">??? Rainy</option>
                                    <option value="Stormy">?? Stormy</option>
                                    <option value="Snowy">?? Snowy</option>
                                    <option value="Windy">?? Windy</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="entryTemp">Temperature</label>
                                <input type="text" id="entryTemp" placeholder="e.g., 72—F">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>How are you feeling?</label>
                            <div class="mood-options" id="moodOptions">
                                <button type="button" class="mood-btn" data-mood="Happy">?? Happy</button>
                                <button type="button" class="mood-btn" data-mood="Excited">?? Excited</button>
                                <button type="button" class="mood-btn" data-mood="Proud">?? Proud</button>
                                <button type="button" class="mood-btn" data-mood="Peaceful">?? Peaceful</button>
                                <button type="button" class="mood-btn" data-mood="Curious">?? Curious</button>
                                <button type="button" class="mood-btn" data-mood="Concerned">?? Concerned</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="entryArea">Garden Area</label>
                            <select id="entryArea">
                                <option value="">Select area</option>
                                <option value="Front Yard">Front Yard</option>
                                <option value="Back Yard">Back Yard</option>
                                <option value="Balcony">Balcony</option>
                                <option value="Indoor">Indoor</option>
                                <option value="Greenhouse">Greenhouse</option>
                                <option value="Raised Beds">Raised Beds</option>
                                <option value="Container Garden">Container Garden</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="entryContent">Notes</label>
                            <textarea id="entryContent" placeholder="What did you do today? Any observations, tips, or thoughts..."></textarea>
                        </div>
                        <div class="form-card" style="border:none;padding:0;">
                            <h2><i class="bi bi-flower2" style="color:var(--primary-color)"></i> Plants</h2>
                            <div class="plants-list" id="plantsList"></div>
                            <button type="button" class="add-plant-btn" onclick="addPlantRow()"><i class="bi bi-plus"></i> Add Plant</button>
                        </div>
                        <div class="form-card" style="border:none;padding:0;">
                            <h2><i class="bi bi-camera" style="color:var(--primary-color)"></i> Photos</h2>
                            <div class="upload-area" id="uploadArea">
                                <i class="bi bi-cloud-arrow-up"></i>
                                <p>Click or drag photos here</p>
                                <p style="font-size:0.75rem;">Max 10 images, 5MB each</p>
                            </div>
                            <input type="file" id="fileInput" multiple accept="image/*" style="display:none;">
                            <div class="preview-grid" id="previewGrid"></div>
                        </div>
                        <div class="error-msg" id="errorMsg"></div>
                        <div class="form-actions">
                            <a href="garden-journal.html" class="btn btn-outline">Cancel</a>
                            <button type="submit" class="btn btn-primary" id="submitBtn"><i class="bi bi-check-lg"></i> Save Entry</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=5.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.7"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script>
        let uploadedFiles = [];
        let selectedMood = '';
        let plantCounter = 0;

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('flower-token')) {
                sessionStorage.setItem('pending-redirect', 'create-journal-entry.html');
                sessionStorage.setItem('pending-auth', 'login');
                if (typeof openAuthModal === 'function') openAuthModal('login');
                return;
            }

            document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

            document.querySelectorAll('.mood-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedMood = btn.dataset.mood;
                });
            });

            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            uploadArea.addEventListener('click', () => fileInput.click());
            uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
            uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
            uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
            fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

            document.getElementById('entryForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('entryTitle').value.trim();
                const errorMsg = document.getElementById('errorMsg');
                const submitBtn = document.getElementById('submitBtn');
                if (!title) { errorMsg.textContent = 'Title is required'; errorMsg.style.display = 'block'; return; }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="auth-spinner" style="margin-right:0.5rem;"></span> Saving...';

                const formData = new FormData();
                formData.append('title', title);
                formData.append('content', document.getElementById('entryContent').value.trim());
                formData.append('entry_date', document.getElementById('entryDate').value);
                formData.append('weather', document.getElementById('entryWeather').value);
                formData.append('temperature', document.getElementById('entryTemp').value);
                formData.append('mood', selectedMood);
                formData.append('garden_area', document.getElementById('entryArea').value);

                const plants = [];
                document.querySelectorAll('.plant-row').forEach(row => {
                    const name = row.querySelector('.plant-name').value.trim();
                    const action = row.querySelector('.plant-action').value;
                    if (name) plants.push({ name, action });
                });
                formData.append('plants', JSON.stringify(plants));

                uploadedFiles.forEach(f => formData.append('photos', f));

                try {
                    const token = localStorage.getItem('flower-token');
                    const res = await fetch('/api/journal/entries', {
                        method: 'POST',
                        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
                        body: formData
                    });
                    if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed'); }
                    window.location.href = 'garden-journal.html';
                } catch (err) {
                    errorMsg.textContent = err.message || 'Failed to save entry';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-check-lg"></i> Save Entry';
                }
            });

            addPlantRow();
        });

        function handleFiles(files) {
            const grid = document.getElementById('previewGrid');
            Array.from(files).forEach(file => {
                if (file.size > 5 * 1024 * 1024 || !file.type.startsWith('image/') || uploadedFiles.length >= 10) return;
                uploadedFiles.push(file);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    const idx = uploadedFiles.length - 1;
                    div.innerHTML = `<img src="${e.target.result}" alt="Preview"><button class="preview-remove" onclick="this.parentElement.remove();uploadedFiles.splice(${idx},1);"><i class="bi bi-x"></i></button>`;
                    grid.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        function addPlantRow() {
            const list = document.getElementById('plantsList');
            const row = document.createElement('div');
            row.className = 'plant-row';
            row.innerHTML = `
                <input type="text" class="plant-name" placeholder="Plant name">
                <select class="plant-action">
                    <option value="">Action</option>
                    <option value="Planted">Planted</option>
                    <option value="Watered">Watered</option>
                    <option value="Fertilized">Fertilized</option>
                    <option value="Pruned">Pruned</option>
                    <option value="Repotted">Repotted</option>
                    <option value="Harvested">Harvested</option>
                    <option value="Observed">Observed</option>
                </select>
                <button type="button" class="plant-remove" onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
            `;
            list.appendChild(row);
        }
    </script>
</body>
</html>
