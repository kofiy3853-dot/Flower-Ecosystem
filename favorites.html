<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your saved wishlist items on Flower Ecosystem. Manage your favorite flowers, plants and arrangements.">
    <title>My Wishlist | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .wl-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem; margin-bottom:1.5rem; }
        .wl-card { transition:opacity 0.3s, transform 0.3s; }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <section class="page-header primary-bg text-white section-padding text-center" style="padding-top:6rem; padding-bottom:3rem;">
        <div class="container reveal-up">
            <span class="subtitle" style="color:rgba(255,255,255,0.7)">YOUR COLLECTION</span>
            <h1 style="color:white;">My Wishlist</h1>
            <p class="section-subtitle text-white">Products you've saved and loved.</p>
        </div>
    </section>

    <section class="section-padding bg-light" style="min-height:50vh;">
        <div class="container">
            <div class="wl-header reveal-up">
                <span id="wishlistCount" style="color:var(--text-light); font-size:0.95rem;"></span>
                <button class="btn btn-outline btn-sm" id="clearWishlistBtn" style="display:none;">
                    <i class="bi bi-trash"></i> Clear All
                </button>
            </div>

            <div class="product-grid" id="favoritesGrid" style="margin-top:1rem;"></div>

            <div class="empty-state" id="emptyState" style="display:none;">
                <i class="bi bi-heart" style="font-size:3rem; margin-bottom:1rem; color:var(--border-color);"></i>
                <h3>Your wishlist is empty</h3>
                <p style="color:var(--text-light); margin-bottom:1.5rem;">Browse the marketplace and save products you love.</p>
                <a href="marketplace.html" class="btn btn-primary">Browse Marketplace ?</a>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=3.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.0"></script>
    <script src="js/shared/ui.js?v=3.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/components.js?v=3.0"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/wishlist.js"></script>
    <script>
        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    this.parentElement.classList.toggle('mobile-open');
                }
            });
        });
    </script>
</body>
</html>
