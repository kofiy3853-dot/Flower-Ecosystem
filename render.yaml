services:
  - type: web
    name: flower-ecosystem
    runtime: node
    plan: free
    buildCommand: npm install && mkdir -p uploads
    startCommand: node db-init.js && node server.js
    healthCheckPath: /api/products?limit=1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PG_HOST
        fromDatabase:
          name: flower-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: flower-db
          property: port
      - key: PG_DATABASE
        fromDatabase:
          name: flower-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: flower-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: flower-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: "Nharnah@12345"
      - key: SUPERADMIN_PASSWORD
        value: "Super@12345"
      - key: CORS_ORIGIN
        value: https://flower-ecosystem.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: flower-db
    plan: free
    databaseName: flower_ecosystem
