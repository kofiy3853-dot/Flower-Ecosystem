<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse flowers by category on Flower Ecosystem.">
    <title>Category | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .cat-hero { background: linear-gradient(135deg, #fdf2f6 0%, #fce7f0 50%, #f8d7e8 100%); padding: 5rem 0 3rem; text-align: center; }
        .cat-hero h1 { font-size: clamp(2rem, 4vw, 2.8rem); margin-bottom: 0.5rem; }
        .cat-hero p { color: var(--text-light); font-size: 1.05rem; margin-bottom: 1.5rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .cat-search { max-width: 500px; margin: 0 auto; display: flex; background:var(--bg-white); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .cat-search input { flex: 1; border: none; padding: 1rem 1.25rem; font-size: 1rem; outline: none; }
        .cat-search button { background: var(--primary-color); color: white; border: none; padding: 1rem 1.5rem; cursor: pointer; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        .section-header h2 { margin: 0; }
        .section-header a { font-size: 0.9rem; color: var(--primary-color); font-weight: 500; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .cat-card { background:var(--bg-white); border: 1px solid var(--border-color); border-radius: 14px; padding: 1.25rem; text-align: center; text-decoration: none; color: inherit; transition: all 0.3s; }
        .cat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); border-color: var(--primary-color); }
        .cat-card-img { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 0.75rem; overflow: hidden; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .cat-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
        .cat-card-count { font-size: 0.78rem; color: var(--text-light); }
        .cat-empty { text-align: center; padding: 4rem 2rem; }
        .cat-empty i { font-size: 4rem; color: var(--text-light); margin-bottom: 1rem; }
        .shop-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border-color); margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .shop-count { font-size: 0.9rem; color: var(--text-light); }
        .shop-actions { display: flex; gap: 0.75rem; align-items: center; }
        .view-toggle { display: flex; background: var(--bg-light); border-radius: 8px; padding: 0.25rem; }
        .view-btn { padding: 0.4rem 0.75rem; border: none; background: none; border-radius: 6px; cursor: pointer; color: var(--text-light); }
        .view-btn.active { background:var(--bg-white); color: var(--text-main); box-shadow: var(--shadow-xs); }
        .sort-select { padding: 0.5rem 0.75rem; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.85rem; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .shop-card { background:var(--bg-white); border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; transition: all 0.3s; position: relative; }
        .shop-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        .shop-card-img { height: 220px; overflow: hidden; position: relative; }
        .shop-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .shop-card:hover .shop-card-img img { transform: scale(1.08); }
        .shop-card-badge { position: absolute; top: 0.75rem; left: 0.75rem; background: var(--primary-color); color: white; padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
        .shop-card-wishlist { position: absolute; top: 0.75rem; right: 0.75rem; background:var(--bg-white); border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: all 0.2s; }
        .shop-card-wishlist:hover { background: var(--primary-color); color: white; }
        .shop-card-actions { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 1rem; display: flex; gap: 0.5rem; opacity: 0; transition: opacity 0.3s; }
        .shop-card:hover .shop-card-actions { opacity: 1; }
        .shop-card-actions button { flex: 1; padding: 0.5rem; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 500; cursor: pointer; }
        .btn-quick-view { background:var(--bg-white); color: var(--text-main); }
        .btn-add-cart { background: var(--primary-color); color: white; }
        .shop-card-body { padding: 1rem; }
        .shop-card-seller { font-size: 0.78rem; color: var(--text-light); margin-bottom: 0.25rem; }
        .shop-card-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .shop-card-rating { font-size: 0.8rem; color: #f59e0b; margin-bottom: 0.25rem; }
        .shop-card-rating span { color: var(--text-muted); }
        .shop-card-price { font-size: 1.1rem; font-weight: 700; color: var(--primary-color); }
        .shop-card-delivery { font-size: 0.75rem; color: var(--accent-green); margin-top: 0.25rem; }
        .shop-card-stock { font-size: 0.75rem; color: var(--error-color); margin-top: 0.25rem; }
        .shop-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border-color); margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .shop-count { font-size: 0.9rem; color: var(--text-light); }
        .shop-actions { display: flex; gap: 0.75rem; align-items: center; }
        .view-toggle { display: flex; background: var(--bg-light); border-radius: 8px; padding: 0.25rem; }
        .view-btn { padding: 0.4rem 0.75rem; border: none; background: none; border-radius: 6px; cursor: pointer; color: var(--text-light); }
        .view-btn.active { background:var(--bg-white); color: var(--text-main); box-shadow: var(--shadow-xs); }
        .sort-select { padding: 0.5rem 0.75rem; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.85rem; }
        .shop-pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; padding: 2rem 0; }
        .page-btn { padding: 0.5rem 0.75rem; border: 1px solid var(--border-color); background:var(--bg-white); border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .page-btn:hover, .page-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .cat-empty { text-align: center; padding: 4rem 2rem; }
        .cat-empty i { font-size: 4rem; color: var(--text-light); margin-bottom: 1rem; }
        .cat-empty h3 { margin-bottom: 0.5rem; }
        .cat-empty p { color: var(--text-light); margin-bottom: 1.5rem; }
        @media (max-width: 768px) {
            .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .shop-card-img { height: 160px; }
            .shop-card-body { padding: 0.75rem; }
        }
    </style>
</head>
<body>
<div id="header-container"></div>

<section class="cat-hero">
    <div class="container">
        <h1 id="catTitle">Loading...</h1>
        <p id="catDesc">Loading category...</p>
    </div>
</section>

<section class="section-padding" style="padding-top:1.5rem;">
    <div class="container">
        <div class="shop-toolbar">
            <div style="display:flex;align-items:center;gap:1rem;">
                <span class="shop-count" id="productCount">Loading...</span>
            </div>
            <div class="shop-actions">
                <select class="sort-select" id="sortSelect" onchange="applyFilters()">
                    <option value="newest">Newest</option>
                    <option value="popular">Most Popular</option>
                    <option value="rating">Best Rated</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                </select>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid" onclick="setView('grid')"><i class="bi bi-grid-3x3-gap"></i></button>
                    <button class="view-btn" data-view="list" onclick="setView('list')"><i class="bi bi-list-ul"></i></button>
                </div>
            </div>
        </div>

        <div class="shop-grid" id="productGrid"></div>

        <div class="shop-pagination" id="pagination"></div>
    </div>
</section>

<div id="footer-container"></div>
<div id="auth-modal-container"></div>

<script src="js/shared/components.js?v=3.1"></script>
<script src="js/shared/auth.js?v=3.8"></script>
<script src="js/shared/theme.js?v=3.0"></script>
<script src="js/shared/animations.js?v=3.0"></script>
<script src="js/shared/api.js?v=5.0"></script>
<script src="js/shared/cart.js?v=3.0"></script>
<script src="js/shared/ui.js?v=2.0"></script>
<script src="js/marketplace.js?v=2.0"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Initialize marketplace with category filter from URL
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category') || urlParams.get('cat');
        if (category) {
            // Pre-check the category checkbox
            const checkbox = document.querySelector(`input[name="cat"][value="${category}"]`);
            if (checkbox) checkbox.checked = true;
        }
    });
</script>
</body>
</html>
