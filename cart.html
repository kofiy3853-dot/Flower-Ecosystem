<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your shopping cart and checkout on Flower Ecosystem.">
    <title>Shopping Cart | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=2.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .cart-item { display:flex; gap:1.25rem; background:var(--bg-white); border:1px solid var(--border-color); border-radius:10px; padding:1.25rem; align-items:center; transition:border-color 0.2s; }
        .cart-item:hover { border-color:var(--primary-color); }
        .cart-item-img img { width:90px; height:90px; object-fit:cover; border-radius:8px; flex-shrink:0; }
        .cart-item-info { flex:1; display:flex; flex-direction:column; gap:0.75rem; min-width:0; }
        .cart-item-top { display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
        .cart-item-name { font-weight:600; font-size:1rem; text-decoration:none; color:var(--text-main); display:block; margin-bottom:0.15rem; }
        .cart-item-name:hover { color:var(--primary-color); }
        .cart-item-price { font-size:0.85rem; color:var(--text-light); margin:0; }
        .cart-item-remove { background:none; border:none; cursor:pointer; color:var(--text-light); font-size:1.1rem; padding:0.25rem; border-radius:6px; transition:color 0.2s, background 0.2s; flex-shrink:0; }
        .cart-item-remove:hover { color:var(--error-color); background:rgba(190,38,38,0.08); }
        .cart-item-bottom { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
        .cart-qty { display:flex; align-items:center; gap:0; border:1px solid var(--border-color); border-radius:8px; overflow:hidden; }
        .cart-qty-btn { width:36px; height:36px; border:none; background:var(--bg-light); cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
        .cart-qty-btn:hover { background:var(--border-color); }
        .cart-qty-val { width:40px; text-align:center; font-weight:600; font-size:0.95rem; border-left:1px solid var(--border-color); border-right:1px solid var(--border-color); line-height:36px; }
        .cart-item-total { font-weight:700; color:var(--primary-color); font-size:1.05rem; min-width:70px; text-align:right; }
        .cart-save-btn { background:none; border:1px solid var(--border-color); cursor:pointer; color:var(--text-light); font-size:0.8rem; padding:0.35rem 0.75rem; border-radius:6px; transition:all 0.2s; white-space:nowrap; }
        .cart-save-btn:hover { border-color:var(--primary-color); color:var(--primary-color); }
        .saved-item { opacity:0.85; }
        .saved-item .cart-item-name { font-size:0.95rem; }
        .promo-row { display:flex; gap:0.5rem; margin-top:1rem; }
        .promo-row input { flex:1; }
        .promo-msg { font-size:0.85rem; margin-top:0.5rem; font-weight:500; }
        .promo-success { color:var(--accent-green); }
        .promo-error { color:var(--error-color); }
        .cart-summary { background:var(--bg-white); border:1px solid var(--border-color); border-radius:12px; padding:2rem; position:sticky; top:100px; }
        .cart-summary h3 { margin-bottom:1.5rem; }
        .summary-row { display:flex; justify-content:space-between; margin-bottom:0.75rem; color:var(--text-light); font-size:0.95rem; }
        .summary-total { border-top:1px solid var(--border-color); padding-top:1rem; margin-top:1rem; display:flex; justify-content:space-between; font-size:1.2rem; font-weight:700; }
        @media(max-width:768px) {
            .cart-item { flex-wrap:wrap; }
            .cart-item-img img { width:70px; height:70px; }
            .cart-item-total { min-width:auto; }
            .cart-save-btn { display:none; }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <section class="section-padding" style="min-height:60vh;">
        <div class="container" style="max-width:960px;">
            <div class="reveal-up" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.5rem;">
                <div>
                    <span class="subtitle">YOUR ORDER</span>
                    <h1>Shopping Cart</h1>
                </div>
                <span id="cartCount" style="color:var(--text-light); font-size:0.95rem;"></span>
            </div>

            <!-- Empty State -->
            <div id="cartEmpty" class="reveal-up" style="text-align:center; padding:4rem 2rem; display:none;">
                <div style="font-size:4rem; margin-bottom:1rem;">??</div>
                <h2 style="margin-bottom:0.5rem;">Your cart is empty</h2>
                <p style="color:var(--text-light); margin-bottom:2rem;">Looks like you haven't added any flowers yet.</p>
                <a href="marketplace.html" class="btn btn-primary">Browse Flowers ?</a>
            </div>

            <!-- Cart Content -->
            <div id="cartContent" style="display:none;">
                <div style="display:grid; grid-template-columns:1fr 320px; gap:2rem; align-items:start; margin-top:1.5rem;">
                    <!-- Items -->
                    <div>
                        <div id="cartItems" style="display:flex; flex-direction:column; gap:1rem;"></div>

                        <!-- Saved for Later -->
                        <div id="savedSection" style="margin-top:2rem; display:none;">
                            <h3 style="font-size:1.1rem; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;">
                                <i class="bi bi-heart"></i> Saved for Later
                            </h3>
                            <div id="savedItems" style="display:flex; flex-direction:column; gap:0.75rem;"></div>
                        </div>
                    </div>

                    <!-- Summary Sidebar -->
                    <div class="cart-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal</span><span id="cartSubtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span><span style="color:var(--accent-green);">Free</span>
                        </div>
                        <div class="summary-row" id="discountRow" style="display:none;">
                            <span>Discount</span><span id="cartDiscount" style="color:var(--accent-green);">-$0.00</span>
                        </div>
                        <div class="summary-total">
                            <span>Total</span><span id="cartTotal" style="color:var(--primary-color);">$0.00</span>
                        </div>

                        <button class="btn btn-primary" id="checkoutBtn" style="width:100%; margin-top:1.5rem; padding:0.9rem; font-size:1rem;">
                            Proceed to Checkout ?
                        </button>
                        <a href="marketplace.html" style="display:block; text-align:center; margin-top:1rem; color:var(--text-light); font-size:0.9rem;">
                            ? Continue Shopping
                        </a>

                        <!-- Promo Code -->
                        <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border-color);">
                            <label style="font-weight:500; font-size:0.9rem; display:block; margin-bottom:0.5rem;">Promo Code</label>
                            <div class="promo-row">
                                <input type="text" id="promoInput" class="form-input" placeholder="Enter code" style="font-size:0.9rem;">
                                <button class="btn btn-outline btn-sm" id="applyPromo">Apply</button>
                            </div>
                            <p id="promoMsg" class="promo-msg"></p>
                        </div>

                        <!-- Trust Badges -->
                        <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border-color); display:flex; flex-direction:column; gap:0.5rem;">
                            <div style="display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; color:var(--text-light);">
                                <i class="bi bi-shield-lock" style="color:var(--accent-green);"></i> Secure checkout
                            </div>
                            <div style="display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; color:var(--text-light);">
                                <i class="bi bi-truck" style="color:var(--accent-green);"></i> Free shipping on all orders
                            </div>
                            <div style="display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; color:var(--text-light);">
                                <i class="bi bi-arrow-repeat" style="color:var(--accent-green);"></i> Easy returns within 7 days
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=2.0"></script>
    <script src="js/shared/theme.js?v=2.0"></script>
    <script src="js/shared/auth.js?v=2.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=2.0"></script>
    <script src="js/shared/components.js?v=2.0"></script>
    <script src="js/shared/animations.js?v=2.0"></script>
    <script src="js/cart-page.js"></script>
    <script>
        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    this.parentElement.classList.toggle('mobile-open');
                }
            });
        });
    </script>
</body>
</html>
