<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test your knowledge with quizzes and exams on Flower Ecosystem Learning Center.">
    <title>Quizzes & Exams | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .quiz-hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:5rem 0 3rem;color:white;text-align:center;}
        .quiz-hero h1{font-size:clamp(2rem,4vw,2.8rem);margin-bottom:0.5rem;}
        .quiz-hero p{opacity:0.85;max-width:600px;margin:0 auto;}
        .quiz-stats{display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap;margin-top:1.5rem;}
        .quiz-stat{text-align:center;}
        .quiz-stat strong{font-size:1.5rem;display:block;}
        .quiz-stat span{font-size:0.85rem;opacity:0.8;}
        .quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;}
        .quiz-card{background:white;border:1px solid var(--border-color);border-radius:14px;overflow:hidden;transition:all 0.3s;}
        .quiz-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.1);}
        .quiz-card-header{background:linear-gradient(135deg,var(--primary-light),#fce7f0);padding:1.25rem;text-align:center;}
        .quiz-card-header i{font-size:2.5rem;color:var(--primary-color);margin-bottom:0.5rem;display:block;}
        .quiz-card-body{padding:1.25rem;}
        .quiz-card-title{font-weight:600;font-size:1.05rem;margin-bottom:0.5rem;}
        .quiz-card-meta{display:flex;flex-wrap:wrap;gap:0.75rem;font-size:0.8rem;color:var(--text-light);margin-bottom:0.75rem;}
        .quiz-card-meta span{display:flex;align-items:center;gap:0.25rem;}
        .quiz-card-footer{display:flex;gap:0.5rem;padding-top:0.75rem;border-top:1px solid var(--border-light);}
        .quiz-card-footer .btn{flex:1;}
        .quiz-timer{position:fixed;top:0;left:0;right:0;background:var(--primary-color);color:white;padding:0.75rem;display:none;justify-content:space-between;align-items:center;z-index:1000;font-weight:600;}
        .quiz-timer.active{display:flex;}
        .quiz-container{max-width:800px;margin:0 auto;padding:2rem 0;}
        .quiz-question{background:white;border:1px solid var(--border-color);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;}
        .quiz-question h3{font-size:1rem;margin-bottom:1rem;}
        .quiz-option{display:block;padding:0.75rem 1rem;border:2px solid var(--border-color);border-radius:8px;margin-bottom:0.5rem;cursor:pointer;transition:all 0.2s;font-size:0.9rem;}
        .quiz-option:hover{border-color:var(--primary-color);background:rgba(216,68,124,0.05);}
        .quiz-option.selected{border-color:var(--primary-color);background:rgba(216,68,124,0.1);}
        .quiz-option.correct{border-color:#10b981;background:rgba(16,185,129,0.1);}
        .quiz-option.incorrect{border-color:#e74c3c;background:rgba(231,76,60,0.1);}
        .quiz-result{text-align:center;padding:3rem;background:white;border:1px solid var(--border-color);border-radius:14px;margin-top:2rem;}
        .quiz-result .score{font-size:4rem;font-weight:700;color:var(--primary-color);}
        .quiz-result .feedback{font-size:1.1rem;color:var(--text-light);margin:1rem 0;}
        .quiz-nav{display:flex;justify-content:space-between;margin-top:1.5rem;}
        @media(max-width:768px){.quiz-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="quiz-timer" id="quizTimer">
        <span><i class="bi bi-clock"></i> Time Remaining: <span id="timerDisplay">15:00</span></span>
        <button class="btn btn-sm" style="background:white;color:var(--primary-color);" onclick="submitQuiz()">Submit Quiz</button>
    </div>

    <section class="quiz-hero" id="quizHero">
        <div class="container">
            <h1>Quizzes & Exams</h1>
            <p>Test your knowledge, track your progress, and earn certifications with our comprehensive assessment system.</p>
            <div class="quiz-stats">
                <div class="quiz-stat"><strong>25</strong><span>Available Quizzes</span></div>
                <div class="quiz-stat"><strong>156</strong><span>Questions</span></div>
                <div class="quiz-stat"><strong>12</strong><span>Completed</span></div>
                <div class="quiz-stat"><strong>88%</strong><span>Avg Score</span></div>
            </div>
        </div>
    </section>

    <!-- Browse -->
    <section class="section-padding" id="browseSection">
        <div class="container">
            <h2 style="margin-bottom:1.5rem;">Available Quizzes</h2>
            <div class="quiz-grid" id="quizGrid"></div>
        </div>
    </section>

    <!-- Active Quiz -->
    <section class="section-padding" id="activeQuizSection" style="display:none;">
        <div class="quiz-container">
            <h2 id="activeQuizTitle" style="margin-bottom:0.5rem;"></h2>
            <p id="activeQuizMeta" style="color:var(--text-light);margin-bottom:2rem;"></p>
            <div id="quizQuestions"></div>
            <div class="quiz-nav">
                <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()" style="display:none;"><i class="bi bi-arrow-left"></i> Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next <i class="bi bi-arrow-right"></i></button>
            </div>
        </div>
    </section>

    <!-- Result -->
    <section class="section-padding" id="resultSection" style="display:none;">
        <div class="quiz-container">
            <div class="quiz-result" id="quizResult"></div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/auth.js?v=3.4"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/api.js?v=4.0"></script>
    <script>
        let quizzes = [];

        let currentQuiz = null;
        let currentQuestion = 0;
        let answers = {};
        let timerInterval = null;
        let timeLeft = 0;

        async function initQuizzes() {
            if (!isLoggedIn()) {
                sessionStorage.setItem('pending-redirect', 'quizzes.html');
                openAuthModal('login');
                return;
            }

            // Fetch quizzes from API
            try {
                const apiData = await api.fetchJSON('/api/quizzes');
                if (apiData && apiData.length) {
                    quizzes = apiData.map(q => ({
                        id: q.id,
                        title: q.title || 'Quiz',
                        course: q.course_title || q.course || '',
                        questions: q.question_count || (q.questions ? q.questions.length : 0),
                        time: q.time_minutes || 15,
                        difficulty: q.difficulty || 'Beginner',
                        icon: q.icon || 'bi-question-circle',
                        students: q.student_count || 0,
                        score: null,
                        data: (q.questions || []).map(qq => ({
                            q: qq.question || qq.text || '',
                            opts: qq.options || [],
                            correct: qq.correct_answer || qq.correct || 0
                        }))
                    }));
                }
            } catch (e) {}
            }
            // Fetch quizzes from API
            try {
                const apiQuizzes = await api.fetchQuizzes();
                if (apiQuizzes && apiQuizzes.length) {
                    apiQuizzes.forEach(q => {
                        if (!quizzes.find(eq => eq.id === q.id)) {
                            const questions = (q.questions || []).filter(qq => qq);
                            quizzes.push({
                                id: q.id,
                                title: q.title || 'Quiz',
                                course: q.course_id || '',
                                questions: questions.length,
                                time: 15,
                                difficulty: 'Beginner',
                                icon: 'bi-question-circle',
                                students: 0,
                                score: null,
                                data: questions.map(qq => ({
                                    q: qq.question,
                                    opts: qq.options || [],
                                    correct: qq.correct
                                }))
                            });
                        }
                    });
                }
            } catch (e) {}
            renderQuizzes();
        }

        function renderQuizzes() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = quizzes.map(q => `
                <div class="quiz-card">
                    <div class="quiz-card-header">
                        <i class="bi ${q.icon}"></i>
                    </div>
                    <div class="quiz-card-body">
                        <div class="quiz-card-title">${escapeHtml(q.title)}</div>
                        <div style="font-size:0.85rem;color:var(--primary-color);margin-bottom:0.5rem;">${escapeHtml(q.course)}</div>
                        <div class="quiz-card-meta">
                            <span><i class="bi bi-question-circle"></i> ${q.questions} Questions</span>
                            <span><i class="bi bi-clock"></i> ${q.time} min</span>
                            <span><i class="bi bi-bar-chart"></i> ${q.difficulty}</span>
                            <span><i class="bi bi-people"></i> ${q.students}</span>
                        </div>
                        ${q.score !== null ? `<div style="font-size:0.9rem;font-weight:600;color:#10b981;margin-bottom:0.5rem;"><i class="bi bi-check-circle"></i> Score: ${q.score}%</div>` : ''}
                        <div class="quiz-card-footer">
                            <button class="btn btn-primary btn-sm" onclick="startQuiz('${q.id}')">${q.score !== null ? 'Retake' : 'Start Quiz'}</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function startQuiz(id) {
            if (!isLoggedIn()) {
                openAuthModal('login');
                return;
            }
            currentQuiz = quizzes.find(q => q.id === id);
            if (!currentQuiz) return;
            currentQuestion = 0;
            answers = {};
            timeLeft = currentQuiz.time * 60;

            document.getElementById('browseSection').style.display = 'none';
            document.getElementById('quizHero').style.display = 'none';
            document.getElementById('activeQuizSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('activeQuizTitle').textContent = currentQuiz.title;
            document.getElementById('activeQuizMeta').textContent = `${currentQuiz.questions} Questions · ${currentQuiz.time} Minutes · ${currentQuiz.difficulty}`;

            document.getElementById('quizTimer').classList.add('active');
            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const q = currentQuiz.data[currentQuestion];
            const total = currentQuiz.data.length;
            document.getElementById('quizQuestions').innerHTML = `
                <div class="quiz-question">
                    <div style="font-size:0.85rem;color:var(--primary-color);margin-bottom:0.5rem;">Question ${currentQuestion + 1} of ${total}</div>
                    <h3>${escapeHtml(q.q)}</h3>
                    ${q.opts.map((opt, i) => `
                        <label class="quiz-option ${answers[currentQuestion] === i ? 'selected' : ''}" onclick="selectAnswer(${i})">
                            <input type="radio" name="q${currentQuestion}" value="${i}" style="display:none;" ${answers[currentQuestion] === i ? 'checked' : ''}>
                            ${escapeHtml(opt)}
                        </label>
                    `).join('')}
                </div>
            `;
            document.getElementById('prevBtn').style.display = currentQuestion > 0 ? 'block' : 'none';
            document.getElementById('nextBtn').textContent = currentQuestion === total - 1 ? 'Submit Quiz' : 'Next →';
            document.getElementById('nextBtn').onclick = currentQuestion === total - 1 ? submitQuiz : nextQuestion;
        }

        function selectAnswer(idx) {
            answers[currentQuestion] = idx;
            document.querySelectorAll('.quiz-option').forEach((el, i) => {
                el.classList.toggle('selected', i === idx);
            });
        }

        function nextQuestion() {
            if (currentQuestion < currentQuiz.data.length - 1) {
                currentQuestion++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById('timerDisplay').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                if (timeLeft <= 0) submitQuiz();
            }, 1000);
        }

        function submitQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quizTimer').classList.remove('active');

            let correct = 0;
            currentQuiz.data.forEach((q, i) => {
                if (answers[i] === q.correct) correct++;
            });

            const total = currentQuiz.data.length;
            const pct = Math.round((correct / total) * 100);
            currentQuiz.score = pct;

            const feedback = pct >= 80 ? 'Excellent! You have a strong understanding of this topic.' : pct >= 50 ? 'Good effort! Review the material and try again.' : 'Keep studying! Review the lessons and retake the quiz.';

            document.getElementById('browseSection').style.display = 'none';
            document.getElementById('quizHero').style.display = 'none';
            document.getElementById('activeQuizSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';

            document.getElementById('quizResult').innerHTML = `
                <div class="score">${pct}%</div>
                <p style="font-size:1.1rem;font-weight:600;">${correct}/${total} Correct</p>
                <div class="feedback">${feedback}</div>
                <div style="display:flex;gap:0.75rem;justify-content:center;">
                    <button class="btn btn-primary" onclick="startQuiz('${currentQuiz.id}')">Retake Quiz</button>
                    <button class="btn btn-outline" onclick="backToBrowse()">Browse Quizzes</button>
                </div>
            `;
        }

        function backToBrowse() {
            document.getElementById('browseSection').style.display = 'block';
            document.getElementById('quizHero').style.display = 'block';
            document.getElementById('activeQuizSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
            renderQuizzes();
        }

        initQuizzes();
    </script>
</body>
</html>
