<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse flowers, plants, and gardening products by category">
    <title>Category - Flower Ecosystem</title>
    <link rel="stylesheet" href="styles/main.css?v=2.0">
    <link rel="stylesheet" href="styles/landing-redesign.css?v=2.1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .category-hero {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            padding: 3rem 0;
            margin: 0;
            color: white;
            text-align: center;
        }
        .category-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 0.75rem;
        }
        .category-hero .breadcrumb {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 1rem;
        }
        .category-hero .breadcrumb a {
            color: white;
            text-decoration: underline;
        }
        .category-hero p {
            font-size: 1.15rem;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
            line-height: 1.6;
        }
        .category-hero .product-count {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.35rem 1.25rem;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .category-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            padding: 2rem 0;
            min-height: 60vh;
        }
        .filter-sidebar {
            position: sticky;
            top: 2rem;
            align-self: start;
        }
        .filter-sidebar h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }
        .filter-section {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .filter-section h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            margin-bottom: 0.75rem;
        }
        .filter-search {
            width: 100%;
            padding: 0.6rem 0.9rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg-main);
            transition: border-color 0.2s;
        }
        .filter-search:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .filter-checkbox label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-main);
            transition: color 0.2s;
        }
        .filter-checkbox label:hover {
            color: var(--primary-color);
        }
        .filter-checkbox input[type="checkbox"] {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .price-inputs {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .price-inputs input {
            width: 100%;
            padding: 0.5rem;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
        }
        .price-inputs input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .price-inputs span {
            color: var(--text-light);
            font-size: 0.85rem;
        }
        .filter-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .filter-actions button {
            flex: 1;
            padding: 0.55rem;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-apply {
            background: var(--primary-color);
            color: white;
        }
        .btn-clear {
            background: var(--border-color);
            color: var(--text-main);
        }
        .btn-apply:hover {
            opacity: 0.9;
        }
        .btn-clear:hover {
            background: var(--text-light);
            color: white;
        }
        .category-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .category-toolbar .result-count {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .category-toolbar .sort-select {
            padding: 0.5rem 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.85rem;
            background: var(--bg-white);
            cursor: pointer;
        }
        .category-toolbar .sort-select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .mobile-filter-toggle {
            display: none;
            width: 100%;
            padding: 0.65rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 0;
            grid-column: 1 / -1;
            color: var(--text-light);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        .load-more-wrap {
            text-align: center;
            margin-top: 2rem;
        }
        .load-more-wrap button {
            padding: 0.7rem 2rem;
            border: 2px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            border-radius: 25px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .load-more-wrap button:hover {
            background: var(--primary-color);
            color: white;
        }
        .color-swatch {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .color-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @media (max-width: 768px) {
            .category-hero h1 { font-size: 2rem; }
            .category-hero { padding: 2rem 0; }
            .category-layout {
                grid-template-columns: 1fr;
            }
            .filter-sidebar {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 1000;
                padding: 1rem;
                overflow-y: auto;
            }
            .filter-sidebar.open {
                display: block;
            }
            .filter-sidebar-inner {
                background: var(--bg-white);
                border-radius: 12px;
                padding: 1.5rem;
                max-width: 360px;
                margin: 2rem auto;
            }
            .mobile-filter-toggle {
                display: block;
            }
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <main>
        <section class="category-hero" id="categoryHero">
            <div class="container">
                <p class="breadcrumb"><a href="index.html">Home</a> / <a href="marketplace.html">Marketplace</a> / <span id="breadcrumbCat">Category</span></p>
                <h1 id="catTitle">Category</h1>
                <p id="catDescription">Browse our curated collection</p>
                <span class="product-count" id="catCount">Loading...</span>
            </div>
        </section>

        <div class="container">
            <button class="mobile-filter-toggle" id="mobileFilterToggle">
                <i class="bi bi-sliders"></i> Filters
            </button>

            <div class="category-layout">
                <aside class="filter-sidebar" id="filterSidebar">
                    <div class="filter-sidebar-inner">
                        <div class="filter-section">
                            <h4>Search</h4>
                            <input type="text" class="filter-search" id="searchFilter" placeholder="Search products...">
                        </div>

                        <div class="filter-section">
                            <h4>Flower Type</h4>
                            <div class="filter-checkbox">
                                <label><input type="checkbox" value="natural"> Natural</label>
                                <label><input type="checkbox" value="artificial"> Artificial</label>
                                <label><input type="checkbox" value="preserved"> Preserved</label>
                                <label><input type="checkbox" value="dried"> Dried</label>
                            </div>
                        </div>

                        <div class="filter-section">
                            <h4>Price Range</h4>
                            <div class="price-inputs">
                                <input type="number" id="priceMin" placeholder="Min" min="0">
                                <span>—</span>
                                <input type="number" id="priceMax" placeholder="Max" min="0">
                            </div>
                        </div>

                        <div class="filter-section" id="colorFilterSection">
                            <h4>Color</h4>
                            <div class="filter-checkbox" id="colorCheckboxes"></div>
                        </div>

                        <div class="filter-section" id="sellerFilterSection">
                            <h4>Seller</h4>
                            <div class="filter-checkbox" id="sellerCheckboxes"></div>
                        </div>

                        <div class="filter-actions">
                            <button class="btn-apply" id="applyFiltersBtn">Apply</button>
                            <button class="btn-clear" id="clearFiltersBtn">Clear</button>
                        </div>
                    </div>
                </aside>

                <div>
                    <div class="category-toolbar">
                        <span class="result-count" id="resultCount">Showing <span id="shownCount">0</span> of <span id="totalCount">0</span> products</span>
                        <select class="sort-select" id="sortFilter" aria-label="Sort products">
                            <option value="featured">Featured</option>
                            <option value="newest">Newest</option>
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="rating">Highest Rated</option>
                        </select>
                    </div>
                    <div class="product-grid" id="productGrid"></div>
                    <div class="load-more-wrap">
                        <button id="loadMoreBtn" style="display:none;">Load More</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=2.0"></script>
    <script src="js/shared/theme.js?v=2.0"></script>
    <script src="js/shared/auth.js?v=2.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=2.0"></script>
    <script src="js/shared/components.js?v=2.0"></script>
    <script src="js/shared/animations.js?v=2.0"></script>
    <script>
        (() => {
            const PER_PAGE = 8;
            const COLORS = ['red', 'pink', 'white', 'yellow', 'purple', 'green', 'multi', 'orange', 'blue'];
            const COLOR_LABELS = { red: 'Red', pink: 'Pink', white: 'White', yellow: 'Yellow', purple: 'Purple', green: 'Green', multi: 'Multi', orange: 'Orange', blue: 'Blue' };
            const COLOR_HEX = { red: '#e74c3c', pink: '#f472b6', white: '#bdc3c7', yellow: '#f1c40f', purple: '#9b59b6', green: '#27ae60', multi: '#8e44ad', orange: '#e67e22', blue: '#3498db' };

            function renderStars(rating) {
                const full = Math.floor(rating);
                const half = rating - full >= 0.5;
                let stars = '';
                for (let i = 0; i < full; i++) stars += '<i class="bi bi-star-fill" style="color:#f1c40f;font-size:0.8rem;"></i>';
                if (half) stars += '<i class="bi bi-star-half" style="color:#f1c40f;font-size:0.8rem;"></i>';
                for (let i = stars.length / 38; i < 5; i++) stars += '<i class="bi bi-star" style="color:#f1c40f;font-size:0.8rem;"></i>';
                return stars;
            }

            function productCardHTML(p) {
                const badge = p.badge || (p.stockQuantity <= 10 ? 'Low Stock' : '');
                const oldPriceHtml = p.oldPrice ? `<span style="text-decoration:line-through;color:var(--text-light);font-size:0.8rem;margin-right:0.3rem;">$${p.oldPrice.toFixed(2)}</span>` : '';
                const discount = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
                return `
                <div class="product-card">
                    <div class="product-img-wrap">
                        <a href="product-detail.html?id=${p.id}">
                            <img loading="lazy" src="${p.image}" alt="${p.name}" class="product-img">
                        </a>
                        ${badge ? `<span class="product-badge">${badge}</span>` : ''}
                        ${discount ? `<span style="position:absolute;top:0.75rem;left:0.75rem;background:#e74c3c;color:white;padding:0.2rem 0.5rem;border-radius:4px;font-size:0.75rem;font-weight:600;">-${discount}%</span>` : ''}
                        <button class="wishlist-btn" data-id="${p.id}" aria-label="Add to wishlist" style="position:absolute; top:0.75rem; right:0.75rem; background:rgba(255,255,255,0.9); border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center;">
                            <i class="bi bi-heart" style="color:var(--primary-color);"></i>
                        </button>
                    </div>
                    <div class="product-info">
                        <a href="product-detail.html?id=${p.id}" style="text-decoration:none; color:inherit;">
                            <h3 class="product-name">${p.name}</h3>
                        </a>
                        <p class="product-seller">by ${p.seller}</p>
                        <div class="product-rating" style="margin:0.25rem 0;">${renderStars(p.rating)} <span style="font-size:0.8rem; color:var(--text-light);">(${p.reviews})</span></div>
                        <div class="product-footer">
                            <span class="product-price">${oldPriceHtml}$${p.price.toFixed(2)}</span>
                            <button class="btn btn-primary btn-sm add-to-cart-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-image="${p.image}">Add to Cart</button>
                        </div>
                    </div>
                </div>`;
            }

            const heroes = {
                roses: { title: 'Roses Collection', tagline: 'Discover premium rose bouquets, fresh-cut roses, artificial roses, preserved roses, and wedding roses.', subtitle: 'Timeless romance in every petal' },
                bouquets: { title: 'Bouquets Collection', tagline: 'Curated arrangements hand-tied for every moment worth celebrating.', subtitle: 'Beauty in every bundle' },
                orchids: { title: 'Orchids Collection', tagline: 'Exotic phalaenopsis and dendrobium orchids for sophisticated spaces.', subtitle: 'Exotic & sophisticated blooms' },
                wildflowers: { title: 'Wildflowers Collection', tagline: 'Natural, free-spirited blooms that bring the countryside to your home.', subtitle: 'Natural & free-spirited' },
                succulents: { title: 'Succulents Collection', tagline: 'Low-maintenance plants with high visual impact for home and office.', subtitle: 'Low maintenance, high beauty' },
                plants: { title: 'Indoor Plants Collection', tagline: 'Green your living space with our curated selection of indoor plants.', subtitle: 'Green your living space' }
            };

            let allProducts = [];
            let filteredProducts = [];
            let shownCount = PER_PAGE;
            let currentCategory = '';

            async function init() {
                const urlParams = new URLSearchParams(window.location.search);
                currentCategory = urlParams.get('cat') || '';

                if (!currentCategory) {
                    document.getElementById('catTitle').textContent = 'All Products';
                    document.getElementById('catDescription').textContent = 'Browse our entire collection';
                    document.getElementById('breadcrumbCat').textContent = 'All Products';
                } else {
                    const hero = heroes[currentCategory] || {};
                    document.getElementById('catTitle').textContent = hero.title || (currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1));
                    document.getElementById('catDescription').textContent = hero.tagline || 'Browse our curated collection';
                    document.getElementById('breadcrumbCat').textContent = hero.title || currentCategory;
                }

                try {
                    const response = await api.fetchProducts();
                    // Handle both array response and object with products property
                    allProducts = Array.isArray(response) ? response : (response?.products || []);
                } catch (err) {
                    console.error('Failed to load products:', err);
                    allProducts = [];
                    return;
                }

                applyFilters();
                populateColorFilters();
                populateSellerFilters();

                document.getElementById('applyFiltersBtn').addEventListener('click', applyFilters);
                document.getElementById('clearFiltersBtn').addEventListener('click', clearFilters);
                document.getElementById('searchFilter').addEventListener('input', applyFilters);
                document.getElementById('sortFilter').addEventListener('change', applyFilters);
                document.getElementById('loadMoreBtn').addEventListener('click', () => {
                    shownCount += PER_PAGE;
                    renderGrid();
                });

                document.getElementById('mobileFilterToggle').addEventListener('click', () => {
                    document.getElementById('filterSidebar').classList.toggle('open');
                });

                document.getElementById('filterSidebar').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) {
                        e.currentTarget.classList.remove('open');
                    }
                });
            }

            function populateColorFilters() {
                const colors = [...new Set(allProducts.map(p => p.color).filter(Boolean))];
                const container = document.getElementById('colorCheckboxes');
                container.innerHTML = colors.map(c => {
                    const hex = COLOR_HEX[c] || '#ccc';
                    const label = COLOR_LABELS[c] || c;
                    return `<label><input type="checkbox" value="${c}"> <span class="color-option"><span class="color-swatch" style="background:${hex}"></span> ${label}</span></label>`;
                }).join('');
            }

            function populateSellerFilters() {
                const sellers = [...new Set(allProducts.filter(p => p.category === currentCategory || !currentCategory).map(p => p.seller).filter(Boolean))];
                const container = document.getElementById('sellerCheckboxes');
                container.innerHTML = sellers.map(s => `<label><input type="checkbox" value="${s}"> ${s}</label>`).join('');
            }

            function applyFilters() {
                const search = (document.getElementById('searchFilter').value || '').toLowerCase().trim();
                const sort = document.getElementById('sortFilter').value;

                const typeChecks = document.querySelectorAll('#filterSidebar .filter-checkbox:first-of-type input[type="checkbox"]');
                const selectedTypes = [...typeChecks].filter(c => c.checked).map(c => c.value);

                const colorChecks = document.querySelectorAll('#colorCheckboxes input[type="checkbox"]');
                const selectedColors = [...colorChecks].filter(c => c.checked).map(c => c.value);

                const sellerChecks = document.querySelectorAll('#sellerCheckboxes input[type="checkbox"]');
                const selectedSellers = [...sellerChecks].filter(c => c.checked).map(c => c.value);

                const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
                const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;

                filteredProducts = allProducts.filter(p => {
                    if (currentCategory && p.category !== currentCategory) return false;
                    if (search && !p.name.toLowerCase().includes(search) && !p.description.toLowerCase().includes(search)) return false;
                    if (selectedTypes.length && !selectedTypes.includes(p.flowerType)) return false;
                    if (selectedColors.length && !selectedColors.includes(p.color)) return false;
                    if (selectedSellers.length && !selectedSellers.includes(p.seller)) return false;
                    if (p.price < priceMin || p.price > priceMax) return false;
                    return true;
                });

                if (sort === 'price-asc') filteredProducts.sort((a, b) => a.price - b.price);
                else if (sort === 'price-desc') filteredProducts.sort((a, b) => b.price - a.price);
                else if (sort === 'rating') filteredProducts.sort((a, b) => b.rating - a.rating);
                else if (sort === 'newest') filteredProducts.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                else {
                    filteredProducts.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0) || b.rating - a.rating);
                }

                shownCount = PER_PAGE;
                renderGrid();
                document.getElementById('catCount').textContent = `${filteredProducts.length} product${filteredProducts.length !== 1 ? 's' : ''}`;
            }

            function renderGrid() {
                const grid = document.getElementById('productGrid');
                const items = filteredProducts.slice(0, shownCount);
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                const shownCountEl = document.getElementById('shownCount');
                const totalCountEl = document.getElementById('totalCount');

                if (!items.length) {
                    grid.innerHTML = '<div class="empty-state"><i class="bi bi-search"></i><h3>No products found</h3><p>Try adjusting your filters to see more results.</p></div>';
                } else {
                    grid.innerHTML = items.map(productCardHTML).join('');
                }

                shownCountEl.textContent = Math.min(shownCount, filteredProducts.length);
                totalCountEl.textContent = filteredProducts.length;
                loadMoreBtn.style.display = shownCount < filteredProducts.length ? '' : 'none';
            }

            function clearFilters() {
                document.querySelectorAll('#filterSidebar input[type="checkbox"]').forEach(c => c.checked = false);
                document.getElementById('searchFilter').value = '';
                document.getElementById('priceMin').value = '';
                document.getElementById('priceMax').value = '';
                document.getElementById('sortFilter').value = 'featured';
                applyFilters();
            }

            init();
        })();
    </script>
    <script>
        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    this.parentElement.classList.toggle('mobile-open');
                }
            });
        });
    </script>
</body>
</html>
