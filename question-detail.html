<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Question detail - Flower Ecosystem Q&A">
    <title>Question | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=2.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .back-link { display:inline-flex; align-items:center; gap:0.4rem; font-size:0.88rem; color:var(--text-light); margin-bottom:1rem; text-decoration:none; }
        .back-link:hover { color:var(--primary-color); }
        .detail-layout { display:grid; grid-template-columns:1fr 280px; gap:2rem; }
        .detail-main { min-width:0; }
        .detail-sidebar { display:flex; flex-direction:column; gap:1.25rem; }
        .question-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.5rem; margin-bottom:1.5rem; }
        .q-header { display:flex; gap:1rem; align-items:start; }
        .q-vote { display:flex; flex-direction:column; align-items:center; gap:0.25rem; }
        .q-vote button { width:32px; height:32px; border:1px solid var(--border-color); border-radius:var(--radius-sm); background:var(--bg-white); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
        .q-vote button:hover { border-color:var(--primary-color); color:var(--primary-color); }
        .q-vote .count { font-weight:600; font-size:0.95rem; }
        .q-title { font-size:1.3rem; font-weight:700; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.5rem; }
        .q-title .solved { background:var(--accent-green); color:white; font-size:0.7rem; padding:0.15rem 0.5rem; border-radius:4px; }
        .q-meta { display:flex; gap:1rem; flex-wrap:wrap; font-size:0.82rem; color:var(--text-light); margin-bottom:1rem; }
        .q-content { font-size:0.95rem; line-height:1.7; color:var(--text-main); white-space:pre-wrap; }
        .q-images { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:1rem; }
        .q-images img { max-width:200px; max-height:150px; border-radius:var(--radius-sm); object-fit:cover; cursor:pointer; border:1px solid var(--border-color); }
        .answers-header { display:flex; justify-content:space-between; align-items:center; margin:1.5rem 0 1rem; }
        .answer-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.25rem; margin-bottom:0.75rem; }
        .answer-card.accepted { border-color:var(--accent-green); border-left:3px solid var(--accent-green); background:rgba(16,185,129,0.02); }
        .a-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
        .a-author { display:flex; gap:0.5rem; align-items:center; }
        .a-avatar { width:32px; height:32px; border-radius:50%; background:var(--bg-light); display:flex; align-items:center; justify-content:center; font-size:0.8rem; overflow:hidden; }
        .a-avatar img { width:100%; height:100%; object-fit:cover; }
        .a-name { font-weight:500; font-size:0.88rem; }
        .a-role { font-size:0.75rem; color:var(--text-muted); }
        .accepted-badge { display:inline-flex; align-items:center; gap:0.25rem; background:var(--accent-green); color:white; font-size:0.7rem; padding:0.15rem 0.5rem; border-radius:4px; }
        .a-content { font-size:0.9rem; line-height:1.7; color:var(--text-main); margin-bottom:0.5rem; white-space:pre-wrap; }
        .a-footer { display:flex; gap:0.75rem; align-items:center; padding-top:0.5rem; border-top:1px solid var(--border-light); }
        .a-footer button { background:none; border:none; cursor:pointer; font-size:0.8rem; color:var(--text-light); display:flex; align-items:center; gap:0.25rem; }
        .a-footer button:hover { color:var(--primary-color); }
        .reply-box { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.25rem; margin-top:1rem; }
        .reply-box textarea { width:100%; min-height:120px; padding:0.75rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-family:inherit; font-size:0.9rem; resize:vertical; }
        .reply-box textarea:focus { outline:none; border-color:var(--primary-color); }
        .sidebar-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.25rem; }
        .sidebar-card h3 { font-size:0.9rem; margin-bottom:0.75rem; }
        .leaderboard-item { display:flex; align-items:center; gap:0.5rem; padding:0.35rem 0; font-size:0.82rem; }
        .leaderboard-rank { width:20px; font-weight:600; color:var(--text-muted); }
        .leaderboard-score { margin-left:auto; font-size:0.75rem; color:var(--primary-color); font-weight:500; }
        .login-prompt { text-align:center; padding:2rem; color:var(--text-light); }
        .login-prompt a { color:var(--primary-color); text-decoration:underline; }
        .empty-state { text-align:center; padding:2rem; color:var(--text-light); }
        @media(max-width:1024px) { .detail-layout { grid-template-columns:1fr; } .detail-sidebar { display:none; } }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="section-padding" style="padding-top:2rem;">
        <div class="container">
            <a href="questions.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Questions</a>
            <div id="questionContent"></div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=2.0"></script>
    <script src="js/shared/theme.js?v=2.0"></script>
    <script src="js/shared/auth.js?v=2.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=2.0"></script>
    <script src="js/shared/components.js?v=2.0"></script>
    <script src="js/shared/animations.js?v=2.0"></script>
    <script src="js/qa.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => initQuestionDetail());</script>
</body>
</html>
