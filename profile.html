<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="User Profile | Flower Ecosystem">
    <title>User Profile | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .profile-hero { padding:0;margin-top:65px;position:relative; }
        .profile-cover-wrap { height:200px;background:linear-gradient(135deg,#fdf2f8,#fce7f3,#f5d0fe);overflow:hidden;position:relative; }
        .profile-cover-wrap img { width:100%;height:100%;object-fit:cover; }
        .profile-cover-overlay { position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,0.3)); }
        .profile-hero-inner { display:flex;align-items:flex-end;gap:1.5rem;padding:0 1rem 1.25rem;margin-top:-50px;position:relative;z-index:2; }
        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #e84393);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            flex-shrink: 0;
            border: 4px solid white;
            box-shadow: 0 4px 20px rgba(216, 68, 124, 0.25);
            overflow: hidden;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { flex: 1; padding-bottom: 0.25rem; }
        .profile-name { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.15rem; }
        .profile-role {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.2rem 0.65rem;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .profile-joined { font-size:0.85rem;color:var(--text-light);margin-top:0.35rem; }
        .profile-location { font-size:0.82rem;color:var(--text-light);margin:0.15rem 0; }
        .profile-social { display:flex;gap:0.5rem;margin:0.35rem 0; }
        .profile-social a { width:30px;height:30px;border-radius:50%;background:var(--bg-light);display:flex;align-items:center;justify-content:center;color:var(--text-light);text-decoration:none;font-size:0.82rem;transition:all 0.2s; }
        .profile-social a:hover { background:var(--primary-color);color:white; }
        .profile-stats-row { display:flex;gap:2rem;margin-top:0.75rem; }
        .profile-stat { font-size:0.88rem;color:var(--text-main); }
        .profile-stat strong { color:var(--primary-color); }
        .profile-body { padding: 2rem 0 4rem; }
        .profile-grid { display:grid;grid-template-columns:1fr 320px;gap:2rem;align-items:start; }
        .ps-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:0.75rem; }
        .ps-item { border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-color);cursor:pointer;transition:all 0.2s; }
        .ps-item:hover { border-color:var(--primary-color);transform:translateY(-2px);box-shadow:var(--shadow-sm); }
        .ps-item img { width:100%;height:140px;object-fit:cover;display:block; }
        .ps-item-body { padding:0.5rem; }
        .ps-item-title { font-size:0.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .ps-item-meta { font-size:0.72rem;color:var(--text-muted); }

        /* Tabs */
        .profile-tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border-light);
            margin-bottom: 1.5rem;
        }
        .profile-tab {
            padding: 0.75rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-light);
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s ease;
        }
        .profile-tab:hover { color: var(--text-main); }
        .profile-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            font-weight: 600;
        }

        /* Tab content */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Cards */
        .activity-card {
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 1.15rem 1.25rem;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s ease;
            cursor: pointer;
        }
        .activity-card:hover { border-color: var(--primary-color); }
        .activity-card .ac-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.35rem;
        }
        .activity-card .ac-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.35;
        }
        .activity-card .ac-tag {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.15rem 0.5rem;
            border-radius: 50px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ac-tag.discussion { background: rgba(14,165,233,0.1); color: var(--accent-blue); }
        .ac-tag.question { background: rgba(245,158,11,0.1); color: var(--accent-gold); }
        .ac-tag.story { background: rgba(16,185,129,0.1); color: var(--accent-green); }
        .ac-tag.showcase { background: rgba(236,72,153,0.1); color: #ec4899; }
        .ac-tag.review { background: rgba(216,68,124,0.1); color: var(--primary-color); }
        .activity-card .ac-excerpt {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .activity-card .ac-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .activity-card .ac-meta i { margin-right: 0.2rem; }

        /* Sidebar */
        .sidebar-card {
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .sidebar-card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .sidebar-card h3 i { color: var(--primary-color); }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .badge-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.7rem;
            background: var(--bg-light);
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .top-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.85rem;
        }
        .top-item:last-child { border-bottom: none; }
        .top-item .top-rank {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-light);
            flex-shrink: 0;
        }
        .top-item .top-rank.gold { background: #fef3c7; color: #d97706; }
        .top-item .top-rank.silver { background: #f1f5f9; color: #64748b; }
        .top-item .top-rank.bronze { background: #fed7aa; color: #c2410c; }
        .top-item .top-title { flex: 1; color: var(--text-main); }
        .top-item .top-meta { font-size: 0.75rem; color: var(--text-muted); }

        .profile-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }
        .profile-empty i { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; opacity: 0.4; }

        @media (max-width: 900px) {
            .profile-grid { grid-template-columns: 1fr; }
            .profile-hero-inner { flex-direction: column; align-items: center; text-align: center; }
            .profile-stats-row { justify-content: center; }
        }
        @media (max-width: 480px) {
            .profile-avatar { width: 80px; height: 80px; font-size: 2rem; }
            .profile-name { font-size: 1.35rem; }
            .profile-tabs { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <!-- Profile Hero -->
    <div class="profile-hero" id="profileHero" style="display:none;">
        <div class="profile-cover-wrap" id="profileCover">
            <div class="profile-cover-overlay"></div>
        </div>
        <div class="container">
            <div class="profile-hero-inner">
                <div class="profile-avatar" id="profileAvatar"><i class="bi bi-person"></i></div>
                <div class="profile-info">
                    <h1 class="profile-name" id="profileName">Loading...</h1>
                    <div>
                        <span class="profile-role" id="profileRole">Member</span>
                    </div>
                    <div class="profile-joined" id="profileJoined"></div>
                    <div class="profile-location" id="profileLocation"></div>
                    <div class="profile-social" id="profileSocial"></div>
                    <div id="profileFollowBtn" style="margin:0.35rem 0;"></div>
                    <div id="profileRep" style="margin:0.25rem 0;display:flex;align-items:center;gap:0.5rem;"></div>
                    <div class="profile-stats-row" id="profileStats"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="profileLoading" style="text-align:center; padding:6rem 2rem; color:var(--text-light);">
        <div class="spinner" style="margin:0 auto 1rem; width:32px; height:32px; border:3px solid var(--border-color); border-top-color:var(--primary-color); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
        <p>Loading profile...</p>
    </div>

    <!-- Not found -->
    <div id="profileNotFound" style="display:none; text-align:center; padding:6rem 2rem;">
        <i class="bi bi-person-x" style="font-size:3rem; color:var(--text-light); display:block; margin-bottom:1rem;"></i>
        <h2>User Not Found</h2>
        <p style="color:var(--text-light); margin-bottom:1.5rem;">This profile doesn't exist or has been removed.</p>
        <a href="index.html" class="btn btn-primary">Go Home</a>
    </div>

    <!-- Profile Body -->
    <div class="profile-body" id="profileBody" style="display:none;">
        <div class="container">
            <div class="profile-grid">
                <!-- Main Content -->
                <div>
                    <div class="profile-tabs">
                        <button class="profile-tab active" data-tab="activity">Activity</button>
                        <button class="profile-tab" data-tab="discussions">Discussions</button>
                        <button class="profile-tab" data-tab="questions">Questions</button>
                        <button class="profile-tab" data-tab="stories">Stories</button>
                        <button class="profile-tab" data-tab="showcase">Showcase</button>
                        <button class="profile-tab" data-tab="reviews">Reviews</button>
                        <button class="profile-tab" data-tab="settings">Settings</button>
                    </div>

                    <div id="tab-activity" class="tab-panel active"></div>
                    <div id="tab-discussions" class="tab-panel"></div>
                    <div id="tab-questions" class="tab-panel"></div>
                    <div id="tab-stories" class="tab-panel"></div>
                    <div id="tab-showcase" class="tab-panel"></div>
                    <div id="tab-reviews" class="tab-panel"></div>
                    <div id="tab-settings" class="tab-panel"></div>
                </div>

                <!-- Sidebar -->
                <div>
                    <div class="sidebar-card">
                        <h3><i class="bi bi-person-badge"></i> About</h3>
                        <p id="profileAbout" style="font-size:0.85rem; color:var(--text-light); line-height:1.6;"></p>
                    </div>

                    <div class="sidebar-card" id="profileRepCard" style="display:none;">
                        <h3><i class="bi bi-graph-up-arrow" style="color:var(--accent-gold);"></i> Reputation</h3>
                        <div id="profileRepContent"></div>
                    </div>

                    <div class="sidebar-card">
                        <h3><i class="bi bi-award"></i> Badges</h3>
                        <div class="badge-list" id="profileBadges"></div>
                    </div>

                    <div class="sidebar-card">
                        <h3><i class="bi bi-trophy"></i> Top Contributions</h3>
                        <div id="profileTopContributions"></div>
                    </div>

                    <div class="sidebar-card" id="profilePortfolioCard" style="display:none;">
                        <h3><i class="bi bi-images"></i> Latest Projects</h3>
                        <div id="profilePortfolioGrid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=5.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.7"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script>
        const ROLE_LABELS = {
            CUSTOMER: 'Customer', SELLER: 'Seller', FLORIST: 'Florist',
            GROWER: 'Grower', ADMIN: 'Admin', SUPERADMIN: 'Super Admin', MODERATOR: 'Moderator'
        };
        const ROLE_COLORS = {
            CUSTOMER: '#64748b', SELLER: '#8b5cf6', FLORIST: '#ec4899',
            GROWER: '#10b981', ADMIN: '#ef4444', SUPERADMIN: '#ef4444', MODERATOR: '#f59e0b'
        };

        function formatDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function timeAgo(d) {
            if (!d) return '';
            const s = Math.floor((Date.now() - new Date(d)) / 1000);
            if (s < 60) return 'just now';
            if (s < 3600) return Math.floor(s / 60) + 'm ago';
            if (s < 86400) return Math.floor(s / 3600) + 'h ago';
            if (s < 2592000) return Math.floor(s / 86400) + 'd ago';
            return formatDate(d);
        }

        function renderStars(rating) {
            const r = Number(rating) || 0;
            const f = Math.floor(r);
            const h = r - f >= 0.5;
            let s = '';
            for (let i = 0; i < f; i++) s += '<i class="bi bi-star-fill" style="color:#f59e0b;"></i>';
            if (h) s += '<i class="bi bi-star-half" style="color:#f59e0b;"></i>';
            for (let i = 0; i < 5 - f - (h ? 1 : 0); i++) s += '<i class="bi bi-star" style="color:var(--border-color);"></i>';
            return s;
        }

        function renderDiscussion(d) {
            return `
                <div class="activity-card" onclick="window.location.href='discussion-detail.html?id=${d.id}'">
                    <div class="ac-header">
                        <div class="ac-title">${escapeHtml(d.title)}</div>
                        <span class="ac-tag discussion">Discussion</span>
                    </div>
                    <div class="ac-excerpt">${escapeHtml(d.excerpt || d.content || '')}</div>
                    <div class="ac-meta">
                        <span><i class="bi bi-chat-dots"></i> ${d.reply_count || 0} replies</span>
                        <span><i class="bi bi-eye"></i> ${d.views || 0} views</span>
                        <span><i class="bi bi-clock"></i> ${timeAgo(d.created_at)}</span>
                    </div>
                </div>`;
        }

        function renderQuestion(q) {
            return `
                <div class="activity-card" onclick="window.location.href='question-detail.html?id=${q.id}'">
                    <div class="ac-header">
                        <div class="ac-title">${escapeHtml(q.title)}</div>
                        <span class="ac-tag question">Question</span>
                    </div>
                    <div class="ac-excerpt">${escapeHtml(q.excerpt || q.content || '')}</div>
                    <div class="ac-meta">
                        <span><i class="bi bi-check-circle"></i> ${q.answer_count || 0} answers</span>
                        <span><i class="bi bi-eye"></i> ${q.views || 0} views</span>
                        <span><i class="bi bi-clock"></i> ${timeAgo(q.created_at)}</span>
                    </div>
                </div>`;
        }

        function renderStory(s) {
            return `
                <div class="activity-card" onclick="window.location.href='success-story-detail.html?id=${s.id}'">
                    <div class="ac-header">
                        <div class="ac-title">${escapeHtml(s.title)}</div>
                        <span class="ac-tag story">Story</span>
                    </div>
                    <div class="ac-excerpt">${escapeHtml((s.content || s.story || '').slice(0, 200))}</div>
                    <div class="ac-meta">
                        <span><i class="bi bi-heart"></i> ${s.like_count || s.likes || 0} likes</span>
                        <span><i class="bi bi-eye"></i> ${s.views || 0} views</span>
                        <span><i class="bi bi-clock"></i> ${timeAgo(s.created_at)}</span>
                    </div>
                </div>`;
        }

        function renderReview(r) {
            return `
                <div class="activity-card" onclick="window.location.href='product-detail.html?id=${r.product_id || ''}'">
                    <div class="ac-header">
                        <div class="ac-title">${escapeHtml(r.product_name || 'Product Review')}</div>
                        <span class="ac-tag review">Review</span>
                    </div>
                    <div style="color:#f59e0b; font-size:0.85rem; margin-bottom:0.35rem;">${renderStars(r.rating)}</div>
                    <div class="ac-excerpt">${escapeHtml(r.text || r.review || r.comment || '')}</div>
                    <div class="ac-meta">
                        <span><i class="bi bi-clock"></i> ${timeAgo(r.created_at)}</span>
                    </div>
                </div>`;
        }

        function emptyState(icon, text) {
            return `<div class="profile-empty"><i class="bi ${icon}"></i><p>${text}</p></div>`;
        }

        async function loadProfile() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('id');
            if (!userId) {
                if (isLoggedIn()) {
                    window.location.href = 'profile.html?id=' + getCurrentUser().id;
                    return;
                }
                document.getElementById('profileLoading').style.display = 'none';
                document.getElementById('profileNotFound').style.display = 'block';
                return;
            }

            let user;
            try {
                const r = await apiFetch('/api/users/' + userId);
                user = r.user || r;
                if (!user || !user.id) throw new Error('Not found');
            } catch {
                document.getElementById('profileLoading').style.display = 'none';
                document.getElementById('profileNotFound').style.display = 'block';
                return;
            }

            document.getElementById('profileLoading').style.display = 'none';
            document.getElementById('profileHero').style.display = '';
            document.getElementById('profileBody').style.display = '';

            const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ') || user.email || 'User';
            const role = ROLE_LABELS[user.role] || user.role || 'Member';
            const roleColor = ROLE_COLORS[user.role] || '#64748b';

            document.title = fullName + ' | Flower Ecosystem';
            document.getElementById('profileName').textContent = fullName;
            document.getElementById('profileRole').textContent = role;
            document.getElementById('profileRole').style.background = roleColor;
            document.getElementById('profileJoined').textContent = 'Joined ' + formatDate(user.created_at);

            if (user.profile_image) {
                document.getElementById('profileAvatar').innerHTML = '<img src="' + escapeHtml(user.profile_image) + '" alt="' + escapeHtml(fullName) + '">';
            } else {
                document.getElementById('profileAvatar').innerHTML = '<i class="bi bi-person"></i>';
            }

            // Cover image
            if (user.cover_image) {
                document.getElementById('profileCover').innerHTML = '<img src="' + escapeHtml(user.cover_image) + '" alt=""><div class="profile-cover-overlay"></div>';
            }

            // Location
            if (user.location || user.city) {
                document.getElementById('profileLocation').textContent = '📍 ' + (user.city ? escapeHtml(user.city) + (user.location ? ', ' : '') : '') + (user.location ? escapeHtml(user.location) : '');
            }

            // Social links
            const socialEl = document.getElementById('profileSocial');
            const socialLinks = [];
            if (user.website) socialLinks.push({ url: user.website, icon: 'bi-globe2', label: 'Website' });
            if (user.social_instagram) socialLinks.push({ url: 'https://instagram.com/' + user.social_instagram, icon: 'bi-instagram', label: 'Instagram' });
            if (user.social_facebook) socialLinks.push({ url: 'https://facebook.com/' + user.social_facebook, icon: 'bi-facebook', label: 'Facebook' });
            if (user.social_twitter) socialLinks.push({ url: 'https://twitter.com/' + user.social_twitter, icon: 'bi-twitter-x', label: 'Twitter' });
            socialEl.innerHTML = socialLinks.map(l => '<a href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener" title="' + escapeHtml(l.label) + '"><i class="bi ' + l.icon + '"></i></a>').join('');

            // Follow button
            loadFollowButton(user.id);

            if (user.description) {
                document.getElementById('profileAbout').textContent = user.description;
            } else {
                document.getElementById('profileAbout').textContent = role + ' on Flower Ecosystem.';
            }

            loadStats(user.id);
            loadDiscussions(user.id);
            loadBadges(user);
            loadTopContributions(user.id);
            loadReputation(user.id);
            loadActivity(user.id);
            loadPortfolio(user.id);
        }

        async function loadStats(userId) {
            let counts = { discussions: 0, questions: 0, stories: 0, reviews: 0, showcase: 0 };
            try {
                const r = await apiFetch('/api/users/' + userId + '/stats');
                Object.assign(counts, r);
            } catch {}

            document.getElementById('profileStats').innerHTML = `
                <div class="profile-stat"><strong>${counts.discussions}</strong> discussions</div>
                <div class="profile-stat"><strong>${counts.questions}</strong> questions</div>
                <div class="profile-stat"><strong>${counts.showcase}</strong> showcase</div>
                <div class="profile-stat"><strong>${counts.stories}</strong> stories</div>
            `;
        }

        async function loadDiscussions(userId) {
            let items = [];
            try {
                const r = await apiFetch('/api/users/' + userId + '/discussions');
                items = r.discussions || r || [];
            } catch {}
            const el = document.getElementById('tab-discussions');
            el.innerHTML = items.length
                ? items.slice(0, 10).map(renderDiscussion).join('')
                : emptyState('bi-chat-dots', 'No discussions yet.');
        }

        async function loadQuestions(userId) {
            let items = [];
            try {
                const r = await apiFetch('/api/users/' + userId + '/questions');
                items = r.questions || r || [];
            } catch {}
            const el = document.getElementById('tab-questions');
            el.innerHTML = items.length
                ? items.slice(0, 10).map(renderQuestion).join('')
                : emptyState('bi-question-circle', 'No questions yet.');
        }

        async function loadStories(userId) {
            let items = [];
            try {
                const r = await apiFetch('/api/users/' + userId + '/stories');
                items = r.stories || r || [];
            } catch {}
            const el = document.getElementById('tab-stories');
            el.innerHTML = items.length
                ? items.slice(0, 10).map(renderStory).join('')
                : emptyState('bi-heart', 'No stories shared yet.');
        }

        async function loadShowcase(userId) {
            let items = [];
            try {
                const r = await apiFetch('/api/users/' + userId + '/showcase');
                items = r.showcase || [];
            } catch {}
            const el = document.getElementById('tab-showcase');
            if (!items.length) { el.innerHTML = emptyState('bi-image', 'No showcase projects yet.'); return; }
            el.innerHTML = '<div class="ps-grid">' + items.map(p => {
                const img = p.images && p.images.length ? p.images[0] : '';
                return '<div class="ps-item" onclick="window.location.href=\'showcase-detail.html?id=' + p.id + '\'">' +
                    (img ? '<img src="' + escapeHtml(img) + '" alt="" loading="lazy">' : '<div style="height:140px;background:var(--bg-light);display:flex;align-items:center;justify-content:center;"><i class="bi bi-flower1" style="font-size:2rem;color:var(--text-muted);"></i></div>') +
                    '<div class="ps-item-body"><div class="ps-item-title">' + escapeHtml(p.title || '') + '</div>' +
                    '<div class="ps-item-meta"><i class="bi bi-chat-dots"></i> ' + (p.comment_count || 0) + '</div></div></div>';
            }).join('') + '</div>';
        }

        async function loadFollowButton(userId) {
            const el = document.getElementById('profileFollowBtn');
            const currentUserId = isLoggedIn() ? (getCurrentUser()?.id || null) : null;
            if (!currentUserId || currentUserId === userId) { el.innerHTML = ''; return; }
            try {
                const r = await apiFetch('/api/users/' + userId + '/follow-check');
                el.innerHTML = r.following
                    ? '<button class="btn btn-sm btn-outline" onclick="unfollow(\'' + userId + '\')"><i class="bi bi-person-check"></i> Following</button>'
                    : '<button class="btn btn-sm btn-primary" onclick="follow(\'' + userId + '\')"><i class="bi bi-person-plus"></i> Follow</button>';
            } catch { el.innerHTML = ''; }
        }

        async function follow(userId) {
            if (!isLoggedIn()) { if (typeof openAuthModal === 'function') openAuthModal('login'); return; }
            try {
                await fetch('/api/users/' + userId + '/follow', { method: 'POST', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('flower-token') } });
                loadFollowButton(userId);
            } catch {}
        }

        async function unfollow(userId) {
            try {
                await fetch('/api/users/' + userId + '/follow', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('flower-token') } });
                loadFollowButton(userId);
            } catch {}
        }

        async function loadReviews(userId) {
            let items = [];
            try {
                const r = await apiFetch('/api/users/' + userId + '/reviews');
                items = r.reviews || r || [];
            } catch {}
            const el = document.getElementById('tab-reviews');
            el.innerHTML = items.length
                ? items.slice(0, 10).map(renderReview).join('')
                : emptyState('bi-star', 'No reviews yet.');
        }

        function badgeLevelColor(level) {
            const m = { bronze: '#cd7f32', silver: '#9ca3af', gold: '#f59e0b', platinum: '#a78bfa', diamond: '#06b6d4' };
            return m[level] || '#9ca3af';
        }

        async function loadBadges(user) {
            const el = document.getElementById('profileBadges');
            // Role badges (always shown)
            const roleBadges = [];
            if (user.role === 'SELLER' || user.role === 'FLORIST') roleBadges.push({ icon: 'bi-shop', label: 'Seller' });
            if (user.role === 'GROWER') roleBadges.push({ icon: 'bi-flower2', label: 'Grower' });
            if (user.role === 'ADMIN' || user.role === 'SUPERADMIN') roleBadges.push({ icon: 'bi-shield-check', label: 'Admin' });
            if (user.role === 'MODERATOR') roleBadges.push({ icon: 'bi-shield', label: 'Moderator' });

            // Load earned badges from API
            let earnedBadges = [];
            try {
                earnedBadges = await apiFetch('/api/badges/user/' + user.id) || [];
            } catch {}

            const all = [
                ...roleBadges.map(b => ({ label: b.label, icon: '<i class="bi ' + b.icon + '"></i>' })),
                ...earnedBadges.map(b => ({ label: b.name, icon: b.icon || '🏆', color: badgeLevelColor(b.level) }))
            ];

            el.innerHTML = all.length
                ? all.map(b => `<span class="badge-item"${b.color ? ' style="border:1px solid ' + b.color + ';background:' + b.color + '10;"' : ''}>${b.icon} ${b.label}</span>`).join('')
                : '<p style="font-size:0.82rem; color:var(--text-muted);">No badges earned yet.</p>';
        }

        async function loadTopContributions(userId) {
            const el = document.getElementById('profileTopContributions');
            el.innerHTML = '<p style="font-size:0.82rem; color:var(--text-muted);">Loading...</p>';
            try {
                const r = await apiFetch('/api/users/' + userId + '/contributions');
                const items = r.contributions || [];
                if (!items.length) {
                    el.innerHTML = '<p style="font-size:0.82rem; color:var(--text-muted);">No contributions yet.</p>';
                    return;
                }
                el.innerHTML = items.slice(0, 5).map((c, i) => {
                    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                    return `
                        <div class="top-item">
                            <span class="top-rank ${rankClass}">${i + 1}</span>
                            <span class="top-title">${escapeHtml(c.title || c.name || 'Activity')}</span>
                            <span class="top-meta">${c.count || c.score || 0}</span>
                        </div>`;
                }).join('');
            } catch {
                el.innerHTML = '<p style="font-size:0.82rem; color:var(--text-muted);">Could not load contributions.</p>';
            }
        }

        async function loadReputation(userId) {
            try {
                const r = await apiFetch('/api/members/' + userId + '/reputation');
                if (!r) return;
                const stars = Math.min(5, Math.max(1, Math.ceil(r.level / 5)));
                document.getElementById('profileRep').innerHTML = '<span class="badge-item" style="font-size:0.78rem;"><i class="bi bi-graph-up-arrow"></i> Lvl ' + r.level + ' ' + escapeHtml(r.title) + '</span><span style="font-size:0.75rem;color:var(--text-muted);"><i class="bi bi-star-fill" style="color:var(--accent-gold);"></i> ' + r.points + ' pts</span>';
                document.getElementById('profileRepCard').style.display = 'block';
                document.getElementById('profileRepContent').innerHTML =
                    '<div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;"><span style="font-size:0.82rem;">Level ' + r.level + '</span><span style="font-size:0.82rem;color:var(--accent-gold);">' + '★'.repeat(stars) + '☆'.repeat(5 - stars) + '</span></div>' +
                    '<div style="font-size:1.2rem;font-weight:700;color:var(--primary-color);margin-bottom:0.25rem;">' + formatNumber(r.points) + ' Reputation</div>' +
                    '<div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem;">Top ' + r.percentile + '%</div>' +
                    '<div style="font-size:0.82rem;color:var(--text-light);">' + escapeHtml(r.title) + '</div>' +
                    (r.best_answers ? '<div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.25rem;"><i class="bi bi-check-circle" style="color:var(--accent-green);"></i> ' + r.best_answers + ' best answers</div>' : '');
            } catch {}
        }

        function renderActivityItem(activity) {
            const typeColors = { discussion: '#0ea5e9', question: '#f59e0b', story: '#10b981', showcase: '#ec4899' };
            const typeIcons = { discussion: 'bi-chat-dots', question: 'bi-question-circle', story: 'bi-heart', showcase: 'bi-images' };
            const typeLabels = { discussion: 'Discussion', question: 'Question', story: 'Story', showcase: 'Showcase' };
            const links = { discussion: 'discussion-detail.html?id=', question: 'question-detail.html?id=', story: 'success-story-detail.html?id=', showcase: 'showcase-detail.html?id=' };
            const link = links[activity.type] ? links[activity.type] + (activity.id || '') : '';
            const color = typeColors[activity.type] || 'var(--text-light)';
            return '<div class="activity-card" style="padding:0.65rem 1rem;' + (link ? 'cursor:pointer;" onclick="window.location.href=\'' + link + '\'"' : '"') + '>' +
                '<div class="ac-header"><div class="ac-title" style="font-size:0.85rem;display:flex;align-items:center;gap:0.4rem;">' +
                '<span style="color:' + color + ';"><i class="bi ' + (typeIcons[activity.type] || 'bi-circle') + '"></i></span> ' +
                escapeHtml(activity.label || '') +
                '</div><span class="ac-tag ' + activity.type + '">' + (typeLabels[activity.type] || activity.type) + '</span></div>' +
                '<div class="ac-meta"><span><i class="bi bi-clock"></i> ' + timeAgo(activity.created_at) + '</span></div></div>';
        }

        async function loadActivity(userId) {
            const el = document.getElementById('tab-activity');
            el.innerHTML = '<p style="font-size:0.85rem;color:var(--text-muted);padding:1rem;">Loading...</p>';
            try {
                const r = await apiFetch('/api/members/' + userId + '/activity');
                if (!r || !r.length) { el.innerHTML = emptyState('bi-clock-history', 'No recent activity.'); return; }
                el.innerHTML = r.map(a => renderActivityItem(a)).join('');
            } catch { el.innerHTML = emptyState('bi-clock-history', 'Could not load activity.'); }
        }

        async function loadPortfolio(userId) {
            const card = document.getElementById('profilePortfolioCard');
            const grid = document.getElementById('profilePortfolioGrid');
            try {
                const r = await apiFetch('/api/users/' + userId + '/showcase');
                const items = r.showcase || [];
                if (!items.length) { card.style.display = 'none'; return; }
                card.style.display = 'block';
                grid.innerHTML = '<div class="ps-grid">' + items.slice(0, 3).map(p => {
                    const img = p.images && p.images.length ? p.images[0] : '';
                    return '<div class="ps-item" onclick="window.location.href=\'showcase-detail.html?id=' + p.id + '\'">' +
                        (img ? '<img src="' + escapeHtml(img) + '" alt="" loading="lazy">' : '<div style="height:100px;background:var(--bg-light);display:flex;align-items:center;justify-content:center;"><i class="bi bi-flower1" style="font-size:1.5rem;color:var(--text-muted);"></i></div>') +
                        '<div class="ps-item-body"><div class="ps-item-title">' + escapeHtml(p.title || '') + '</div></div></div>';
                }).join('') + '</div>';
            } catch { card.style.display = 'none'; }
        }

        // Tab switching
        document.querySelectorAll('.profile-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                const panel = document.getElementById('tab-' + tab.dataset.tab);
                if (panel) panel.classList.add('active');

                // Lazy load content
                const tabName = tab.dataset.tab;
                const params = new URLSearchParams(window.location.search);
                const userId = params.get('id');
                if (!userId) return;
                if (tabName === 'activity' && !panel.dataset.loaded) { loadActivity(userId); panel.dataset.loaded = '1'; }
                if (tabName === 'questions' && !panel.dataset.loaded) { loadQuestions(userId); panel.dataset.loaded = '1'; }
                if (tabName === 'stories' && !panel.dataset.loaded) { loadStories(userId); panel.dataset.loaded = '1'; }
                if (tabName === 'showcase' && !panel.dataset.loaded) { loadShowcase(userId); panel.dataset.loaded = '1'; }
                if (tabName === 'reviews' && !panel.dataset.loaded) { loadReviews(userId); panel.dataset.loaded = '1'; }
                if (tabName === 'settings' && !panel.dataset.loaded) { loadSettings(); panel.dataset.loaded = '1'; }
            });
        });

        function loadSettings() {
            const user = typeof getCurrentUser === 'function' ? getCurrentUser() : {};
            document.getElementById('tab-settings').innerHTML = `
                <div style="background:var(--bg-white);border:1px solid var(--border-light);border-radius:12px;padding:1.5rem;">
                    <h3 style="margin-bottom:1.5rem;"><i class="bi bi-gear"></i> Edit Profile</h3>
                    <form id="profileEditForm" onsubmit="return saveProfile(event)">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                            <div style="margin-bottom:1rem;">
                                <label style="display:block;font-weight:500;font-size:0.85rem;margin-bottom:0.35rem;">First Name</label>
                                <input type="text" id="editFirstName" value="${escapeHtml(user.first_name || user.name || '')}" style="width:100%;padding:0.65rem;border:1px solid var(--border-color);border-radius:8px;font-size:0.9rem;">
                            </div>
                            <div style="margin-bottom:1rem;">
                                <label style="display:block;font-weight:500;font-size:0.85rem;margin-bottom:0.35rem;">Last Name</label>
                                <input type="text" id="editLastName" value="${escapeHtml(user.last_name || user.lastName || '')}" style="width:100%;padding:0.65rem;border:1px solid var(--border-color);border-radius:8px;font-size:0.9rem;">
                            </div>
                        </div>
                        <div style="margin-bottom:1rem;">
                            <label style="display:block;font-weight:500;font-size:0.85rem;margin-bottom:0.35rem;">Email</label>
                            <input type="email" id="editEmail" value="${escapeHtml(user.email || '')}" disabled style="width:100%;padding:0.65rem;border:1px solid var(--border-color);border-radius:8px;font-size:0.9rem;background:var(--bg-light);">
                        </div>
                        <div style="margin-bottom:1rem;">
                            <label style="display:block;font-weight:500;font-size:0.85rem;margin-bottom:0.35rem;">Phone</label>
                            <input type="tel" id="editPhone" placeholder="+233 XX XXX XXXX" style="width:100%;padding:0.65rem;border:1px solid var(--border-color);border-radius:8px;font-size:0.9rem;">
                        </div>
                        <div style="margin-bottom:1rem;">
                            <label style="display:block;font-weight:500;font-size:0.85rem;margin-bottom:0.35rem;">Location</label>
                            <input type="text" id="editLocation" placeholder="City, Country" style="width:100%;padding:0.65rem;border:1px solid var(--border-color);border-radius:8px;font-size:0.9rem;">
                        </div>
                        <div style="margin-bottom:1rem;">
                            <label style="display:block;font-weight:500;font-size:0.85rem;margin-bottom:0.35rem;">Bio</label>
                            <textarea id="editBio" rows="3" placeholder="Tell us about yourself..." style="width:100%;padding:0.65rem;border:1px solid var(--border-color);border-radius:8px;font-size:0.9rem;resize:vertical;"></textarea>
                        </div>
                        <div style="display:flex;gap:0.75rem;">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <button type="button" class="btn btn-outline" onclick="loadSettings()">Cancel</button>
                        </div>
                        <p id="settingsMsg" style="font-size:0.85rem;margin-top:0.75rem;display:none;"></p>
                    </form>
                </div>
            `;
        }

        function saveProfile(e) {
            e.preventDefault();
            const msg = document.getElementById('settingsMsg');
            const user = typeof getCurrentUser === 'function' ? getCurrentUser() : {};
            user.first_name = document.getElementById('editFirstName').value;
            user.last_name = document.getElementById('editLastName').value;
            localStorage.setItem('flower-auth', JSON.stringify(user));
            msg.textContent = 'Profile updated successfully!';
            msg.style.color = '#10b981';
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
            return false;
        }

        document.addEventListener('componentLoaded', loadProfile);
    </script>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
