<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Video lesson - Flower Ecosystem Learning Center">
    <meta property="og:title" content="Video Lesson | Flower Ecosystem">
    <meta property="og:description" content="Watch expert floristry video tutorials on Flower Ecosystem.">
    <meta property="og:type" content="website">
    <title>Video - Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .video-page-hero { background: #0f0f0f; padding: 1rem 0; }
        .video-page-hero .breadcrumb { font-size: 0.8rem; opacity: 0.6; color: var(--white); }
        .video-page-hero .breadcrumb a { color: var(--white); text-decoration: underline; }
        .video-player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .video-player-wrap iframe { width: 100%; height: 100%; border: none; }
        .video-meta { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.75rem; margin: 1rem 0; }
        .video-meta h1 { font-family: var(--font-serif); font-size: 1.5rem; margin: 0; }
        .video-stats { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-light); }
        .video-stats span { display: flex; align-items: center; gap: 0.3rem; }
        .video-actions { display: flex; gap: 0.5rem; }
        .video-actions button { padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; background: var(--white); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 0.35rem; transition: all 0.2s; }
        .video-actions button:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .instructor-row { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 0; border-bottom: 1px solid var(--border-color); margin-bottom: 1rem; }
        .instructor-row img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .instructor-row .name { font-weight: 600; }
        .instructor-row .subs { font-size: 0.8rem; color: var(--text-light); }
        .video-desc { line-height: 1.7; color: var(--text-color); }
        .video-layout { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; padding: 1.5rem 0; }
        .related-video-card { display: flex; gap: 0.75rem; padding: 0.65rem 0; cursor: pointer; transition: opacity 0.2s; text-decoration: none; color: inherit; }
        .related-video-card:hover { opacity: 0.8; }
        .related-video-card img { width: 160px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .related-video-card .rv-title { font-size: 0.9rem; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .related-video-card .rv-meta { font-size: 0.78rem; color: var(--text-light); }
        .tag-badge { display: inline-block; padding: 0.2rem 0.65rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; background: var(--primary-color); color: var(--white); }
        @media (max-width: 768px) {
            .video-layout { grid-template-columns: 1fr; }
            .related-video-card img { width: 120px; }
            .video-meta h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main>
        <section class="video-page-hero">
            <div class="container">
                <p class="breadcrumb"><a href="index.html">Home</a> / <a href="learning.html">Learning Center</a> / <a href="learning.html?tab=videos">Videos</a> / <span id="breadcrumbVideo">Video</span></p>
            </div>
        </section>
        <div class="container video-layout">
            <div>
                <div class="video-player-wrap"><iframe id="videoPlayer" src="" allowfullscreen loading="lazy"></iframe></div>
                <div class="video-meta">
                    <div>
                        <span class="tag-badge" id="videoTag">Tutorial</span>
                        <h1 id="videoTitle">Loading...</h1>
                    </div>
                    <div class="video-stats">
                        <span><i class="bi bi-eye"></i> <span id="videoViews">0</span></span>
                        <span><i class="bi bi-clock"></i> <span id="videoDuration">0</span></span>
                    </div>
                </div>
                <div class="instructor-row">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=100&auto=format&fit=crop" alt="" id="instructorImg">
                    <div><div class="name" id="videoInstructor">Instructor</div><div class="subs" id="instructorSubs">Floristry Expert</div></div>
                </div>
                <div class="video-desc" id="videoDescription"></div>
            </div>
            <div>
                <h4 style="font-family:'Playfair Display',serif;margin-bottom:0.75rem;">Up Next</h4>
                <div id="relatedVideos"></div>
            </div>
        </div>
    </main>
    <div id="footer-container"></div>
    <div id="auth-modal-container"></div>
    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/auth.js?v=3.4"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/shared/api.js?v=4.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script>
        (async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('id') || 'v1';
            const videos = await api.fetchVideos();
            const video = videos.find(v => v.id === videoId) || videos[0];
            if (!video) { document.getElementById('videoTitle').textContent = 'Video not found'; return; }

            document.title = `${video.title} - Flower Ecosystem`;
            document.getElementById('breadcrumbVideo').textContent = video.title;
            document.getElementById('videoTitle').textContent = video.title;
            document.getElementById('videoTag').textContent = video.tag || 'Tutorial';
            document.getElementById('videoDuration').textContent = video.duration || '';
            document.getElementById('videoViews').textContent = video.views ? video.views.toLocaleString() + ' views' : '';
            document.getElementById('videoInstructor').textContent = video.instructor || 'Flower Ecosystem';
            document.getElementById('videoDescription').textContent = video.description || '';
            document.getElementById('videoPlayer').src = video.video_url || 'https://www.youtube.com/embed/dQw4w9WgXcQ';

            const related = videos.filter(v => v.id !== video.id && (v.category === video.category || v.tag === video.tag)).slice(0, 6);
            const rvEl = document.getElementById('relatedVideos');
            if (related.length) {
                rvEl.innerHTML = related.map(v => `
                    <a href="video-detail.html?id=${v.id}" class="related-video-card">
                        <img loading="lazy" src="${v.image}" alt="${v.title}">
                        <div>
                            <div class="rv-title">${v.title}</div>
                            <div class="rv-meta">${v.instructor || ''} — ${v.views ? v.views.toLocaleString() + ' views' : ''}</div>
                            <div class="rv-meta">${v.duration || ''}</div>
                        </div>
                    </a>`
                ).join('');
            } else {
                rvEl.innerHTML = '<p style="color:var(--text-light);font-size:0.9rem;">No related videos.</p>';
            }
        })();
    </script>
    <script>
        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) { e.preventDefault(); this.parentElement.classList.toggle('mobile-open'); }
            });
        });
    </script>
</body>
</html>
