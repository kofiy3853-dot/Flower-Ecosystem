<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Flower Ecosystem account password.">
    <title>Forgot Password | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .auth-input { width:100%; padding:0.75rem 1rem; border:1px solid var(--border-color); border-radius:6px; font-family:var(--font-sans); font-size:0.95rem; background:var(--bg-main); color:var(--text-main); transition:border-color 0.2s; }
        .auth-input:focus { outline:none; border-color:var(--primary-color); box-shadow:0 0 0 3px rgba(74,144,217,0.12); }
        .chk-field-error { color:var(--error-color); font-size:0.8rem; margin-top:0.25rem; display:none; }
        .auth-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:0.35rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="section-padding" style="padding-top:7rem;">
        <div class="container" style="max-width:440px;">
            <div class="text-center" style="margin-bottom:2rem;">
                <span class="subtitle">RESET PASSWORD</span>
                <h2>Forgot Your Password?</h2>
                <p style="color:var(--text-light);">Enter your email and we'll send you a reset link.</p>
            </div>
            <form id="forgotPwForm" style="background:var(--bg-white); padding:2.5rem; border-radius:12px; box-shadow:var(--shadow-md);" novalidate>
                <div style="margin-bottom:1.5rem;">
                    <label for="fpEmail" style="display:block; font-weight:500; margin-bottom:0.5rem; font-size:0.9rem;">Email Address</label>
                    <input type="email" id="fpEmail" placeholder="your@email.com" class="auth-input" required>
                    <div class="chk-field-error" id="fpEmailError"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="fpSubmitBtn" style="padding:0.9rem; font-size:1rem;">Send Reset Link</button>
                <p id="fpError" style="text-align:center; margin-top:1rem; color:#d32f2f; font-weight:500; display:none;"></p>
                <p id="fpSuccess" style="text-align:center; margin-top:1rem; color:var(--accent-green); font-weight:500; display:none;"></p>
            </form>
            <div style="text-align:center; margin-top:1.5rem;">
                <p style="color:var(--text-light); font-size:0.9rem;"><a href="javascript:void(0)" onclick="sessionStorage.setItem('pending-auth','login');if(typeof openAuthModal==='function')openAuthModal('login');else window.location.href='index.html';" style="color:var(--primary-color); font-weight:500;">Back to Sign In</a></p>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=4.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.4"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/auth-pages.js"></script>
    <script>
        document.getElementById('forgotPwForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('fpEmail').value.trim();
            const err = document.getElementById('fpError');
            const success = document.getElementById('fpSuccess');
            const btn = document.getElementById('fpSubmitBtn');

            if (!email) { showFieldError('fpEmail', 'fpEmailError', 'Email is required'); return; }
            if (!validateEmail(email)) { showFieldError('fpEmail', 'fpEmailError', 'Please enter a valid email'); return; }
            clearFieldError('fpEmail', 'fpEmailError');
            err.style.display = 'none';
            success.style.display = 'none';

            btn.disabled = true;
            btn.innerHTML = '<span class="auth-spinner"></span> Sending...';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                success.textContent = data.message || 'If this email exists, a reset link has been sent.';
                success.style.display = 'block';
                // In development, show the reset link directly
                if (data.resetUrl) {
                    const linkDiv = document.createElement('div');
                    linkDiv.style.cssText = 'margin-top:1rem; padding:1rem; background:#f0f7ff; border:1px solid #b3d4fc; border-radius:8px; text-align:left; word-break:break-all;';
                    linkDiv.innerHTML = '<p style="font-size:0.85rem; color:#1a73e8; margin:0 0 0.5rem 0; font-weight:600;"><i class="bi bi-link-45deg"></i> Dev Mode - Reset Link:</p><a href="' + data.resetUrl + '" style="font-size:0.85rem; color:#1a73e8; word-break:break-all;">' + data.resetUrl + '</a>';
                    success.parentNode.insertBefore(linkDiv, success.nextSibling);
                }
            } catch (e) {
                err.textContent = 'Something went wrong. Please try again.';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send Reset Link';
            }
        });

        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    this.parentElement.classList.toggle('mobile-open');
                }
            });
        });
    </script>
</body>
</html>
