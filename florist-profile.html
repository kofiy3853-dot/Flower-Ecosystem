<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Florist Profile | Flower Ecosystem">
    <title>Florist Profile | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .profile-header { background: var(--bg-light); padding: 6rem 0 3rem; margin-top: 65px; border-bottom: 1px solid var(--border-color); }
        .profile-container { display: flex; gap: 2rem; align-items: center; }
        .profile-avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: var(--shadow-md); }
        .profile-info { flex: 1; }
        .profile-name { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--text-main); }
        .profile-meta { display: flex; gap: 1.5rem; color: var(--text-light); font-size: 0.95rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .profile-meta span { display: flex; align-items: center; gap: 0.5rem; }
        .profile-meta i { color: var(--primary-color); }
        .profile-desc { font-size: 1.05rem; line-height: 1.6; max-width: 800px; }
        .tabs-nav { display: flex; gap: 2rem; border-bottom: 1px solid var(--border-color); margin-bottom: 2rem; }
        .tab-link { background: none; border: none; padding: 1rem 0; font-size: 1rem; font-weight: 500; color: var(--text-light); cursor: pointer; position: relative; }
        .tab-link.active { color: var(--primary-color); }
        .tab-link.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--primary-color); }
        
        @media (max-width: 768px) {
            .profile-container { flex-direction: column; text-align: center; }
            .profile-meta { justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <!-- Profile Header -->
    <section class="profile-header">
        <div class="container profile-container reveal-up">
            <img id="floristImage" src="" alt="Florist Avatar" class="profile-avatar">
            <div class="profile-info">
                <h1 id="floristName" class="profile-name">Loading...</h1>
                <div class="profile-meta">
                    <span><i class="bi bi-geo-alt-fill"></i> <span id="floristLoc"></span></span>
                    <span><i class="bi bi-star-fill" style="color:#e5c158;"></i> <span id="floristRating"></span></span>
                    <span><i class="bi bi-flower1"></i> <span id="floristSpec"></span></span>
                    <span><i class="bi bi-box-seam"></i> <span id="floristProds"></span></span>
                </div>
                <p class="profile-desc" id="floristDesc">Passionate florist specializing in unique arrangements and sustainably grown local blooms. Providing top-tier floral designs for over 10 years.</p>
                <div style="margin-top:1.5rem; display:flex; gap:1rem;">
                    <button class="btn btn-primary">Contact Seller</button>
                    <button class="btn btn-outline"><i class="bi bi-heart"></i> Follow</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Shop Section -->
    <section class="section-padding">
        <div class="container">
            <div class="tabs-nav reveal-up">
                <button class="tab-link active">Shop</button>
                <button class="tab-link">Reviews</button>
                <button class="tab-link">About</button>
            </div>

            <h2 style="margin-bottom:1.5rem;" class="reveal-up">Products by this Seller</h2>
            <div class="product-grid reveal-up" id="sellerProducts"></div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=3.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.0"></script>
    <script src="js/shared/ui.js?v=3.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/components.js?v=3.0"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script>
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || 'f1';
            const florists = await api.fetchFlorists();
            const f = florists.find(x => x.id === id) || florists[0];

            if (f) {
                document.title = `${f.name} — Florist Profile`;
                document.getElementById('floristName').textContent = f.name;
                document.getElementById('floristImage').src = f.image;
                document.getElementById('floristLoc').textContent = f.location;
                document.getElementById('floristRating').textContent = `${f.rating} (${f.reviews} reviews)`;
                document.getElementById('floristSpec').textContent = f.specialty;
                document.getElementById('floristProds').textContent = `${f.products} Products`;

                // Load some random products as the seller's products
                const products = await api.fetchProducts();
                const grid = document.getElementById('sellerProducts');
                grid.innerHTML = products.slice(0, 4).map(p => `
                    <div class="product-card">
                        <div class="product-img-wrap">
                            ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
                            <a href="product-detail.html?id=${p.id}"><img loading="lazy" src="${p.image}" alt="${p.name}"></a>
                        </div>
                        <div class="product-info">
                            <h3 class="product-name"><a href="product-detail.html?id=${p.id}" style="color:inherit;">${p.name}</a></h3>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.75rem;">
                                <span style="font-weight:600; color:var(--primary-color); font-size:1.1rem;">$${p.price.toFixed(2)}</span>
                                <button class="btn btn-primary btn-sm" onclick="location.href='product-detail.html?id=${p.id}'" role="button" tabindex="0">View</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        })();
    </script>
<script>
document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
    toggle.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
            e.preventDefault();
            this.parentElement.classList.toggle('mobile-open');
        }
    });
});
</script>
</body>
</html>
