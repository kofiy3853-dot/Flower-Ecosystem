<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Florist Profile | Flower Ecosystem">
    <title>Florist Profile | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        /* Banner */
        .fp-banner { height:300px; overflow:hidden; position:relative; }
        .fp-banner img { width:100%; height:100%; object-fit:cover; }

        /* Profile Header */
        .fp-header { padding:0 0 2rem; margin-top:-80px; position:relative; z-index:1; }
        .fp-header-inner { display:flex; gap:1.5rem; align-items:flex-end; }
        .fp-avatar { width:140px; height:140px; border-radius:50%; border:4px solid white; box-shadow:0 4px 20px rgba(0,0,0,0.15); object-fit:cover; background:var(--primary-light); flex-shrink:0; }
        .fp-avatar-placeholder { width:140px; height:140px; border-radius:50%; border:4px solid white; box-shadow:0 4px 20px rgba(0,0,0,0.15); background:var(--primary-light); display:flex; align-items:center; justify-content:center; font-size:3rem; color:var(--primary-color); flex-shrink:0; }
        .fp-info { flex:1; }
        .fp-name-row { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; }
        .fp-name { font-size:1.75rem; font-weight:700; margin:0; }
        .fp-verified { background:var(--accent-green); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:600; display:flex; align-items:center; gap:0.3rem; }
        .fp-meta { display:flex; gap:1.25rem; font-size:0.88rem; color:var(--text-light); margin:0.5rem 0; flex-wrap:wrap; }
        .fp-meta i { color:var(--primary-color); margin-right:0.3rem; }
        .fp-actions { display:flex; gap:0.75rem; margin-top:1rem; flex-wrap:wrap; }
        .fp-actions .btn { font-size:0.88rem; }

        /* Tabs */
        .fp-tabs { display:flex; gap:0; border-bottom:2px solid var(--border-color); margin-bottom:2rem; overflow-x:auto; }
        .fp-tab { padding:0.85rem 1.5rem; border:none; background:none; cursor:pointer; font-size:0.95rem; font-weight:500; color:var(--text-light); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.2s; white-space:nowrap; }
        .fp-tab:hover { color:var(--primary-color); }
        .fp-tab.active { color:var(--primary-color); border-bottom-color:var(--primary-color); }
        .fp-tab-panel { display:none; }
        .fp-tab-panel.active { display:block; }

        /* Stats */
        .fp-stats { display:grid; grid-template-columns:repeat(4, 1fr); gap:1rem; margin-bottom:2rem; }
        .fp-stat { background:var(--bg-light); border-radius:12px; padding:1.25rem; text-align:center; }
        .fp-stat-value { font-size:1.5rem; font-weight:700; color:var(--primary-color); }
        .fp-stat-label { font-size:0.82rem; color:var(--text-light); }

        /* Services */
        .fp-services { display:grid; grid-template-columns:repeat(3, 1fr); gap:1rem; margin-bottom:2rem; }
        .fp-service { background:var(--bg-light); border-radius:12px; padding:1.25rem; text-align:center; border:1px solid var(--border-color); transition:all 0.3s; }
        .fp-service:hover { border-color:var(--primary-color); transform:translateY(-3px); }
        .fp-service-icon { font-size:1.75rem; margin-bottom:0.5rem; }
        .fp-service-name { font-weight:600; font-size:0.9rem; margin-bottom:0.2rem; }
        .fp-service-price { font-size:0.82rem; color:var(--primary-color); }

        /* Gallery */
        .fp-gallery { display:grid; grid-template-columns:repeat(3, 1fr); gap:1rem; }
        .fp-gallery-item { border-radius:12px; overflow:hidden; aspect-ratio:1; cursor:pointer; }
        .fp-gallery-item img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; }
        .fp-gallery-item:hover img { transform:scale(1.08); }

        /* Products Grid */
        .fp-products { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:1.25rem; }

        /* Reviews */
        .fp-reviews { display:grid; grid-template-columns:repeat(2, 1fr); gap:1rem; }
        .fp-review { background:var(--bg-light); border-radius:12px; padding:1.25rem; }
        .fp-review-header { display:flex; justify-content:space-between; margin-bottom:0.5rem; }
        .fp-review-author { font-weight:600; font-size:0.9rem; }
        .fp-review-stars { color:#f59e0b; }
        .fp-review-text { font-size:0.88rem; color:var(--text-light); line-height:1.5; }
        .fp-review-date { font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem; }

        /* Contact */
        .fp-contact { background:var(--bg-light); border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; }
        .fp-contact h3 { margin-bottom:1rem; font-size:1.1rem; }
        .fp-contact-item { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 0; border-bottom:1px solid var(--border-light); }
        .fp-contact-item:last-child { border-bottom:none; }
        .fp-contact-item i { font-size:1.1rem; color:var(--primary-color); width:24px; }
        .fp-contact-item span { font-size:0.9rem; }
        .fp-contact-item a { color:var(--primary-color); text-decoration:none; }

        /* Hours */
        .fp-hours { margin-bottom:1.5rem; }
        .fp-hours-row { display:flex; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid var(--border-light); font-size:0.9rem; }
        .fp-hours-row:last-child { border-bottom:none; }

        /* Delivery */
        .fp-delivery { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:1.5rem; }
        .fp-delivery-tag { background:var(--bg-light); padding:0.4rem 0.75rem; border-radius:8px; font-size:0.82rem; display:flex; align-items:center; gap:0.3rem; }

        @media (max-width:768px) {
            .fp-header-inner { flex-direction:column; align-items:center; text-align:center; }
            .fp-stats { grid-template-columns:repeat(2, 1fr); }
            .fp-services, .fp-gallery, .fp-reviews { grid-template-columns:1fr; }
            .fp-actions { justify-content:center; }
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <!-- Banner -->
    <div class="fp-banner" id="fpBanner">
        <img id="fpBannerImg" src="" alt="Store Banner">
    </div>

    <!-- Profile Header -->
    <section class="fp-header">
        <div class="container">
            <div class="fp-header-inner">
                <img id="fpAvatar" src="" alt="Florist" class="fp-avatar">
                <div class="fp-info">
                    <div class="fp-name-row">
                        <h1 id="fpName" class="fp-name">Loading...</h1>
                        <span id="fpVerified" class="fp-verified" style="display:none;"><i class="bi bi-patch-check-fill"></i> Verified</span>
                    </div>
                    <div class="fp-meta" id="fpMeta"></div>
                    <p id="fpDesc" style="font-size:0.95rem;color:var(--text-light);line-height:1.6;max-width:600px;"></p>
                    <div class="fp-actions">
                        <button class="btn btn-primary" id="fpContactBtn"><i class="bi bi-chat-dots"></i> Contact</button>
                        <button class="btn btn-outline" id="fpFollowBtn"><i class="bi bi-heart"></i> Follow</button>
                        <button class="btn btn-outline" onclick="window.location.href='marketplace?seller_id='+sellerId"><i class="bi bi-bag"></i> Visit Shop</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Content -->
    <section class="section-padding" style="padding-top:1.5rem;">
        <div class="container">
            <!-- Stats -->
            <div class="fp-stats" id="fpStats"></div>

            <!-- Tabs -->
            <div class="fp-tabs">
                <button class="fp-tab active" onclick="switchTab('products')">Products</button>
                <button class="fp-tab" onclick="switchTab('services')">Services</button>
                <button class="fp-tab" onclick="switchTab('gallery')">Gallery</button>
                <button class="fp-tab" onclick="switchTab('reviews')">Reviews</button>
                <button class="fp-tab" onclick="switchTab('about')">About</button>
            </div>

            <!-- Products Tab -->
            <div class="fp-tab-panel active" id="panel-products">
                <h2 style="margin-bottom:1rem;">Products</h2>
                <div class="fp-products" id="fpProducts"></div>
            </div>

            <!-- Services Tab -->
            <div class="fp-tab-panel" id="panel-services">
                <h2 style="margin-bottom:1rem;">Services</h2>
                <div class="fp-services" id="fpServices"></div>
            </div>

            <!-- Gallery Tab -->
            <div class="fp-tab-panel" id="panel-gallery">
                <h2 style="margin-bottom:1rem;">Gallery</h2>
                <div class="fp-gallery" id="fpGallery"></div>
            </div>

            <!-- Reviews Tab -->
            <div class="fp-tab-panel" id="panel-reviews">
                <h2 style="margin-bottom:1rem;">Customer Reviews</h2>
                <div class="fp-reviews" id="fpReviews"></div>
            </div>

            <!-- About Tab -->
            <div class="fp-tab-panel" id="panel-about">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;">
                    <div>
                        <h2 style="margin-bottom:1rem;">About</h2>
                        <p id="fpAbout" style="font-size:0.95rem;color:var(--text-light);line-height:1.7;"></p>

                        <h3 style="margin:1.5rem 0 0.75rem;">Delivery Areas</h3>
                        <div class="fp-delivery" id="fpDelivery"></div>

                        <h3 style="margin:1.5rem 0 0.75rem;">Business Hours</h3>
                        <div class="fp-hours" id="fpHours"></div>
                    </div>
                    <div>
                        <div class="fp-contact">
                            <h3>Contact Information</h3>
                            <div id="fpContactInfo"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/auth.js?v=3.5"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/shared/api.js?v=4.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script>
        let sellerId = '';

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.fp-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.fp-tab-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
        }

        function renderStars(r) {
            const f = Math.floor(r);
            let s = '';
            for (let i = 0; i < f; i++) s += '<i class="bi bi-star-fill"></i>';
            for (let i = f; i < 5; i++) s += '<i class="bi bi-star"></i>';
            return s;
        }

        // Init
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) { window.location.href = 'florists.html'; return; }
            sellerId = id;

            // Load florist data
            const floristsData = await api.fetchFlorists();
            const florists = Array.isArray(floristsData) ? floristsData : (floristsData?.florists || []);
            const f = florists.find(x => x.id === id);

            if (!f) {
                document.getElementById('fpName').textContent = 'Florist Not Found';
                return;
            }

            // Banner
            const bannerImg = f.banner || f.image || 'https://images.unsplash.com/photo-1487530811176-3780de880c2d?q=1200&auto=format&fit=crop';
            document.getElementById('fpBannerImg').src = bannerImg;

            // Avatar
            const avatar = document.getElementById('fpAvatar');
            if (f.image) {
                avatar.src = f.image;
            } else {
                const initials = (f.name || 'F').charAt(0).toUpperCase();
                avatar.outerHTML = `<div class="fp-avatar-placeholder">${initials}</div>`;
            }

            // Name & Info
            document.title = `${f.name} — Florist Profile`;
            document.getElementById('fpName').textContent = f.name;
            document.getElementById('fpDesc').textContent = f.description || 'Passionate florist specializing in unique arrangements and sustainably grown local blooms.';

            // Verified
            document.getElementById('fpVerified').style.display = 'inline-flex';

            // Meta
            const location = f.location || 'Accra, Ghana';
            const rating = f.rating || 0;
            const reviews = f.review_count || 0;
            const products = f.product_count || 0;
            document.getElementById('fpMeta').innerHTML = `
                <span><i class="bi bi-geo-alt"></i> ${location}</span>
                <span><i class="bi bi-star-fill" style="color:#f59e0b;"></i> ${rating > 0 ? rating + ' (' + reviews + ' reviews)' : 'No reviews yet'}</span>
                <span><i class="bi bi-box-seam"></i> ${products} Products</span>
                ${f.experience_years ? `<span><i class="bi bi-clock"></i> ${f.experience_years} Years Experience</span>` : ''}
            `;

            // Stats
            document.getElementById('fpStats').innerHTML = `
                <div class="fp-stat"><div class="fp-stat-value">${products}</div><div class="fp-stat-label">Products</div></div>
                <div class="fp-stat"><div class="fp-stat-value">${reviews}</div><div class="fp-stat-label">Reviews</div></div>
                <div class="fp-stat"><div class="fp-stat-value">${rating > 0 ? rating : '-'}</div><div class="fp-stat-label">Rating</div></div>
                <div class="fp-stat"><div class="fp-stat-value">${f.order_count || 0}</div><div class="fp-stat-label">Orders Completed</div></div>
            `;

            // Services
            const services = [
                { icon: '💍', name: 'Wedding Decoration', price: 'From GHS 500' },
                { icon: '🎂', name: 'Birthday Arrangements', price: 'From GHS 100' },
                { icon: '💐', name: 'Custom Bouquets', price: 'From GHS 50' },
                { icon: '🏢', name: 'Corporate Events', price: 'From GHS 300' },
                { icon: '🕊️', name: 'Sympathy Flowers', price: 'From GHS 150' },
                { icon: '🎨', name: 'Event Styling', price: 'From GHS 400' }
            ];
            document.getElementById('fpServices').innerHTML = services.map(s => `
                <div class="fp-service">
                    <div class="fp-service-icon">${s.icon}</div>
                    <div class="fp-service-name">${s.name}</div>
                    <div class="fp-service-price">${s.price}</div>
                </div>
            `).join('');

            // Gallery
            const galleryImages = f.gallery || (f.image ? [f.image] : []);
            if (galleryImages.length) {
                document.getElementById('fpGallery').innerHTML = galleryImages.map(img => `
                    <div class="fp-gallery-item"><img src="${escapeHtml(img)}" alt="Gallery" loading="lazy"></div>
                `).join('');
            } else {
                document.getElementById('fpGallery').innerHTML = '<p style="color:var(--text-light);text-align:center;padding:2rem;">No gallery images yet.</p>';
            }

            // Reviews
            const reviewsList = f.reviews || [];
            if (reviewsList.length) {
                document.getElementById('fpReviews').innerHTML = reviewsList.map(r => `
                    <div class="fp-review">
                        <div class="fp-review-header">
                            <div class="fp-review-author">${escapeHtml(r.author || r.author_name || 'Anonymous')}</div>
                            <div class="fp-review-stars">${renderStars(r.rating || 0)}</div>
                        </div>
                        <div class="fp-review-text">"${escapeHtml(r.text || r.content || '')}"</div>
                        <div class="fp-review-date">${r.date || ''}</div>
                    </div>
                `).join('');
            } else {
                document.getElementById('fpReviews').innerHTML = '<p style="color:var(--text-light);text-align:center;padding:2rem;">No reviews yet.</p>';
            }

            // About
            document.getElementById('fpAbout').textContent = f.description || 'We are a passionate team of florists dedicated to creating beautiful arrangements for every occasion. With years of experience, we specialize in weddings, events, and custom bouquets. Our mission is to bring joy through flowers.';

            // Delivery areas
            const areas = f.delivery_areas || [];
            if (areas.length) {
                document.getElementById('fpDelivery').innerHTML = areas.map(a => `<span class="fp-delivery-tag"><i class="bi bi-geo-alt"></i> ${escapeHtml(a)}</span>`).join('');
            } else {
                document.getElementById('fpDelivery').innerHTML = '<p style="color:var(--text-light);font-size:0.9rem;">No delivery areas listed.</p>';
            }

            // Business hours
            const hours = f.business_hours || [];
            if (hours.length) {
                document.getElementById('fpHours').innerHTML = hours.map(h => `
                    <div class="fp-hours-row"><span>${escapeHtml(h.day || '')}</span><span>${escapeHtml(h.time || '')}</span></div>
                `).join('');
            } else {
                document.getElementById('fpHours').innerHTML = '<p style="color:var(--text-light);font-size:0.9rem;">Hours not available.</p>';
            }

            // Contact
            const phone = f.phone || '';
            const email = f.email || `info@${(f.name || 'florist').toLowerCase().replace(/\s+/g, '')}.com`;
            const whatsapp = f.whatsapp || '';
            document.getElementById('fpContactInfo').innerHTML = `
                ${phone ? `<div class="fp-contact-item"><i class="bi bi-telephone"></i><span>${escapeHtml(phone)}</span></div>` : ''}
                <div class="fp-contact-item"><i class="bi bi-envelope"></i><a href="mailto:${escapeHtml(email)}">${escapeHtml(email)}</a></div>
                ${whatsapp ? `<div class="fp-contact-item"><i class="bi bi-whatsapp"></i><a href="https://wa.me/${escapeHtml(whatsapp)}">Chat on WhatsApp</a></div>` : ''}
                <div class="fp-contact-item"><i class="bi bi-geo-alt"></i><span>${escapeHtml(location)}</span></div>
            `;

            // Contact button
            document.getElementById('fpContactBtn').addEventListener('click', () => {
                if (typeof isLoggedIn === 'function' && isLoggedIn()) {
                    window.location.href = 'messages.html?to=' + id;
                } else {
                    sessionStorage.setItem('pending-redirect', 'messages.html?to=' + id);
                    sessionStorage.setItem('pending-auth', 'login');
                    if (typeof openAuthModal === 'function') openAuthModal('login');
                }
            });

            // Follow button
            const followBtn = document.getElementById('fpFollowBtn');
            let isFollowing = false;

            if (typeof isLoggedIn === 'function' && isLoggedIn()) {
                try {
                    const fc = await fetch('/api/users/' + id + '/follow-check', {
                        headers: { 'Authorization': 'Bearer ' + getToken() }
                    }).then(r => r.json());
                    isFollowing = fc.following;
                } catch {}
            } else {
                // Fallback to localStorage for non-logged-in visitors
                const localFollowing = JSON.parse(localStorage.getItem('flower-following') || '[]');
                isFollowing = localFollowing.includes(id);
            }

            if (isFollowing) {
                followBtn.classList.add('active');
                const icon = followBtn.querySelector('i');
                icon.classList.remove('bi-heart');
                icon.classList.add('bi-heart-fill');
            }

            followBtn.addEventListener('click', async function() {
                if (typeof isLoggedIn === 'function' && isLoggedIn()) {
                    try {
                        const method = isFollowing ? 'DELETE' : 'POST';
                        const res = await fetch('/api/users/' + id + '/follow', {
                            method,
                            headers: { 'Authorization': 'Bearer ' + getToken() }
                        }).then(r => r.json());
                        isFollowing = res.following;
                    } catch { return; }
                } else {
                    isFollowing = !isFollowing;
                    const arr = JSON.parse(localStorage.getItem('flower-following') || '[]');
                    const idx = arr.indexOf(id);
                    if (idx >= 0) arr.splice(idx, 1); else arr.push(id);
                    localStorage.setItem('flower-following', JSON.stringify(arr));
                }
                this.classList.toggle('active', isFollowing);
                const icon = this.querySelector('i');
                icon.classList.toggle('bi-heart', !isFollowing);
                icon.classList.toggle('bi-heart-fill', isFollowing);
            });

            // Load products
            try {
                const productsData = await api.fetchProducts({ seller_id: id });
                const sellerProducts = Array.isArray(productsData) ? productsData : (productsData?.products || []);
                const grid = document.getElementById('fpProducts');
                if (sellerProducts.length) {
                    grid.innerHTML = sellerProducts.map(p => ProductCard(p)).join('');
                } else {
                    grid.innerHTML = '<p style="text-align:center;color:var(--text-light);padding:2rem;grid-column:1/-1;">No products yet.</p>';
                }
            } catch {}
        })();
    </script>
</body>
</html>
