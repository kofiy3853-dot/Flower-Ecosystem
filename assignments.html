<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit assignments and track your progress on Flower Ecosystem Learning Center.">
    <title>Assignments | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .assign-hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:5rem 0 3rem;color:white;text-align:center;}
        .assign-hero h1{font-size:clamp(2rem,4vw,2.8rem);margin-bottom:0.5rem;}
        .assign-hero p{opacity:0.85;max-width:600px;margin:0 auto;}
        .assign-tabs{display:flex;gap:0;justify-content:center;margin:2rem 0;border-bottom:2px solid var(--border-color);}
        .assign-tab{padding:0.75rem 1.5rem;border:none;background:none;cursor:pointer;font-size:0.95rem;font-weight:500;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
        .assign-tab:hover{color:var(--primary-color);}
        .assign-tab.active{color:var(--primary-color);border-bottom-color:var(--primary-color);}
        .assign-list{max-width:800px;margin:0 auto;}
        .assign-card{background:var(--bg-white);border:1px solid var(--border-color);border-radius:12px;padding:1.5rem;margin-bottom:1rem;transition:all 0.2s;}
        .assign-card:hover{border-color:var(--primary-color);}
        .assign-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem;}
        .assign-title{font-weight:600;font-size:1.05rem;}
        .assign-badge{padding:0.2rem 0.6rem;border-radius:6px;font-size:0.72rem;font-weight:600;}
        .badge-pending{background:#fff3cd;color:#856404;}
        .badge-submitted{background:#cce5ff;color:#004085;}
        .badge-graded{background:#d4edda;color:#155724;}
        .badge-overdue{background:#f8d7da;color:#721c24;}
        .assign-meta{display:flex;gap:1.25rem;font-size:0.85rem;color:var(--text-light);margin-bottom:0.75rem;flex-wrap:wrap;}
        .assign-meta span{display:flex;align-items:center;gap:0.35rem;}
        .assign-desc{font-size:0.9rem;color:var(--text-light);line-height:1.6;margin-bottom:1rem;}
        .assign-actions{display:flex;gap:0.5rem;flex-wrap:wrap;}
        .upload-zone{border:2px dashed var(--border-color);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;margin-top:1rem;}
        .upload-zone:hover{border-color:var(--primary-color);background:var(--primary-light);}
        .upload-zone i{font-size:2rem;color:var(--primary-color);display:block;margin-bottom:0.5rem;}
        .grade-box{background:var(--bg-light);border-radius:10px;padding:1.25rem;text-align:center;margin-top:1rem;}
        .grade-score{font-size:2rem;font-weight:700;color:var(--primary-color);}
        .empty-state{text-align:center;padding:4rem 2rem;color:var(--text-light);}
        .empty-state i{font-size:4rem;color:var(--border-color);display:block;margin-bottom:1rem;}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="assign-hero">
        <div class="container">
            <h1>Assignments</h1>
            <p>Submit your work, receive feedback, and track your progress across all courses.</p>
        </div>
    </section>

    <div class="container section-padding">
        <div class="assign-tabs">
            <button class="assign-tab active" onclick="filterTab(this,'pending')">Pending</button>
            <button class="assign-tab" onclick="filterTab(this,'submitted')">Submitted</button>
            <button class="assign-tab" onclick="filterTab(this,'graded')">Graded</button>
            <button class="assign-tab" onclick="filterTab(this,'all')">All</button>
        </div>

        <div class="assign-list" id="assignList"></div>
    </div>

    <div id="footer-container"></div>

    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/auth.js?v=3.4"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/api.js?v=4.0"></script>
    <script>
        const assignments = [
            { id: 1, title: 'Create a Hand-Tied Bouquet', course: 'Professional Floral Design', due: 'July 20, 2026', status: 'pending', description: 'Design and photograph a hand-tied bouquet using at least 3 different flower types. Include a description of your color choices and arrangement technique.', points: 100, type: 'Photo Submission' },
            { id: 2, title: 'Flower Identification Report', course: 'Introduction to Flowers', due: 'July 25, 2026', status: 'pending', description: 'Identify and document 15 different flower species from your local area. Include photos, common names, scientific names, and care requirements.', points: 80, type: 'Written Report' },
            { id: 3, title: 'Wedding Centerpiece Design', course: 'Wedding Floristry Masterclass', due: 'July 18, 2026', status: 'submitted', description: 'Create a wedding centerpiece design sketch with flower selection, color palette, and estimated cost breakdown.', points: 120, type: 'Design Submission' },
            { id: 4, title: 'Flower Farm Business Plan', course: 'Flower Business Management', due: 'July 10, 2026', status: 'graded', description: 'Develop a complete business plan for a small flower farm including startup costs, expected revenue, and marketing strategy.', points: 150, type: 'Written Report', grade: 92, feedback: 'Excellent business plan with realistic projections. Great marketing strategy.' },
            { id: 5, title: 'Color Theory Application', course: 'Advanced Color Theory', due: 'July 22, 2026', status: 'pending', description: 'Apply color theory principles to create 3 different floral arrangements following specific color schemes (complementary, analogous, triadic).', points: 100, type: 'Photo Submission' },
            { id: 6, title: 'Indoor Plant Care Guide', course: 'Indoor Plant Care', due: 'July 5, 2026', status: 'graded', description: 'Create a comprehensive care guide for 5 common indoor plants including watering schedules, light requirements, and troubleshooting tips.', points: 90, type: 'Written Report', grade: 88, feedback: 'Good coverage of common issues. Consider adding more detail on pest prevention.' }
        ];

        let activeTab = 'pending';

        function filterTab(el, tab) {
            document.querySelectorAll('.assign-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            activeTab = tab;
            renderAssignments();
        }

        function renderAssignments() {
            const list = document.getElementById('assignList');
            const filtered = activeTab === 'all' ? assignments : assignments.filter(a => a.status === activeTab);

            if (!filtered.length) {
                list.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><h3>No assignments</h3><p>There are no assignments in this category yet.</p></div>';
                return;
            }

            list.innerHTML = filtered.map(a => `
                <div class="assign-card" data-status="${a.status}">
                    <div class="assign-header">
                        <div class="assign-title">${escapeHtml(a.title)}</div>
                        <span class="assign-badge badge-${a.status}">${a.status.charAt(0).toUpperCase() + a.status.slice(1)}</span>
                    </div>
                    <div class="assign-meta">
                        <span><i class="bi bi-book"></i> ${escapeHtml(a.course)}</span>
                        <span><i class="bi bi-calendar"></i> Due: ${a.due}</span>
                        <span><i class="bi bi-clock"></i> ${a.type}</span>
                        <span><i class="bi bi-star"></i> ${a.points} Points</span>
                    </div>
                    <div class="assign-desc">${escapeHtml(a.description)}</div>
                    ${a.status === 'pending' ? `
                        <div class="upload-zone" onclick="document.getElementById('fileInput-${a.id}').click()">
                            <i class="bi bi-cloud-arrow-up"></i>
                            <p>Click to upload or drag and drop</p>
                            <p style="font-size:0.78rem;color:var(--text-light);">PDF, JPG, PNG up to 10MB</p>
                            <input type="file" id="fileInput-${a.id}" style="display:none;" accept=".pdf,.jpg,.jpeg,.png" onchange="submitAssignment(${a.id}, this)">
                        </div>
                        <div class="assign-actions" style="margin-top:1rem;">
                            <button class="btn btn-primary btn-sm" onclick="submitAssignment(${a.id})">Submit Assignment</button>
                        </div>
                    ` : ''}
                    ${a.status === 'submitted' ? `
                        <div class="assign-actions">
                            <span style="font-size:0.85rem;color:var(--text-light);"><i class="bi bi-check-circle" style="color:#3b82f6;"></i> Submitted — awaiting review</span>
                        </div>
                    ` : ''}
                    ${a.status === 'graded' ? `
                        <div class="grade-box">
                            <div class="grade-score">${a.grade}/100</div>
                            <p style="font-size:0.85rem;color:var(--text-light);margin-bottom:0.5rem;">Instructor Feedback</p>
                            <p style="font-size:0.9rem;">${escapeHtml(a.feedback)}</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        async function initAssignments() {
            if (!isLoggedIn()) {
                sessionStorage.setItem('pending-redirect', 'assignments.html');
                openAuthModal('login');
                return;
            }
            // Try API first, fall back to hardcoded data
            try {
                const apiData = await api.fetchAssignments();
                if (apiData && apiData.length) {
                    assignments.length = 0;
                    apiData.forEach(a => assignments.push({
                        id: a.id, title: a.title || 'Assignment', course: a.course || '',
                        due: a.due_date ? new Date(a.due_date).toLocaleDateString() : 'TBD',
                        status: a.status || 'pending', description: a.description || '',
                        points: a.points || 100, type: a.type || 'Submission'
                    }));
                }
            } catch (e) {}
            renderAssignments();
        }

        function submitAssignment(id, fileInput) {
            if (!isLoggedIn()) {
                openAuthModal('login');
                return;
            }
            if (fileInput && !fileInput.files.length) return;
            const assignment = assignments.find(a => a.id === id);
            if (assignment) {
                assignment.status = 'submitted';
                api.submitAssignment(id, { status: 'submitted' }).catch(() => {});
                renderAssignments();
            }
        }

        initAssignments();
    </script>
</body>
</html>
