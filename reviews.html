<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reviews and ratings for products and sellers.">
    <title>Reviews | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=2.0">
    <link rel="stylesheet" href="styles/landing-redesign.css?v=2.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .reviews-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; }
        .review-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.25rem; margin-bottom:0.75rem; }
        .review-header { display:flex; justify-content:space-between; align-items:start; margin-bottom:0.5rem; }
        .review-author { display:flex; gap:0.5rem; align-items:center; }
        .review-avatar { width:36px; height:36px; border-radius:50%; background:var(--bg-light); display:flex; align-items:center; justify-content:center; font-size:0.9rem; overflow:hidden; }
        .review-avatar img { width:100%; height:100%; object-fit:cover; }
        .review-name { font-weight:500; font-size:0.9rem; }
        .review-date { font-size:0.78rem; color:var(--text-muted); }
        .review-stars { color:var(--accent-gold); font-size:0.85rem; }
        .review-title { font-weight:600; font-size:0.95rem; margin-bottom:0.3rem; }
        .review-content { font-size:0.88rem; color:var(--text-light); line-height:1.6; }
        .review-footer { display:flex; gap:0.75rem; margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid var(--border-light); }
        .review-footer button { background:none; border:none; cursor:pointer; font-size:0.8rem; color:var(--text-light); display:flex; align-items:center; gap:0.25rem; }
        .review-footer button:hover { color:var(--primary-color); }
        .write-review { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.5rem; margin-bottom:1.5rem; }
        .star-input { display:flex; gap:0.25rem; margin-bottom:0.75rem; }
        .star-input i { font-size:1.5rem; cursor:pointer; color:var(--border-color); transition:color 0.15s; }
        .star-input i.active { color:var(--accent-gold); }
        .form-group { margin-bottom:0.75rem; }
        .form-group label { display:block; font-size:0.85rem; font-weight:500; margin-bottom:0.25rem; }
        .form-group input, .form-group textarea { width:100%; padding:0.6rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-family:inherit; font-size:0.9rem; }
        .form-group textarea { min-height:100px; resize:vertical; }
        .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); }
        .empty-state i { font-size:3rem; display:block; margin-bottom:1rem; opacity:0.5; }
        .filter-tabs { display:flex; gap:0.25rem; background:var(--bg-light); border-radius:var(--radius-sm); padding:0.25rem; width:fit-content; }
        .filter-tab { padding:0.4rem 0.75rem; border-radius:var(--radius-sm); font-size:0.8rem; cursor:pointer; color:var(--text-light); border:none; background:none; }
        .filter-tab.active { background:var(--bg-white); color:var(--text-main); box-shadow:var(--shadow-xs); }
        .pagination { display:flex; justify-content:center; gap:0.25rem; margin-top:1.5rem; }
        .page-btn { padding:0.4rem 0.75rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.85rem; cursor:pointer; background:var(--bg-white); }
        .page-btn.active { background:var(--primary-color); color:white; border-color:var(--primary-color); }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="page-header primary-bg text-white section-padding text-center" style="padding-top:5rem; padding-bottom:2rem;">
        <div class="container">
            <h1 style="color:white;">Reviews</h1>
            <p class="section-subtitle text-white">See what our community says about products and sellers</p>
        </div>
    </section>

    <section class="section-padding">
        <div class="container" style="max-width:700px;">
            <div class="write-review" id="writeReview" style="display:none;">
                <h3 style="margin-bottom:1rem;">Write a Review</h3>
                <div class="star-input" id="starInput">
                    <i class="bi bi-star" data-rating="1"></i>
                    <i class="bi bi-star" data-rating="2"></i>
                    <i class="bi bi-star" data-rating="3"></i>
                    <i class="bi bi-star" data-rating="4"></i>
                    <i class="bi bi-star" data-rating="5"></i>
                </div>
                <div class="form-group"><label>Title</label><input type="text" id="reviewTitle" placeholder="Summarize your experience"></div>
                <div class="form-group"><label>Review</label><textarea id="reviewContent" placeholder="Share your thoughts..."></textarea></div>
                <button class="btn btn-primary btn-sm" onclick="submitReview()">Submit Review</button>
            </div>

            <div class="reviews-header">
                <div class="filter-tabs" id="filterTabs">
                    <button class="filter-tab active" data-filter="all">All</button>
                    <button class="filter-tab" data-filter="5">5 Star</button>
                    <button class="filter-tab" data-filter="4">4 Star</button>
                    <button class="filter-tab" data-filter="3">3 Star</button>
                </div>
            </div>

            <div id="reviewsList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=2.0"></script>
    <script src="js/shared/theme.js?v=2.0"></script>
    <script src="js/shared/auth.js?v=2.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=2.0"></script>
    <script src="js/shared/components.js?v=2.0"></script>
    <script src="js/shared/animations.js?v=2.0"></script>
    <script>
        function authHeaders() { const t = localStorage.getItem('flower-token'); return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' }; }
        function escapeHtml(s) { if (typeof s !== 'string') return String(s || ''); const d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
        function timeAgo(d) { const diff = Math.floor((Date.now() - new Date(d)) / 1000); if (diff < 60) return 'just now'; if (diff < 3600) return Math.floor(diff/60) + 'm ago'; if (diff < 86400) return Math.floor(diff/3600) + 'h ago'; return Math.floor(diff/86400) + 'd ago'; }

        let currentFilter = 'all';
        let currentPage = 1;
        let selectedRating = 0;

        async function init() {
            if (localStorage.getItem('flower-token')) document.getElementById('writeReview').style.display = 'block';
            loadReviews();

            document.querySelectorAll('#starInput i').forEach(star => {
                star.addEventListener('click', () => {
                    selectedRating = parseInt(star.dataset.rating);
                    document.querySelectorAll('#starInput i').forEach((s, i) => {
                        s.className = i < selectedRating ? 'bi bi-star-fill active' : 'bi bi-star';
                    });
                });
                star.addEventListener('mouseenter', () => {
                    const r = parseInt(star.dataset.rating);
                    document.querySelectorAll('#starInput i').forEach((s, i) => {
                        s.className = i < r ? 'bi bi-star-fill active' : 'bi bi-star';
                    });
                });
                star.addEventListener('mouseleave', () => {
                    document.querySelectorAll('#starInput i').forEach((s, i) => {
                        s.className = i < selectedRating ? 'bi bi-star-fill active' : 'bi bi-star';
                    });
                });
            });

            document.getElementById('filterTabs').addEventListener('click', (e) => {
                const tab = e.target.closest('.filter-tab');
                if (!tab) return;
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                currentPage = 1;
                loadReviews();
            });
        }

        async function loadReviews() {
            const params = new URLSearchParams({ page: currentPage, limit: 20 });
            if (currentFilter !== 'all') params.set('rating', currentFilter);
            let data;
            try { data = await fetch(`/api/reviews?${params}`).then(r => r.json()); } catch { data = { reviews: [], total: 0, pages: 1 }; }
            const el = document.getElementById('reviewsList');
            if (!data.reviews || !data.reviews.length) { el.innerHTML = '<div class="empty-state"><i class="bi bi-star"></i><h3>No reviews yet</h3><p>Be the first to share your experience!</p></div>'; return; }
            el.innerHTML = data.reviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <div class="review-author">
                            <div class="review-avatar">${r.reviewer_avatar ? `<img src="${escapeHtml(r.reviewer_avatar)}" alt="">` : (r.reviewer_name || 'A')[0].toUpperCase()}</div>
                            <div>
                                <div class="review-name">${escapeHtml(r.reviewer_name || 'Anonymous')}</div>
                                <div class="review-date">${timeAgo(r.created_at)}</div>
                            </div>
                        </div>
                        <div class="review-stars">${'?'.repeat(r.rating)}${'?'.repeat(5 - r.rating)}</div>
                    </div>
                    ${r.title ? `<div class="review-title">${escapeHtml(r.title)}</div>` : ''}
                    <div class="review-content">${escapeHtml(r.content || '')}</div>
                    <div class="review-footer">
                        <button onclick="markHelpful('${r.id}')"><i class="bi bi-hand-thumbs-up"></i> Helpful (${r.helpful_count || 0})</button>
                    </div>
                </div>
            `).join('');

            renderPagination(data.pages || 1);
        }

        function renderPagination(pages) {
            const el = document.getElementById('pagination');
            if (pages <= 1) { el.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            el.innerHTML = html;
        }

        function goToPage(p) { currentPage = p; loadReviews(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        async function submitReview() {
            if (!selectedRating) { alert('Please select a rating'); return; }
            const title = document.getElementById('reviewTitle').value.trim();
            const content = document.getElementById('reviewContent').value.trim();
            try {
                await fetch('/api/reviews', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ rating: selectedRating, title, content }) });
                document.getElementById('reviewTitle').value = '';
                document.getElementById('reviewContent').value = '';
                selectedRating = 0;
                document.querySelectorAll('#starInput i').forEach(s => s.className = 'bi bi-star');
                loadReviews();
            } catch {}
        }

        async function markHelpful(id) {
            if (!localStorage.getItem('flower-token')) { alert('Sign in to mark reviews as helpful'); return; }
            try { await fetch(`/api/reviews/${id}/helpful`, { method: 'POST', headers: authHeaders() }); loadReviews(); } catch {}
        }

        init();
    </script>
</body>
</html>
