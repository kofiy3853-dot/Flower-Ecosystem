<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search flowers, courses, and community discussions on Flower Ecosystem.">
    <title>Search Results | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div id="header-container"></div>

    <section class="page-header primary-bg text-white section-padding text-center" style="padding-top: 6rem; padding-bottom: 3rem;">
        <div class="container reveal-up">
            <span class="subtitle" style="color:rgba(255,255,255,0.7)">SEARCH</span>
            <h1 style="color:white;">Search Results</h1>
            <p class="section-subtitle text-white" id="searchQueryDisplay">Showing results for ""</p>
        </div>
    </section>

    <section class="section-padding bg-light">
        <div class="container">
            <div class="learning-tabs" style="justify-content:center; margin-bottom:2rem;">
                <button class="tab-btn active" data-tab="all">All</button>
                <button class="tab-btn" data-tab="products">Products</button>
                <button class="tab-btn" data-tab="courses">Courses</button>
                <button class="tab-btn" data-tab="community">Community</button>
            </div>

            <div id="resultsContainer">
                <div class="empty-state" id="emptyState" style="display:none;">
                    <i class="bi bi-search"></i>
                    <h3>No results found</h3>
                    <p id="emptyMessage">Try different keywords.</p>
                    <a href="marketplace.html" class="btn btn-primary" style="margin-top:1rem; display:inline-block;">Browse Marketplace</a>
                </div>
                <div id="resultsList"></div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js"></script>
    <script src="js/shared/theme.js"></script>
    <script src="js/shared/auth.js"></script>
    <script src="js/shared/ui.js"></script>
    <script src="js/shared/cart.js"></script>
    <script src="js/shared/components.js"></script>
    <script src="js/shared/animations.js"></script>
    <script>
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const query = (params.get('q') || '').trim();
            const display = document.getElementById('searchQueryDisplay');
            const emptyState = document.getElementById('emptyState');
            const emptyMessage = document.getElementById('emptyMessage');
            const list = document.getElementById('resultsList');

            if (!query) {
                if (display) display.textContent = 'Enter a search term to find flowers, courses, and more.';
                emptyState.style.display = 'block';
                emptyMessage.textContent = 'Please enter a search term to find what you\'re looking for.';
                return;
            }

            if (display) display.textContent = `Showing results for "${query}"`;

            let activeTab = 'all';
            let allResults = [];
            let products = [];
            let courses = [];
            let articles = [];

            try {
                [products, courses, articles] = await Promise.all([
                    api.fetchProducts(),
                    api.fetchCourses(),
                    api.fetchArticles()
                ]);
            } catch (err) {
                console.error('Search data load failed:', err);
            }

            const q = query.toLowerCase();

            function buildResults() {
                const productHits = products.filter(p =>
                    p.name.toLowerCase().includes(q) ||
                    p.seller?.toLowerCase().includes(q) ||
                    p.description?.toLowerCase().includes(q) ||
                    p.category?.toLowerCase().includes(q)
                ).map(p => ({
                    type: 'product',
                    label: 'Product',
                    icon: 'bi-bag',
                    title: p.name,
                    description: p.description || '',
                    link: `product-detail.html?id=${p.id}`,
                    meta: `$${p.price?.toFixed(2)} · ${p.seller || ''}`
                }));

                const courseHits = courses.filter(c =>
                    c.title?.toLowerCase().includes(q) ||
                    c.instructor?.toLowerCase().includes(q) ||
                    c.description?.toLowerCase().includes(q) ||
                    c.category?.toLowerCase().includes(q)
                ).map(c => ({
                    type: 'course',
                    label: 'Course',
                    icon: 'bi-book',
                    title: c.title,
                    description: c.description || '',
                    link: `course-detail.html?id=${c.id}`,
                    meta: `${c.level || 'All Levels'} · ${c.price ? '$' + c.price.toFixed(2) : 'Free'}`
                }));

                const communityHits = articles.filter(a =>
                    a.title?.toLowerCase().includes(q) ||
                    a.author?.toLowerCase().includes(q) ||
                    a.description?.toLowerCase().includes(q) ||
                    a.tag?.toLowerCase().includes(q) ||
                    a.category?.toLowerCase().includes(q)
                ).map(a => ({
                    type: 'article',
                    label: 'Article',
                    icon: 'bi-journal',
                    title: a.title,
                    description: a.description || '',
                    link: `article-detail.html?id=${a.id}`,
                    meta: `${a.readTime || ''} · ${a.author || ''}`
                }));

                allResults = [...productHits, ...courseHits, ...communityHits];
                renderTab(activeTab);
            }

            function renderTab(tab) {
                let filtered = allResults;
                if (tab === 'products') filtered = allResults.filter(r => r.type === 'product');
                else if (tab === 'courses') filtered = allResults.filter(r => r.type === 'course');
                else if (tab === 'community') filtered = allResults.filter(r => r.type === 'article');

                if (!filtered.length) {
                    emptyState.style.display = 'block';
                    list.innerHTML = '';
                    if (tab === 'all') emptyMessage.textContent = `No results found for "${query}". Try different keywords.`;
                    else emptyMessage.textContent = `No ${tab} found for "${query}". Try a different category.`;
                    return;
                }

                emptyState.style.display = 'none';
                list.innerHTML = filtered.map(r => `
                    <a href="${r.link}" style="text-decoration:none;color:inherit;display:block;">
                        <div style="background:var(--bg-white);border:1px solid var(--border-color);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1rem;transition:all 0.2s ease;display:flex;align-items:flex-start;gap:1rem;" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.06)'" onmouseout="this.style.boxShadow='none'">
                            <div style="background:var(--bg-light);border-radius:8px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <i class="bi ${r.icon}" style="color:var(--primary-color);font-size:1.2rem;"></i>
                            </div>
                            <div style="flex:1;min-width:0;">
                                <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;flex-wrap:wrap;">
                                    <span style="background:rgba(172,50,80,0.08);color:var(--primary-color);font-size:0.7rem;font-weight:600;padding:0.1rem 0.45rem;border-radius:4px;text-transform:uppercase;letter-spacing:0.03em;">${r.label}</span>
                                    <span style="font-size:0.8rem;color:var(--text-light);">${r.meta || ''}</span>
                                </div>
                                <h3 style="font-size:1rem;margin-bottom:0.25rem;">${r.title}</h3>
                                <p style="font-size:0.85rem;color:var(--text-light);margin:0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${r.description}</p>
                            </div>
                            <i class="bi bi-chevron-right" style="color:var(--text-light);flex-shrink:0;margin-top:0.5rem;"></i>
                        </div>
                    </a>
                `).join('');
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeTab = btn.dataset.tab;
                    renderTab(activeTab);
                });
            });

            buildResults();
        })();
    </script>
    <script>
        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    this.parentElement.classList.toggle('mobile-open');
                }
            });
        });
    </script>
</body>
</html>
