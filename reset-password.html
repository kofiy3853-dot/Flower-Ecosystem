<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Flower Ecosystem account password.">
    <title>Reset Password | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .auth-input { width:100%; padding:0.75rem 1rem; border:1px solid var(--border-color); border-radius:6px; font-family:var(--font-sans); font-size:0.95rem; background:var(--bg-main); color:var(--text-main); transition:border-color 0.2s; }
        .auth-input:focus { outline:none; border-color:var(--primary-color); box-shadow:0 0 0 3px rgba(74,144,217,0.12); }
        .chk-field-error { color:var(--error-color); font-size:0.8rem; margin-top:0.25rem; display:none; }
        .auth-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:0.35rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="section-padding" style="padding-top:7rem;">
        <div class="container" style="max-width:440px;">
            <div class="text-center" style="margin-bottom:2rem;">
                <span class="subtitle">RESET PASSWORD</span>
                <h2>Set New Password</h2>
                <p style="color:var(--text-light);">Enter your new password below.</p>
            </div>

            <!-- Token missing -->
            <div id="tokenMissing" style="display:none; text-align:center; background:var(--bg-white); padding:2.5rem; border-radius:12px; box-shadow:var(--shadow-md);">
                <i class="bi bi-exclamation-triangle" style="font-size:3rem; color:var(--error-color); margin-bottom:1rem; display:block;"></i>
                <h3 style="margin-bottom:0.5rem;">Invalid Reset Link</h3>
                <p style="color:var(--text-light); margin-bottom:1.5rem;">This password reset link is invalid or missing a token.</p>
                <a href="forgot-password.html" class="btn btn-primary">Request New Link</a>
            </div>

            <!-- Success -->
            <div id="resetSuccess" style="display:none; text-align:center; background:var(--bg-white); padding:2.5rem; border-radius:12px; box-shadow:var(--shadow-md);">
                <i class="bi bi-check-circle-fill" style="font-size:3rem; color:var(--accent-green); margin-bottom:1rem; display:block;"></i>
                <h3 style="margin-bottom:0.5rem;">Password Reset Successfully</h3>
                <p style="color:var(--text-light); margin-bottom:1.5rem;">Your password has been updated. You can now sign in with your new password.</p>
                <a href="javascript:void(0)" onclick="sessionStorage.setItem('pending-auth','login');if(typeof openAuthModal==='function')openAuthModal('login');else window.location.href='index.html';" class="btn btn-primary">Go to Sign In</a>
            </div>

            <!-- Form -->
            <form id="resetPwForm" style="background:var(--bg-white); padding:2.5rem; border-radius:12px; box-shadow:var(--shadow-md);">
                <div style="margin-bottom:1.25rem;">
                    <label for="rpPassword" style="display:block; font-weight:500; margin-bottom:0.5rem; font-size:0.9rem;">New Password</label>
                    <input type="password" id="rpPassword" placeholder="Min. 8 characters" class="auth-input" required minlength="8">
                    <div class="chk-field-error" id="rpPasswordError"></div>
                </div>
                <div style="margin-bottom:1.5rem;">
                    <label for="rpConfirm" style="display:block; font-weight:500; margin-bottom:0.5rem; font-size:0.9rem;">Confirm Password</label>
                    <input type="password" id="rpConfirm" placeholder="Re-enter password" class="auth-input" required>
                    <div class="chk-field-error" id="rpConfirmError"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="rpSubmitBtn" style="padding:0.9rem; font-size:1rem;">Reset Password</button>
                <p id="rpError" style="text-align:center; margin-top:1rem; color:#d32f2f; font-weight:500; display:none;"></p>
            </form>
            <div style="text-align:center; margin-top:1.5rem;">
                <p style="color:var(--text-light); font-size:0.9rem;"><a href="javascript:void(0)" onclick="sessionStorage.setItem('pending-auth','login');if(typeof openAuthModal==='function')openAuthModal('login');else window.location.href='index.html';" style="color:var(--primary-color); font-weight:500;">Back to Sign In</a></p>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=5.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.6"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                document.getElementById('resetPwForm').style.display = 'none';
                document.getElementById('tokenMissing').style.display = 'block';
                return;
            }

            document.getElementById('resetPwForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const password = document.getElementById('rpPassword').value;
                const confirm = document.getElementById('rpConfirm').value;
                const err = document.getElementById('rpError');
                const btn = document.getElementById('rpSubmitBtn');

                // Validate
                let valid = true;
                if (!password || password.length < 8) {
                    document.getElementById('rpPasswordError').textContent = 'Password must be at least 8 characters';
                    document.getElementById('rpPasswordError').style.display = 'block';
                    valid = false;
                } else {
                    document.getElementById('rpPasswordError').style.display = 'none';
                }
                if (password !== confirm) {
                    document.getElementById('rpConfirmError').textContent = 'Passwords do not match';
                    document.getElementById('rpConfirmError').style.display = 'block';
                    valid = false;
                } else {
                    document.getElementById('rpConfirmError').style.display = 'none';
                }
                if (!valid) return;

                err.style.display = 'none';
                btn.disabled = true;
                btn.innerHTML = '<span class="auth-spinner"></span> Resetting...';

                try {
                    const res = await fetch('/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                        body: JSON.stringify({ token, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Reset failed');

                    document.getElementById('resetPwForm').style.display = 'none';
                    document.getElementById('resetSuccess').style.display = 'block';
                } catch (e) {
                    err.textContent = e.message || 'Something went wrong. Please try again.';
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'Reset Password';
                }
            });
        })();
    </script>
</body>
</html>
