<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shop fresh flowers, bouquets, plants and arrangements from verified sellers on Flower Ecosystem.">
    <title>Shop Flowers | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .shop-hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:3rem 0;color:#fff;text-align:center;}
        .shop-hero h1{font-family:'Playfair Display',serif;font-size:2.5rem;margin-bottom:.5rem;}
        .shop-hero p{opacity:.8;font-size:1rem;margin-bottom:1.5rem;}
        .shop-search{max-width:560px;margin:0 auto;position:relative;}
        .shop-search input{width:100%;padding:.85rem 1.25rem .85rem 3rem;border:none;border-radius:50px;font-size:1rem;box-shadow:0 4px 20px rgba(0,0,0,.2);}
        .shop-search input:focus{outline:none;}
        .shop-search i{position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:1.1rem;}
        .shop-search button{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);padding:.55rem 1.5rem;border:none;border-radius:50px;background:#d4af37;color:#fff;font-weight:500;cursor:pointer;transition:opacity .2s;}
        .shop-search button:hover{opacity:.9;}
        .shop-pills{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:1.25rem;}
        .shop-pill{padding:.4rem 1rem;border-radius:50px;font-size:.85rem;text-decoration:none;color:#fff;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);transition:all .2s;}
        .shop-pill:hover,.shop-pill.active{background:#d4af37;color:#fff;}
        .shop-toolbar{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(--border-color);margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem;}
        .shop-toolbar .result-count{font-size:.9rem;color:var(--text-light);}
        .shop-filters{display:flex;gap:.5rem;flex-wrap:wrap;}
        .shop-filter-btn{padding:.4rem .85rem;border:1.5px solid var(--border-color);border-radius:8px;background:var(--bg-white);font-size:.85rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.35rem;}
        .shop-filter-btn:hover,.shop-filter-btn.active{border-color:#d4af37;color:#d4af37;}
        .shop-filter-btn select{border:none;background:transparent;font-size:.85rem;cursor:pointer;outline:none;}
        .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem;}
        .shop-card{background:var(--bg-white);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .3s,box-shadow .3s;position:relative;}
        .shop-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
        .shop-card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
        .shop-card-badge{position:absolute;top:.75rem;left:.75rem;background:#d4af37;color:#fff;padding:.2rem .6rem;border-radius:6px;font-size:.7rem;font-weight:600;}
        .shop-card-wishlist{position:absolute;top:.75rem;right:.75rem;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#d4af37;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1);}
        .shop-card-wishlist:hover{background:#d4af37;color:#fff;}
        .shop-card-body{padding:1.25rem;}
        .shop-card-category{font-size:.75rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.35rem;}
        .shop-card-title{font-family:'Playfair Display',serif;font-size:1.05rem;margin-bottom:.35rem;line-height:1.3;}
        .shop-card-seller{font-size:.8rem;color:var(--text-light);margin-bottom:.5rem;}
        .shop-card-rating{display:flex;align-items:center;gap:.35rem;font-size:.8rem;margin-bottom:.75rem;}
        .shop-card-rating .stars{color:#f1c40f;}
        .shop-card-rating .count{color:var(--text-light);}
        .shop-card-footer{display:flex;justify-content:space-between;align-items:center;}
        .shop-card-price{font-size:1.15rem;font-weight:700;color:#d4af37;}
        .shop-card-price .old{font-size:.8rem;color:var(--text-light);text-decoration:line-through;font-weight:400;margin-left:.35rem;}
        .shop-add-btn{padding:.5rem 1rem;border:none;border-radius:8px;background:#d4af37;color:#fff;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;}
        .shop-add-btn:hover{opacity:.9;transform:scale(1.02);}
        .shop-pagination{display:flex;justify-content:center;gap:.35rem;margin-top:2rem;}
        .shop-page-btn{width:36px;height:36px;border:1.5px solid var(--border-color);border-radius:8px;background:var(--bg-white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s;}
        .shop-page-btn:hover,.shop-page-btn.active{border-color:#d4af37;background:#d4af37;color:#fff;}
        .shop-empty{text-align:center;padding:4rem 0;color:var(--text-light);}
        .shop-empty i{font-size:3rem;margin-bottom:1rem;display:block;}
        .shop-sidebar{display:none;}
        @media(max-width:768px){
            .shop-hero h1{font-size:1.75rem;}
            .shop-grid{grid-template-columns:repeat(2,1fr);gap:1rem;}
            .shop-card-body{padding:1rem;}
            .shop-card-title{font-size:.95rem;}
        }
        @media(max-width:480px){
            .shop-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="shop-hero">
        <div class="container">
            <h1>Flower Marketplace</h1>
            <p>Fresh flowers, bouquets & plants from verified sellers</p>
            <div class="shop-search">
                <i class="bi bi-search"></i>
                <input type="search" id="shopSearch" placeholder="Search roses, bouquets, orchids...">
                <button onclick="applyShopFilters()">Search</button>
            </div>
            <div class="shop-pills" id="shopPills">
                <a class="shop-pill active" data-cat="all">All</a>
                <a class="shop-pill" data-cat="bouquets"><i class="bi bi-flower2"></i> Bouquets</a>
                <a class="shop-pill" data-cat="roses"><i class="bi bi-flower1"></i> Roses</a>
                <a class="shop-pill" data-cat="orchids"><i class="bi bi-flower3"></i> Orchids</a>
                <a class="shop-pill" data-cat="wildflowers"><i class="bi bi-flower1"></i> Wildflowers</a>
                <a class="shop-pill" data-cat="succulents"><i class="bi bi-seed"></i> Succulents</a>
                <a class="shop-pill" data-cat="plants"><i class="bi bi-flower2"></i> Indoor Plants</a>
            </div>
        </div>
    </section>

    <main class="section-padding">
        <div class="container">
            <div class="shop-toolbar">
                <div class="result-count" id="resultCount">Loading products...</div>
                <div class="shop-filters">
                    <div class="shop-filter-btn">
                        <i class="bi bi-funnel"></i>
                        <select id="sortFilter" onchange="applyShopFilters()">
                            <option value="featured">Featured</option>
                            <option value="newest">Newest</option>
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="rating">Top Rated</option>
                        </select>
                    </div>
                    <div class="shop-filter-btn">
                        <i class="bi bi-tag"></i>
                        <select id="priceFilter" onchange="applyShopFilters()">
                            <option value="all">All Prices</option>
                            <option value="0-20">Under GHS 20</option>
                            <option value="20-35">GHS 20 - 35</option>
                            <option value="35-50">GHS 35 - 50</option>
                            <option value="50+">GHS 50+</option>
                        </select>
                    </div>
                    <div class="shop-filter-btn">
                        <i class="bi bi-palette"></i>
                        <select id="colorFilter" onchange="applyShopFilters()">
                            <option value="all">Any Color</option>
                            <option value="red">Red</option>
                            <option value="pink">Pink</option>
                            <option value="white">White</option>
                            <option value="yellow">Yellow</option>
                            <option value="purple">Purple</option>
                            <option value="multi">Multi</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="shop-grid" id="shopGrid"></div>

            <div class="shop-pagination" id="shopPagination"></div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/auth.js?v=3.5"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/api.js?v=4.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script>
    (function(){
        const PER_PAGE = 12;
        let allProducts = [];
        let filtered = [];
        let currentPage = 1;
        let currentCat = 'all';
        let searchQuery = '';

        async function init() {
            try {
                const res = await api.fetchProducts();
                allProducts = Array.isArray(res) ? res : (res?.products || []);
            } catch(e) { allProducts = []; }
            applyShopFilters();
            initPills();
            initSearch();
        }

        function initPills() {
            document.querySelectorAll('.shop-pill').forEach(pill => {
                pill.addEventListener('click', e => {
                    e.preventDefault();
                    document.querySelectorAll('.shop-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    currentCat = pill.dataset.cat;
                    currentPage = 1;
                    applyShopFilters();
                });
            });
            // URL param pre-filter
            const params = new URLSearchParams(window.location.search);
            const catParam = params.get('cat');
            if (catParam) {
                currentCat = catParam;
                document.querySelectorAll('.shop-pill').forEach(p => {
                    p.classList.toggle('active', p.dataset.cat === catParam);
                });
            }
            const qParam = params.get('q');
            if (qParam) {
                searchQuery = qParam;
                document.getElementById('shopSearch').value = qParam;
            }
        }

        function initSearch() {
            let timeout;
            document.getElementById('shopSearch').addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    searchQuery = document.getElementById('shopSearch').value.trim().toLowerCase();
                    currentPage = 1;
                    applyShopFilters();
                }, 300);
            });
        }

        window.applyShopFilters = function() {
            const sort = document.getElementById('sortFilter').value;
            const priceRange = document.getElementById('priceFilter').value;
            const color = document.getElementById('colorFilter').value;

            filtered = allProducts.filter(p => {
                if (currentCat !== 'all') {
                    const catName = (p.category || p.category_name || '').toLowerCase();
                    const catId = String(p.category_id || '');
                    if (catName !== currentCat && catId !== currentCat && catName !== currentCat.replace(/-/g, ' ')) return false;
                }
                if (searchQuery) {
                    const haystack = `${p.name} ${p.description || ''} ${p.seller || ''} ${p.category || ''}`.toLowerCase();
                    if (!haystack.includes(searchQuery)) return false;
                }
                if (priceRange !== 'all') {
                    const price = p.price || 0;
                    if (priceRange.endsWith('+')) {
                        if (price < Number(priceRange)) return false;
                    } else {
                        const [min, max] = priceRange.split('-').map(Number);
                        if (price < min || price > max) return false;
                    }
                }
                if (color !== 'all' && (p.color || '').toLowerCase() !== color) return false;
                return true;
            });

            if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
            else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
            else if (sort === 'rating') filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            else if (sort === 'newest') filtered.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
            else filtered.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0) || (b.rating || 0) - (a.rating || 0));

            document.getElementById('resultCount').textContent = `Showing ${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;
            renderShopGrid();
            renderPagination();
        };

        function renderShopGrid() {
            const grid = document.getElementById('shopGrid');
            const start = (currentPage - 1) * PER_PAGE;
            const items = filtered.slice(start, start + PER_PAGE);

            if (!items.length) {
                grid.innerHTML = '<div class="shop-empty"><i class="bi bi-search"></i><h3>No products found</h3><p>Try adjusting your filters or search terms.</p></div>';
                return;
            }

            grid.innerHTML = items.map(p => {
                const img = p.image || '';
                const badge = p.badge || (p.stockQuantity <= 10 ? 'Low Stock' : '');
                const discount = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
                const rating = p.rating || 0;
                const fullStars = Math.floor(rating);
                const halfStar = rating - fullStars >= 0.5;
                let starsHtml = '';
                for (let i = 0; i < fullStars; i++) starsHtml += '<i class="bi bi-star-fill"></i>';
                if (halfStar) starsHtml += '<i class="bi bi-star-half"></i>';
                for (let i = fullStars + (halfStar ? 1 : 0); i < 5; i++) starsHtml += '<i class="bi bi-star"></i>';

                return `
                <div class="shop-card">
                    ${badge ? `<span class="shop-card-badge">${badge}</span>` : ''}
                    ${discount ? `<span class="shop-card-badge" style="background:#e74c3c;left:auto;right:.75rem;">-${discount}%</span>` : ''}
                    <a href="product-detail.html?id=${p.id}">
                        <img class="shop-card-img" src="${img}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22><rect fill=%22%23d4af37%22 width=%22400%22 height=%22400%22/><text x=%22200%22 y=%22220%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2280%22>🌸</text></svg>'">
                    </a>
                    <button class="shop-card-wishlist" data-id="${p.id}" aria-label="Add to wishlist"><i class="bi bi-heart"></i></button>
                    <div class="shop-card-body">
                        <div class="shop-card-category">${p.category || 'Flowers'}</div>
                        <a href="product-detail.html?id=${p.id}" style="text-decoration:none;color:inherit;">
                            <h3 class="shop-card-title">${p.name}</h3>
                        </a>
                        <div class="shop-card-seller">by ${p.seller || 'Unknown'}</div>
                        <div class="shop-card-rating">
                            <span class="stars">${starsHtml}</span>
                            <span class="count">(${p.reviews || 0})</span>
                        </div>
                        <div class="shop-card-footer">
                            <div class="shop-card-price">
                                ${p.currency || 'GHS'} ${Number(p.price).toFixed(2)}
                                ${p.oldPrice ? `<span class="old">${p.currency || 'GHS'} ${Number(p.oldPrice).toFixed(2)}</span>` : ''}
                            </div>
                            <button class="shop-add-btn" onclick="addToCart('${p.id}','${(p.name||'').replace(/'/g,"\\'")}',${p.price},'${img}')">
                                <i class="bi bi-cart-plus"></i> Add
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderPagination() {
            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            const el = document.getElementById('shopPagination');
            if (totalPages <= 1) { el.innerHTML = ''; return; }

            let html = '';
            if (currentPage > 1) html += `<button class="shop-page-btn" onclick="goToPage(${currentPage-1})"><i class="bi bi-chevron-left"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="shop-page-btn${i === currentPage ? ' active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            if (currentPage < totalPages) html += `<button class="shop-page-btn" onclick="goToPage(${currentPage+1})"><i class="bi bi-chevron-right"></i></button>`;
            el.innerHTML = html;
        }

        window.goToPage = function(page) {
            currentPage = page;
            renderShopGrid();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Wishlist toggle
        document.addEventListener('click', e => {
            const btn = e.target.closest('.shop-card-wishlist');
            if (!btn) return;
            e.preventDefault();
            const icon = btn.querySelector('i');
            icon.classList.toggle('bi-heart');
            icon.classList.toggle('bi-heart-fill');
        });

        init();
    })();
    </script>
</body>
</html>
