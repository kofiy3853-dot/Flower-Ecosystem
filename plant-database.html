<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Searchable plant database with detailed care information, growing conditions, and benefits for 28+ flower species.">
    <title>Plant Database | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=2.0">
    <link rel="stylesheet" href="styles/landing-redesign.css?v=2.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .db-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; }
        .db-search { display:flex; gap:0.5rem; flex:1; max-width:400px; }
        .db-search input { flex:1; padding:0.6rem 1rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.9rem; background:var(--bg-white); color:var(--text-main); }
        .db-search input:focus { outline:none; border-color:var(--primary-color); }
        .filter-row { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:1.5rem; align-items:center; }
        .filter-group { display:flex; flex-direction:column; gap:0.25rem; }
        .filter-group label { font-size:0.75rem; color:var(--text-muted); font-weight:500; }
        .filter-group select { padding:0.45rem 0.75rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.85rem; background:var(--bg-white); color:var(--text-main); }
        .view-toggle { display:flex; background:var(--bg-light); border-radius:var(--radius-sm); padding:0.2rem; margin-left:auto; }
        .view-btn { padding:0.4rem 0.75rem; border:none; background:none; border-radius:var(--radius-sm); cursor:pointer; font-size:0.85rem; color:var(--text-light); transition:all 0.2s; }
        .view-btn.active { background:var(--bg-white); color:var(--text-main); box-shadow:var(--shadow-xs); }
        .results-count { font-size:0.85rem; color:var(--text-light); margin-bottom:1rem; }
        .db-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
        .db-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); overflow:hidden; transition:all 0.3s; cursor:pointer; }
        .db-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--primary-color); }
        .db-card-img { height:140px; overflow:hidden; }
        .db-card-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; }
        .db-card:hover .db-card-img img { transform:scale(1.05); }
        .db-card-body { padding:0.75rem 1rem; }
        .db-card-body h3 { font-size:0.9rem; margin-bottom:0.1rem; display:flex; align-items:center; gap:0.3rem; }
        .db-card-body .sci { font-size:0.75rem; color:var(--text-light); font-style:italic; margin-bottom:0.3rem; }
        .db-card-tags { display:flex; flex-wrap:wrap; gap:0.25rem; }
        .db-tag { font-size:0.65rem; padding:0.1rem 0.4rem; border-radius:12px; background:var(--bg-light); color:var(--text-light); }
        .db-table-wrap { overflow-x:auto; border:1px solid var(--border-color); border-radius:var(--radius-md); background:var(--bg-white); }
        .db-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        .db-table th { padding:0.75rem 1rem; text-align:left; font-weight:600; background:var(--bg-light); border-bottom:2px solid var(--border-color); white-space:nowrap; cursor:pointer; user-select:none; }
        .db-table th:hover { color:var(--primary-color); }
        .db-table th i { margin-left:0.3rem; font-size:0.7rem; }
        .db-table td { padding:0.6rem 1rem; border-bottom:1px solid var(--border-light); }
        .db-table tr:hover { background:rgba(172,50,80,0.02); }
        .db-table .plant-cell { display:flex; align-items:center; gap:0.5rem; }
        .db-table .plant-thumb { width:36px; height:36px; border-radius:6px; object-fit:cover; }
        .db-table .plant-name { font-weight:500; }
        .db-table .plant-sci { font-size:0.75rem; color:var(--text-light); font-style:italic; }
        .db-table .diff-badge { padding:0.15rem 0.5rem; border-radius:12px; font-size:0.7rem; font-weight:500; }
        .diff-easy { background:rgba(16,185,129,0.1); color:var(--accent-green); }
        .diff-moderate { background:rgba(245,158,11,0.1); color:var(--accent-gold); }
        .diff-hard { background:rgba(239,68,68,0.1); color:var(--error-color); }
        .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); }
        .empty-state i { font-size:3rem; display:block; margin-bottom:1rem; opacity:0.5; }
        @media(max-width:1024px) { .db-grid { grid-template-columns:repeat(3,1fr); } }
        @media(max-width:768px) { .db-grid { grid-template-columns:repeat(2,1fr); } .filter-row { flex-direction:column; } }
        @media(max-width:480px) { .db-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="page-header primary-bg text-white section-padding text-center" style="padding-top:5rem; padding-bottom:2.5rem;">
        <div class="container reveal-up">
            <span class="subtitle" style="color:rgba(255,255,255,0.7)">ENCYCLOPEDIA</span>
            <h1 style="color:white;">Plant Database</h1>
            <p class="section-subtitle text-white">Searchable database of 28+ flower species with care requirements, growing conditions, and benefits</p>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="db-header reveal-up">
                <div class="db-search">
                    <input type="text" id="dbSearch" placeholder="Search by name, family, origin..." aria-label="Search plants">
                    <button class="btn btn-primary btn-sm" id="dbSearchBtn"><i class="bi bi-search"></i></button>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid" title="Grid View"><i class="bi bi-grid-3x3-gap"></i></button>
                    <button class="view-btn" data-view="table" title="Table View"><i class="bi bi-list-ul"></i></button>
                </div>
            </div>

            <div class="filter-row reveal-up">
                <div class="filter-group">
                    <label>Difficulty</label>
                    <select id="filterDifficulty"><option value="">All Levels</option><option value="Easy">Easy</option><option value="Moderate">Moderate</option><option value="Hard">Hard</option></select>
                </div>
                <div class="filter-group">
                    <label>Light</label>
                    <select id="filterLight"><option value="">All Light</option><option value="Full Sun">Full Sun</option><option value="Partial Sun">Partial Sun</option><option value="Shade">Shade</option><option value="Indirect">Indirect</option></select>
                </div>
                <div class="filter-group">
                    <label>Origin</label>
                    <select id="filterOrigin"><option value="">All Origins</option></select>
                </div>
                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="sortBy"><option value="name">Name</option><option value="difficulty">Difficulty</option><option value="family">Family</option><option value="origin">Origin</option></select>
                </div>
            </div>

            <div class="results-count reveal-up" id="resultsCount"></div>

            <div id="dbContainer" class="db-grid reveal-up"></div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=2.0"></script>
    <script src="js/shared/theme.js?v=2.0"></script>
    <script src="js/shared/auth.js?v=2.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=2.0"></script>
    <script src="js/shared/components.js?v=2.0"></script>
    <script src="js/shared/animations.js?v=2.0"></script>
    <script src="js/plant-database.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initPlantDatabase();
        });
    </script>
</body>
</html>
