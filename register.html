<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Flower Ecosystem account to buy, sell, learn, and connect with the global floral community.">
    <title>Create Account | Flower Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=2.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .auth-input { width:100%; padding:0.75rem 1rem; border:1px solid var(--border-color); border-radius:6px; font-family:var(--font-sans); font-size:0.95rem; background:var(--bg-main); color:var(--text-main); transition:border-color 0.2s; }
        .auth-input:focus { outline:none; border-color:var(--primary-color); box-shadow:0 0 0 3px rgba(74,144,217,0.12); }
        .chk-field-error { color:var(--error-color); font-size:0.8rem; margin-top:0.25rem; display:none; }
        .auth-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:0.35rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .auth-toast { position:fixed; bottom:2rem; right:2rem; padding:1rem 1.5rem; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.15); z-index:9999; font-weight:500; font-size:0.95rem; transform:translateY(20px); opacity:0; transition:all 0.3s ease; }
        .auth-toast.active { transform:translateY(0); opacity:1; }
        .auth-toast-success { background:var(--accent-green); color:white; }
        .auth-toast-error { background:var(--error-color); color:white; }
        .password-toggle { position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-light); font-size:1rem; padding:0.25rem; }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="section-padding" style="padding-top:7rem;">
        <div class="container" style="max-width:480px;">
            <div class="text-center" style="margin-bottom:2rem;">
                <span class="subtitle">GET STARTED</span>
                <h2>Create Your Account</h2>
                <p style="color:var(--text-light);">Join the Flower Ecosystem and unlock everything.</p>
            </div>
            <form id="registerPageForm" style="background:var(--bg-white); padding:2.5rem; border-radius:12px; box-shadow:var(--shadow-md);" novalidate>
                <div style="margin-bottom:1.25rem;">
                    <label for="regName" style="display:block; font-weight:500; margin-bottom:0.5rem; font-size:0.9rem;">Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe" class="auth-input" required>
                    <div class="chk-field-error" id="regNameError"></div>
                </div>
                <div style="margin-bottom:1.25rem;">
                    <label for="regEmail" style="display:block; font-weight:500; margin-bottom:0.5rem; font-size:0.9rem;">Email Address</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" class="auth-input" required>
                    <div class="chk-field-error" id="regEmailError"></div>
                </div>
                <div style="margin-bottom:1.25rem;">
                    <label for="regPassword" style="display:block; font-weight:500; margin-bottom:0.5rem; font-size:0.9rem;">Password</label>
                    <div style="position:relative;">
                        <input type="password" id="regPassword" placeholder="At least 8 characters" class="auth-input" style="padding-right:2.5rem;" required minlength="8">
                        <button type="button" id="toggle-regPw" class="password-toggle" aria-label="Toggle password visibility"><i class="bi bi-eye"></i></button>
                    </div>
                    <div id="pwStrength" style="margin-top:0.35rem;"></div>
                    <div class="chk-field-error" id="regPasswordError"></div>
                </div>
                <div style="margin-bottom:1.25rem;">
                    <label for="regRole" style="display:block; font-weight:500; margin-bottom:0.5rem; font-size:0.9rem;">I am a:</label>
                    <select id="regRole" class="auth-input">
                        <option value="buyer">Customer (Buyer)</option>
                        <option value="seller">Seller / Florist</option>
                        <option value="grower">Grower</option>
                        <option value="instructor">Instructor</option>
                    </select>
                </div>
                <div style="display:flex; align-items:flex-start; gap:0.5rem; margin-bottom:1.5rem;">
                    <input type="checkbox" id="regTerms" style="width:16px; height:16px; margin-top:3px; accent-color:var(--primary-color);" required>
                    <label for="regTerms" style="font-size:0.85rem; color:var(--text-light); cursor:pointer;">I agree to the <a href="#" style="color:var(--primary-color);">Terms of Service</a> and <a href="#" style="color:var(--primary-color);">Privacy Policy</a></label>
                </div>
                <div class="chk-field-error" id="regTermsError" style="margin-top:-1rem; margin-bottom:1rem;"></div>
                <button type="submit" class="btn btn-primary w-100" id="regSubmitBtn" style="padding:0.9rem; font-size:1rem;">Create Account</button>
                <p id="registerPageError" style="text-align:center; margin-top:1rem; color:#d32f2f; font-weight:500; display:none;"></p>
            </form>
            <div style="text-align:center; margin-top:1.5rem;">
                <p style="color:var(--text-light); font-size:0.9rem;">Already have an account? <a href="login.html" style="color:var(--primary-color); font-weight:500;">Sign in</a></p>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=2.0"></script>
    <script src="js/shared/theme.js?v=2.0"></script>
    <script src="js/shared/auth.js?v=2.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=2.0"></script>
    <script src="js/shared/components.js?v=2.0"></script>
    <script src="js/shared/animations.js?v=2.0"></script>
    <script src="js/auth-pages.js"></script>
    <script>
        const regForm = document.getElementById('registerPageForm');
        const regError = document.getElementById('registerPageError');

        setupPasswordToggle('regPassword', 'toggle-regPw');

        document.getElementById('regPassword').addEventListener('input', function() {
            renderPasswordStrength(this.value, 'pwStrength');
        });

        document.getElementById('regEmail').addEventListener('blur', function() {
            if (this.value.trim() && !validateEmail(this.value.trim())) {
                showFieldError('regEmail', 'regEmailError', 'Please enter a valid email');
            } else {
                clearFieldError('regEmail', 'regEmailError');
            }
        });

        regForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const role = document.getElementById('regRole').value;
            const terms = document.getElementById('regTerms').checked;

            let valid = true;
            if (!name) { showFieldError('regName', 'regNameError', 'Name is required'); valid = false; } else { clearFieldError('regName', 'regNameError'); }
            if (!email) { showFieldError('regEmail', 'regEmailError', 'Email is required'); valid = false; }
            else if (!validateEmail(email)) { showFieldError('regEmail', 'regEmailError', 'Please enter a valid email'); valid = false; }
            else { clearFieldError('regEmail', 'regEmailError'); }
            if (!password) { showFieldError('regPassword', 'regPasswordError', 'Password is required'); valid = false; }
            else if (password.length < 8) { showFieldError('regPassword', 'regPasswordError', 'Password must be at least 8 characters'); valid = false; }
            else { clearFieldError('regPassword', 'regPasswordError'); }
            if (!terms) { showFieldError('regTerms', 'regTermsError', 'Please agree to the Terms of Service'); valid = false; } else { clearFieldError('regTerms', 'regTermsError'); }

            if (!valid) return;
            regError.style.display = 'none';

            setButtonLoading('regSubmitBtn', true);
            try {
                const result = await apiRegister(name, email, password, role);
                setLoggedIn(result.user, result.token);
                if (typeof updateAccountUI === 'function') updateAccountUI();
                showToast('Account created! Welcome to Flower Ecosystem.', 'success');
            } catch (apiErr) {
                regError.textContent = apiErr.message || 'Registration failed';
                regError.style.display = 'block';
                setButtonLoading('regSubmitBtn', false, 'Create Account');
                return;
            }

            const pendingSell = sessionStorage.getItem('pending-sell');
            if (pendingSell) {
                sessionStorage.removeItem('pending-sell');
                window.location.href = 'sell.html';
                return;
            }
            const params = new URLSearchParams(window.location.search);
            const explicitRedirect = params.get('redirect');
            if (explicitRedirect) {
                setTimeout(() => { window.location.href = explicitRedirect; }, 800);
            } else {
                afterAuth();
            }
        });

        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    this.parentElement.classList.toggle('mobile-open');
                }
            });
        });
    </script>
</body>
</html>
