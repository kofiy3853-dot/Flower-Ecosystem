<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Step-by-step tutorial - Flower Ecosystem Learning Center">
    <meta property="og:title" content="Tutorial | Flower Ecosystem">
    <meta property="og:description" content="Step-by-step floristry tutorials on Flower Ecosystem.">
    <meta property="og:type" content="website">
    <title>Tutorial - Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .tutorial-hero { background: #0f0f0f; padding: 1rem 0; }
        .tutorial-hero .breadcrumb { font-size: 0.8rem; opacity: 0.6; color: var(--white); }
        .tutorial-hero .breadcrumb a { color: var(--white); text-decoration: underline; }
        .video-player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .video-player-wrap iframe { width: 100%; height: 100%; border: none; }
        .tutorial-meta { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.75rem; margin: 1rem 0; }
        .tutorial-meta h1 { font-family: var(--font-serif); font-size: 1.5rem; margin: 0; }
        .tutorial-stats { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-light); }
        .tutorial-stats span { display: flex; align-items: center; gap: 0.3rem; }
        .instructor-row { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 0; border-bottom: 1px solid var(--border-color); margin-bottom: 1rem; }
        .instructor-row img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .instructor-row .name { font-weight: 600; }
        .instructor-row .subs { font-size: 0.8rem; color: var(--text-light); }
        .tutorial-layout { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; padding: 1.5rem 0; align-items: start; }
        .section-title { font-family: var(--font-serif); font-size: 1.25rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--primary-color); display: inline-block; }
        .steps-list { counter-reset: step; list-style: none; padding: 0; }
        .steps-list li { counter-increment: step; position: relative; padding: 1rem 1rem 1rem 3.5rem; margin-bottom: 0.75rem; background: var(--bg-white); border-radius: 10px; border: 1px solid var(--border-color); line-height: 1.6; }
        .steps-list li::before { content: counter(step); position: absolute; left: 0.75rem; top: 1rem; width: 28px; height: 28px; background: var(--primary-color); color: #fff; font-weight: 600; font-size: 0.85rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .materials-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .materials-grid span { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.85rem; border-radius: 20px; font-size: 0.82rem; font-weight: 500; background: var(--bg-light); border: 1px solid var(--border-color); color: var(--text-main); }
        .materials-grid span i { color: var(--primary-color); font-size: 0.8rem; }
        .tag-badge { display: inline-block; padding: 0.2rem 0.65rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; background: var(--primary-color); color: var(--white); }
        .related-tutorial-card { display: flex; gap: 0.75rem; padding: 0.65rem 0; cursor: pointer; transition: opacity 0.2s; text-decoration: none; color: inherit; }
        .related-tutorial-card:hover { opacity: 0.8; }
        .related-tutorial-card img { width: 160px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .related-tutorial-card .rt-title { font-size: 0.9rem; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .related-tutorial-card .rt-meta { font-size: 0.78rem; color: var(--text-light); }
        .tutorial-desc { line-height: 1.7; color: var(--text-color); margin-bottom: 1.5rem; }
        .tutorial-content-section { margin-bottom: 2rem; }
        @media (max-width: 768px) {
            .tutorial-layout { grid-template-columns: 1fr; }
            .related-tutorial-card img { width: 120px; }
            .tutorial-meta h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main>
        <section class="tutorial-hero">
            <div class="container">
                <p class="breadcrumb"><a href="index.html">Home</a> / <a href="learning.html">Learning Center</a> / <a href="learning.html?tab=courses">Tutorials</a> / <span id="breadcrumbTutorial">Tutorial</span></p>
            </div>
        </section>
        <div class="container tutorial-layout">
            <div>
                <div class="video-player-wrap"><iframe id="videoPlayer" src="" allowfullscreen loading="lazy"></iframe></div>
                <div class="tutorial-meta">
                    <div>
                        <span class="tag-badge" id="tutorialTag">Tutorial</span>
                        <h1 id="tutorialTitle">Loading...</h1>
                    </div>
                    <div class="tutorial-stats">
                        <span><i class="bi bi-eye"></i> <span id="tutorialViews">0</span></span>
                        <span><i class="bi bi-clock"></i> <span id="tutorialDuration">0</span></span>
                    </div>
                </div>
                <div class="instructor-row">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=100&auto=format&fit=crop" alt="" id="instructorImg">
                    <div><div class="name" id="tutorialInstructor">Instructor</div><div class="subs">Floristry Expert</div></div>
                </div>
                <div class="tutorial-desc" id="tutorialDescription"></div>

                <div class="tutorial-content-section" id="stepsSection">
                    <h3 class="section-title">Step-by-Step Guide</h3>
                    <ol class="steps-list" id="stepsList"></ol>
                </div>

                <div class="tutorial-content-section" id="materialsSection">
                    <h3 class="section-title">Tools & Materials Needed</h3>
                    <div class="materials-grid" id="materialsGrid"></div>
                </div>
            </div>
            <div>
                <h4 style="font-family:'Playfair Display',serif;margin-bottom:0.75rem;">More Tutorials</h4>
                <div id="relatedTutorials"></div>
            </div>
        </div>
    </main>
    <div id="footer-container"></div>
    <div id="auth-modal-container"></div>
    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/auth.js?v=3.4"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/shared/api.js?v=4.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script>
        const allTutorials = [
            {
                "id": "v1",
                "title": "Modern Arrangement Techniques",
                "tag": "Tutorial",
                "category": "Arrangement Techniques",
                "duration": "12:34 min",
                "description": "Learn contemporary arrangement styles from pro florist Maria Chen.",
                "instructor": "Maria Chen",
                "video_url": "https://www.youtube.com/embed/dQw4w9WgXcQ",
                "image": "https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?q=80&w=600&auto=format&fit=crop",
                "views": 12453,
                "steps": [
                    "Prepare your workspace with all necessary tools: sharp scissors, floral foam, vase, and a selection of seasonal flowers.",
                    "Condition your flowers by cutting stems at a 45-degree angle and removing any leaves that would sit below the waterline.",
                    "Start with a base of greenery — eucalyptus, ferns, or ivy — to create structure and fill the vase silhouette.",
                    "Add focal flowers (largest blooms) first, placing them at varying heights for visual interest and depth.",
                    "Insert secondary flowers around the focal points, working in a spiral pattern to create a balanced, rounded shape.",
                    "Fill gaps with accent flowers and textural elements like berries, seed pods, or ornamental grasses.",
                    "Step back and assess your arrangement from all angles. Adjust stems, rotate flowers, and trim any overreaching pieces.",
                    "Finish with a clean water change, add flower food, and place in a cool spot away from direct sunlight."
                ],
                "materials": ["Sharp floral scissors", "Floral foam or frog", "Clean vase or container", "Assorted seasonal flowers", "Greenery (eucalyptus, ferns)", "Accent elements (berries, pods)", "Flower food", "Gardening gloves"]
            },
            {
                "id": "v6",
                "title": "Floristry Essentials for Beginners",
                "tag": "Tutorial",
                "category": "Beginner Floristry",
                "duration": "18:45 min",
                "description": "Master the fundamental tools, techniques, and principles of floristry.",
                "instructor": "Maria Chen",
                "video_url": "https://www.youtube.com/embed/dQw4w9WgXcQ",
                "image": "https://images.unsplash.com/photo-1416879595882-3373a0480b5b?q=80&w=600&auto=format&fit=crop",
                "views": 18902,
                "steps": [
                    "Familiarize yourself with essential floristry tools: floral shears, stem stripper, floral tape, wire, and ribbon scissors.",
                    "Learn the basic flower categories: focal flowers (roses, lilies), filler flowers (baby's breath, waxflower), and greenery (eucalyptus, ferns).",
                    "Master the spiral technique: hold stems at a cross point, add each new stem at a slight angle, rotating the bundle as you go.",
                    "Practice proper stem preparation: cut at 45 degrees, remove thorns carefully, strip lower leaves to prevent bacterial growth.",
                    "Understand color theory basics: complementary colors (opposite on the wheel), analogous (next to each other), and monochromatic (single color family).",
                    "Learn vase preparation: clean thoroughly, add flower food, use the right vase size — the opening should be about half the bouquet width.",
                    "Explore design principles: proportion (2.5x vase height), balance (visual weight distribution), and rhythm (repetition of elements).",
                    "Complete your first arrangement: start with greenery base, add focal flowers, fill with secondary blooms, and finish with accents."
                ],
                "materials": ["Floral shears", "Stem stripper", "Floral tape", "Assorted flowers", "Greenery", "Vase", "Flower food", "Ribbon", "Gardening gloves"]
            }
        ];
    </script>
    <script>
        (() => {
            const urlParams = new URLSearchParams(window.location.search);
            const tutorialId = urlParams.get('id') || 'v1';
            const tutorial = allTutorials.find(t => t.id === tutorialId) || allTutorials[0];
            if (!tutorial) { document.getElementById('tutorialTitle').textContent = 'Tutorial not found'; return; }

            document.title = `${tutorial.title} - Flower Ecosystem`;
            document.getElementById('breadcrumbTutorial').textContent = tutorial.title;
            document.getElementById('tutorialTitle').textContent = tutorial.title;
            document.getElementById('tutorialTag').textContent = tutorial.tag || 'Tutorial';
            document.getElementById('tutorialDuration').textContent = tutorial.duration || '';
            document.getElementById('tutorialViews').textContent = tutorial.views ? tutorial.views.toLocaleString() + ' views' : '';
            document.getElementById('tutorialInstructor').textContent = tutorial.instructor || 'Flower Ecosystem';
            document.getElementById('tutorialDescription').textContent = tutorial.description || '';
            document.getElementById('videoPlayer').src = tutorial.video_url || 'https://www.youtube.com/embed/dQw4w9WgXcQ';

            const stepsEl = document.getElementById('stepsList');
            if (tutorial.steps && tutorial.steps.length) {
                stepsEl.innerHTML = tutorial.steps.map(s => `<li>${s}</li>`).join('');
            } else {
                document.getElementById('stepsSection').style.display = 'none';
            }

            const materialsEl = document.getElementById('materialsGrid');
            if (tutorial.materials && tutorial.materials.length) {
                materialsEl.innerHTML = tutorial.materials.map(m => `<span><i class="bi bi-check2-circle"></i> ${m}</span>`).join('');
            } else {
                document.getElementById('materialsSection').style.display = 'none';
            }

            const related = allTutorials.filter(t => t.id !== tutorial.id && t.category === tutorial.category).slice(0, 6);
            const rvEl = document.getElementById('relatedTutorials');
            if (related.length) {
                rvEl.innerHTML = related.map(t => `
                    <a href="tutorial-detail.html?id=${t.id}" class="related-tutorial-card">
                        <img loading="lazy" src="${t.image}" alt="${t.title}">
                        <div>
                            <div class="rt-title">${t.title}</div>
                            <div class="rt-meta">${t.instructor || ''} — ${t.views ? t.views.toLocaleString() + ' views' : ''}</div>
                            <div class="rt-meta">${t.duration || ''}</div>
                        </div>
                    </a>`
                ).join('');
            } else {
                rvEl.innerHTML = '<p style="color:var(--text-light);font-size:0.9rem;">No related tutorials.</p>';
            }
        })();
    </script>
    <script>
        document.querySelectorAll('.nav-dropdown > .dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) { e.preventDefault(); this.parentElement.classList.toggle('mobile-open'); }
            });
        });
    </script>
</body>
</html>
