<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover and join flower-themed clubs and communities on Flower Ecosystem.">
    <title>Clubs & Groups | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .club-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; }
        .club-search { display:flex; gap:0.5rem; flex:1; max-width:400px; }
        .club-search input { flex:1; padding:0.6rem 1rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.9rem; background:var(--bg-white); color:var(--text-main); }
        .club-search input:focus { outline:none; border-color:var(--primary-color); }
        .club-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; margin-bottom:2rem; }
        .club-stats .stat-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1rem; text-align:center; }
        .club-stats .stat-card .num { font-size:1.4rem; font-weight:700; color:var(--primary-color); }
        .club-stats .stat-card .label { font-size:0.78rem; color:var(--text-light); }
        .club-cat-tabs { display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.5rem; margin-bottom:1.5rem; scrollbar-width:thin; }
        .club-cat-tab { padding:0.5rem 1rem; border:1px solid var(--border-color); border-radius:20px; font-size:0.83rem; white-space:nowrap; cursor:pointer; background:var(--bg-white); color:var(--text-light); transition:all 0.2s; }
        .club-cat-tab:hover { border-color:var(--primary-color); color:var(--primary-color); }
        .club-cat-tab.active { background:var(--primary-color); color:white; border-color:var(--primary-color); }
        .club-sort-tabs { display:flex; gap:0.25rem; background:var(--bg-light); border-radius:var(--radius-sm); padding:0.25rem; width:fit-content; margin-bottom:1rem; }
        .club-sort-tab { padding:0.4rem 0.75rem; border-radius:var(--radius-sm); font-size:0.8rem; cursor:pointer; color:var(--text-light); border:none; background:none; }
        .club-sort-tab.active { background:var(--bg-white); color:var(--text-main); box-shadow:var(--shadow-xs); }
        .clubs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
        .club-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.25rem; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; gap:0.4rem; }
        .club-card:hover { border-color:var(--primary-color); box-shadow:var(--shadow-sm); transform:translateY(-2px); }
        .club-card.skeleton { pointer-events:none; }
        .club-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.25rem; }
        .club-card-icon { font-size:1.8rem; }
        .club-card-cat { font-size:0.7rem; background:rgba(172,50,80,0.08); color:var(--primary-color); padding:0.15rem 0.5rem; border-radius:4px; }
        .club-card-name { font-size:1rem; font-weight:600; }
        .club-card-desc { font-size:0.83rem; color:var(--text-light); line-height:1.5; }
        .club-card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:0.5rem; font-size:0.8rem; color:var(--text-muted); }
        .club-card-members i { margin-right:0.2rem; }
        .club-empty { grid-column:1/-1; text-align:center; padding:3rem 1rem; color:var(--text-light); }
        .club-empty i { font-size:3rem; display:block; margin-bottom:1rem; opacity:0.5; }
        .club-total { font-size:0.85rem; color:var(--text-muted); margin-bottom:0.75rem; }

        /* Detail page */
        .club-detail-layout { display:grid; grid-template-columns:1fr 260px; gap:1.5rem; }
        .club-detail-hero { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); overflow:hidden; margin-bottom:1rem; }
        .club-cover { width:100%; height:160px; object-fit:cover; }
        .club-detail-info { padding:1.25rem; }
        .club-detail-icon { font-size:2.5rem; display:block; margin-bottom:0.5rem; }
        .club-detail-info h1 { font-size:1.4rem; margin-bottom:0.25rem; }
        .club-detail-cat { font-size:0.78rem; background:rgba(172,50,80,0.08); color:var(--primary-color); padding:0.15rem 0.5rem; border-radius:4px; }
        .club-detail-info p { font-size:0.9rem; color:var(--text-light); margin:0.5rem 0; line-height:1.6; }
        .club-detail-meta { display:flex; gap:1rem; flex-wrap:wrap; font-size:0.83rem; color:var(--text-muted); margin-bottom:0.75rem; }
        .club-post-box { margin-top:1rem; display:flex; gap:0.5rem; }
        .club-post-box textarea { flex:1; padding:0.6rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-family:inherit; font-size:0.88rem; min-height:60px; resize:vertical; }
        .club-post-box textarea:focus { outline:none; border-color:var(--primary-color); }
        .club-posts { display:flex; flex-direction:column; gap:0.75rem; }
        .club-post-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1rem; }
        .club-post-author { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; }
        .club-post-avatar { width:32px; height:32px; border-radius:50%; background:var(--bg-light); display:flex; align-items:center; justify-content:center; font-size:0.8rem; overflow:hidden; flex-shrink:0; }
        .club-post-avatar img { width:100%; height:100%; object-fit:cover; }
        .club-post-name { font-size:0.85rem; font-weight:500; }
        .club-post-time { font-size:0.75rem; color:var(--text-muted); }
        .club-post-content { font-size:0.88rem; line-height:1.6; color:var(--text-main); }
        .club-post-image { max-width:100%; max-height:300px; border-radius:var(--radius-sm); margin-top:0.5rem; object-fit:cover; }
        .club-member-item { display:flex; align-items:center; gap:0.5rem; padding:0.4rem 0; cursor:pointer; font-size:0.85rem; }
        .club-member-avatar { width:30px; height:30px; border-radius:50%; background:var(--bg-light); display:flex; align-items:center; justify-content:center; font-size:0.75rem; overflow:hidden; flex-shrink:0; }
        .club-member-avatar img { width:100%; height:100%; object-fit:cover; }
        .club-member-name { font-weight:500; }
        .club-member-role { font-size:0.72rem; color:var(--text-muted); }
        .sidebar-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1rem; }
        .sidebar-card h3 { font-size:0.9rem; margin-bottom:0.5rem; }
        .skeleton-box { background:var(--bg-light); border-radius:4px; }
        .skeleton-text { background:var(--bg-light); border-radius:4px; animation:pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @media(max-width:900px) { .club-detail-layout { grid-template-columns:1fr; } }
        @media(max-width:600px) { .clubs-grid { grid-template-columns:1fr; } .club-stats { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="page-header primary-bg text-white section-padding text-center" style="padding-top:5rem;padding-bottom:2.5rem;">
        <div class="container">
            <span class="subtitle" style="color:rgba(255,255,255,0.7)">COMMUNITIES</span>
            <h1 style="color:white;">Clubs & Groups</h1>
            <p class="section-subtitle text-white">Connect with like-minded flower enthusiasts</p>
        </div>
    </section>

    <section class="section-padding" id="clubsListingPage">
        <div class="container">
            <div class="club-stats reveal-up" id="clubStats"></div>

            <div class="club-header reveal-up">
                <div class="club-search">
                    <input type="text" id="clubSearch" placeholder="Search clubs..." aria-label="Search clubs">
                    <button class="btn btn-primary btn-sm" id="clubSearchBtn"><i class="bi bi-search"></i></button>
                </div>
                <button class="btn btn-primary btn-sm" onclick="openCreateClub()"><i class="bi bi-plus-lg"></i> Create Club</button>
            </div>

            <div class="club-cat-tabs reveal-up" id="clubCategoryTabs"></div>

            <div class="club-sort-tabs reveal-up" id="clubSortTabs">
                <button class="club-sort-tab active" data-sort="popular">Popular</button>
                <button class="club-sort-tab" data-sort="newest">Newest</button>
                <button class="club-sort-tab" data-sort="active">Most Active</button>
            </div>

            <div class="club-total" id="clubTotal"></div>
            <div class="clubs-grid reveal-up" id="clubsGrid">
                <div class="section-skeleton" style="grid-column:1/-1;"><div class="spinner"></div></div>
            </div>
        </div>
    </section>

    <section class="section-padding" id="clubDetailPage" style="display:none;padding-top:1.5rem;">
        <div class="container">
            <a href="clubs.html" class="back-link" onclick="showClubsList();return false;"><i class="bi bi-arrow-left"></i> Back to Clubs</a>
            <div id="clubDetailContent"></div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=5.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.6"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/components/club-card.js"></script>
    <script src="js/clubs.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('id')) {
                document.getElementById('clubsListingPage').style.display = 'none';
                document.getElementById('clubDetailPage').style.display = 'block';
                initClubDetail();
            } else {
                initClubsPage();
            }
        });
    </script>
</body>
</html>
