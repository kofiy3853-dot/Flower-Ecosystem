<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ask questions, get expert answers, and learn from the Flower Ecosystem community.">
    <title>Questions & Answers | Flower Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=3.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .qa-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; }
        .qa-search { display:flex; gap:0.5rem; flex:1; max-width:400px; }
        .qa-search input { flex:1; padding:0.6rem 1rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.9rem; background:var(--bg-white); color:var(--text-main); }
        .qa-search input:focus { outline:none; border-color:var(--primary-color); }
        .category-tabs { display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.5rem; margin-bottom:1.5rem; scrollbar-width:thin; }
        .category-tab { padding:0.5rem 1rem; border:1px solid var(--border-color); border-radius:20px; font-size:0.85rem; white-space:nowrap; cursor:pointer; background:var(--bg-white); color:var(--text-light); transition:all 0.2s; }
        .category-tab:hover { border-color:var(--primary-color); color:var(--primary-color); }
        .category-tab.active { background:var(--primary-color); color:white; border-color:var(--primary-color); }
        .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2rem; }
        .stat-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1rem; text-align:center; }
        .stat-card .num { font-size:1.4rem; font-weight:700; color:var(--primary-color); }
        .stat-card .label { font-size:0.78rem; color:var(--text-light); }
        .sort-tabs { display:flex; gap:0.25rem; background:var(--bg-light); border-radius:var(--radius-sm); padding:0.25rem; width:fit-content; margin-bottom:1rem; }
        .sort-tab { padding:0.4rem 0.75rem; border-radius:var(--radius-sm); font-size:0.8rem; cursor:pointer; color:var(--text-light); border:none; background:none; }
        .sort-tab.active { background:var(--bg-white); color:var(--text-main); box-shadow:var(--shadow-xs); }
        .question-card { background:var(--bg-white); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:1.25rem; margin-bottom:0.75rem; cursor:pointer; transition:all 0.2s; }
        .question-card:hover { border-color:var(--primary-color); box-shadow:var(--shadow-sm); }
        .question-card.solved { border-left:3px solid var(--accent-green); }
        .q-header { display:flex; gap:1rem; align-items:start; }
        .q-votes { text-align:center; min-width:50px; }
        .q-votes .num { font-size:1.1rem; font-weight:700; color:var(--primary-color); }
        .q-votes .label { font-size:0.7rem; color:var(--text-muted); }
        .q-answers { text-align:center; min-width:50px; padding:0.25rem 0.5rem; border-radius:var(--radius-sm); }
        .q-answers.has-accepted { background:rgba(16,185,129,0.1); color:var(--accent-green); }
        .q-answers .num { font-size:1rem; font-weight:600; }
        .q-answers .label { font-size:0.7rem; }
        .q-body { flex:1; }
        .q-title { font-size:1rem; font-weight:600; margin-bottom:0.3rem; display:flex; align-items:center; gap:0.5rem; }
        .q-title .solved-badge { background:var(--accent-green); color:white; font-size:0.65rem; padding:0.1rem 0.4rem; border-radius:3px; }
        .q-excerpt { font-size:0.85rem; color:var(--text-light); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:0.5rem; }
        .q-meta { display:flex; gap:0.75rem; flex-wrap:wrap; font-size:0.78rem; color:var(--text-muted); }
        .q-meta span { display:flex; align-items:center; gap:0.2rem; }
        .q-tag { padding:0.15rem 0.4rem; border-radius:4px; font-size:0.7rem; background:rgba(172,50,80,0.08); color:var(--primary-color); }
        .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); }
        .empty-state i { font-size:3rem; display:block; margin-bottom:1rem; opacity:0.5; }
        .pagination { display:flex; justify-content:center; gap:0.25rem; margin-top:1.5rem; }
        .page-btn { padding:0.4rem 0.75rem; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.85rem; cursor:pointer; background:var(--bg-white); }
        .page-btn.active { background:var(--primary-color); color:white; border-color:var(--primary-color); }
        .expert-badge { font-size:0.65rem; padding:0.1rem 0.4rem; border-radius:3px; background:var(--accent-gold); color:white; }
        @media(max-width:768px) { .stats-row { grid-template-columns:repeat(2,1fr); } }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <section class="page-header primary-bg text-white section-padding text-center" style="padding-top:5rem; padding-bottom:2.5rem;">
        <div class="container">
            <span class="subtitle" style="color:rgba(255,255,255,0.7)">KNOWLEDGE SHARING</span>
            <h1 style="color:white;">Questions & Answers</h1>
            <p class="section-subtitle text-white">Ask questions, get expert answers, and learn from the community</p>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="stats-row reveal-up" id="statsRow"></div>

            <div class="qa-header reveal-up">
                <div class="qa-search">
                    <input type="text" id="qaSearch" placeholder="Search questions..." aria-label="Search">
                    <button class="btn btn-primary btn-sm" id="qaSearchBtn"><i class="bi bi-search"></i></button>
                </div>
                <a href="ask-question.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> Ask Question</a>
            </div>

            <div class="category-tabs reveal-up" id="categoryTabs"></div>

            <div class="sort-tabs reveal-up" id="sortTabs">
                <button class="sort-tab active" data-sort="newest">Newest</button>
                <button class="sort-tab" data-sort="votes">Most Votes</button>
                <button class="sort-tab" data-sort="views">Most Viewed</button>
                <button class="sort-tab" data-sort="unanswered">Unanswered</button>
            </div>

            <div id="questionsList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="js/shared/api.js?v=5.0"></script>
    <script src="js/shared/theme.js?v=3.0"></script>
    <script src="js/shared/auth.js?v=3.8"></script>
    <script src="js/shared/ui.js?v=2.0"></script>
    <script src="js/shared/cart.js?v=3.0"></script>
    <script src="js/shared/components.js?v=3.1"></script>
    <script src="js/shared/animations.js?v=3.0"></script>
    <script src="js/qa.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => initQAPage());</script>
</body>
</html>
